[tox]
envlist = py
skipsdist = False

[testenv]
deps =
    pytest
    pytest-cov
    PyYAML
    Jinja2
commands =
    python -c "from pathlib import Path; Path(r'{toxinidir}/debug_readmes').mkdir(parents=True, exist_ok=True)"
    python -c "from pathlib import Path; root = Path(r'{toxinidir}'); debug_dir = root / 'debug_readmes'; targets = [root / 'REVIEW_README.md', *debug_dir.glob('REVIEW_README*.md'), *debug_dir.glob('REVIEW_README*.html'), *debug_dir.glob('style_*/DEMO_GENERATED.md'), *debug_dir.glob('style_*/DEMO_GENERATED.html')]; [path.unlink() for path in targets if path.exists()]"
    pytest -v --cov=src/ansible_role_doc --cov-report=term-missing:skip-covered --cov-report=xml:{toxinidir}/debug_readmes/coverage.xml
    python -m ansible_role_doc.cli {toxinidir}/src/ansible_role_doc/tests/mock_role -o {toxinidir}/debug_readmes/REVIEW_README.md -v
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:lint]
description = run ruff and black checks
deps =
    ruff
    black
commands =
    ruff check .
    black --check .


[testenv:pylint]
description = run pylint against the package and tests
deps =
    pylint
commands =
    pylint src/ansible_role_doc tests


[testenv:precommit]
description = run pre-commit hooks (useful locally and in CI)
deps =
    pre-commit
commands =
    pre-commit run --all-files
