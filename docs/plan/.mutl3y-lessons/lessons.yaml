- id: LESSON-01
  cycle: g1
  category: typing
  lesson: 'Module-level collections that encode frozen intent (constant-like sets, version dicts, section-id
    catalogs, policy key catalogs) must be declared with immutable types (`frozenset`, `types.MappingProxyType`,
    frozen dataclass). A bare `set`/`dict` at module scope advertises mutability the author did not mean
    and lets any importer (especially test fixtures) silently mutate shared state across the process.

    '
  pattern: module-level `_X = {...}` or `X = {...}` annotated as `set[...]`/`dict[...]` whose call sites
    only read it
  false_positive_signature: "Collections that are actually mutated (e.g. registries populated at import\
    \ time, caches, accumulators) \u2014 verify with a write-site search before flagging.\n"
  kind: anti_pattern
  fingerprint: typing:unknown:a4e9d24ce5dd
- id: LESSON-02
  cycle: g1
  category: abstraction
  lesson: "Cross-module imports of underscore-prefixed symbols are an abstraction-leakage smell. Either\
    \ the symbol is genuinely private (then keep the consumer inside the owning module or route through\
    \ a public fa\xE7ade) or it is public-by-use (then promote and drop the underscore). Letting `_x`\
    \ cross module boundaries hides the contract.\n"
  pattern: '`from <other_module> import _<name>` where the import target is not the caller''s own module'
  false_positive_signature: 'Test files exercising fail-closed invariants of a private API may legitimately
    import the private symbol IF the invariant is itself a public contract (see FIND-09). In that case
    the fix is promotion, not leaving the cross-module private import in place.

    '
  kind: anti_pattern
  fingerprint: abstraction:unknown:3f023070daec
- id: LESSON-03
  cycle: g1
  category: typing
  lesson: 'Bare 4+ element `tuple[...]` returns are weak typing. Callers must remember positional order
    with no language-level help, and refactors that reorder the tuple are silent breaks. Promote to a
    `typing.NamedTuple` with named fields; preserve tuple-unpacking call sites unchanged.

    '
  pattern: function signature `-> tuple[A, B, C, D, ...]` (4 or more elements)
  false_positive_signature: '2- or 3-element tuples (cheap, idiomatic), tuples returned from `__iter__`-style
    protocols, or tuples whose element types are all the same (homogeneous coordinate-pair / range-pair
    shapes).

    '
  kind: anti_pattern
  fingerprint: typing:unknown:b0a26d908b27
- id: LESSON-04
  cycle: g1
  category: silent_fallback
  lesson: 'Broad `except Exception` blocks at plugin loaders, kernel orchestrators, and policy-warning
    translation paths are frequently INTENTIONAL plugin-isolation perimeters codified by a closure trail
    (e.g. SCB1 in AGENTS.md, third-party entry-point isolation in scanner_plugins/discovery.py). Do not
    tighten without first auditing AGENTS.md closure history for the surrounding contract. The remediation
    when the catch IS justified is to add an inline rationale comment, not to narrow the exception type.

    '
  pattern: '`except Exception` in scanner_kernel/, scanner_core/scanner_context.py, or any plugin loader
    / discovery module'
  false_positive_signature: "Sites covered by a documented closure record (SCB1, ansible-plugin-remediation,\
    \ etc.) where the catch is the contract. Phase 0 sweep should still flag for review but the classification\
    \ rule is: check AGENTS.md first \u2192 if covered, downgrade to \"documented boundary, add comment\
    \ if missing\".\n"
  kind: anti_pattern
  fingerprint: silent_fallback:unknown:babc25104e5e
- id: LESSON-05
  cycle: g1
  category: duplication
  lesson: "Apparent \"duplicate constants\" across `policies/` and a platform plugin (e.g. scanner_plugins/ansible/)\
    \ may be an INTENTIONAL generic/specialization split rather than duplication. Before proposing a merge\
    \ or rename, verify by checking for a domain-neutrality test asserting the generic side stays platform-free\
    \ (e.g. `ansible_hits == set()`) and a superset-relationship test asserting the platform side is a\
    \ true extension. If both tests exist and pass, the split is a contract \u2014 the real question is\
    \ naming/location, which is an architecture-axis decision, not a duplication-axis fix.\n"
  pattern: two modules under different package paths defining the same set of UPPER_SNAKE constant names
  false_positive_signature: 'Module pair where one is asserted neutral by a `test_*_domain_neutrality.py`
    test and the other is asserted a superset by a passing test. In that case the split is intentional
    and flagging it as duplication is wrong; the correct axis is architecture (placement / naming).

    '
  kind: anti_pattern
  fingerprint: duplication:unknown:a12fcc279396
- id: LESSON-06
  cycle: g2
  category: ownership
  lesson: 'Generic-package modules (e.g. `scanner_plugins/policies/`) hosting platform-specific classes
    (e.g. `AnsibleDefault*`) is an ownership smell that survives domain-neutrality tests. Constants stay
    generic; CLASSES that wire those constants belong to the platform that owns them. Move the class to
    the platform package and keep the original module as a re-export shim for back-compat. The domain-neutrality
    test continues to guard the constants; the relocation removes the structural confusion.

    '
  pattern: '`class <Platform>Default*` defined in a package whose name does not contain that platform'
  false_positive_signature: "Genuine plugin-base/abstract classes that any platform may extend (these\
    \ belong in the generic package). Verify by checking whether the class body imports platform-specific\
    \ helpers \u2014 if yes, ownership is platform; if no, ownership stays generic.\n"
  kind: anti_pattern
  fingerprint: ownership:unknown:ce6866e4cddb
- id: LESSON-07
  cycle: g2
  category: abstraction
  lesson: "`Callable[..., Any]` at architectural boundaries (DI factories, kernel orchestrators, plugin\
    \ loaders) is unnamed contract debt. Promote each to a named `Protocol` documenting the call shape.\
    \ For DI-injected CLASS parameters used to instantiate (e.g. `variable_discovery_cls(di, role_path,\
    \ options)`), narrow to `type[X]` rather than a Protocol \u2014 they are class objects, not callables-with-side-effects.\
    \ Both narrowings cost nothing at runtime (TYPE_CHECKING guards) and turn future call-site refactors\
    \ into type-checker failures instead of silent breaks.\n"
  pattern: '`Callable[..., Any]` or `Callable[..., R]` at module top level in scanner_core/, scanner_kernel/,
    or scanner_plugins/<plugin>/__init__.py'
  false_positive_signature: 'Locally-scoped Callable annotations (function parameters of small helper
    functions whose contract is clear from the 5-line body). Skip those; the cost outweighs the benefit.

    '
  kind: anti_pattern
  fingerprint: abstraction:unknown:65de7f360b1d
- id: LESSON-08
  cycle: g2
  category: graph
  lesson: 'A package whose `__init__.py` eagerly imports plugins (e.g. `scanner_plugins/__init__.py`)
    is a LOAD-TIME cycle hazard. Even leaf-imports from that package''s submodules drag the whole eager-load
    tree into a partially-initialized state when called from a layer that the eager-load tree itself imports
    from. The fix for shared constants/regexes/data is to relocate them to a side-effect-free data module
    (e.g. `scanner_data/`) and have the eager-loaded package re-export from there. Putting the canonical
    definition in the eager-loaded package is a hidden cycle waiting for the next consumer.

    '
  pattern: shared constants/regexes/data living in a package whose `__init__.py` performs eager plugin
    loading
  false_positive_signature: 'Constants that are only consumed inside the same eager-load tree (no cross-layer
    consumers). Those don''t trigger the cycle and may stay where they are.

    '
  kind: anti_pattern
  fingerprint: graph:unknown:e378bba023fd
- id: LESSON-09
  cycle: g34
  category: subagent_dispatch
  lesson: 'Subagents frequently report "success" without writing their artifact to disk. Any dispatch
    that produces a file output MUST include an explicit artifact-existence gate in the prompt: the subagent
    must verify the file exists on disk before declaring success, and the foreman must check artifact
    presence at the phase barrier before proceeding. Without this gate, a silent no-write failure is indistinguishable
    from success. The recovery pattern is: re-dispatch with a stricter prompt that names the exact output
    path and requires a `tail -3 <artifact>` confirmation as the final step.

    '
  pattern: subagent dispatch producing a YAML/JSON artifact without explicit `artifact_exists` verification
    in the prompt
  false_positive_signature: "Dispatches whose only output is a terminal command result (no file artifact\
    \ produced) \u2014 those do not need a disk-existence check, only an exit-code check.\n"
  kind: anti_pattern
  fingerprint: subagent_dispatch:unknown:bf761ff803ab
- id: LESSON-10
  cycle: g34
  category: metrics_tracking
  lesson: 'Model-usage-ledger.yaml must be updated immediately after each dispatch is resolved, not batched
    at cycle end. When a context handoff or recovery event occurs mid-cycle, any dispatches after the
    last ledger write become unrecorded, requiring a manual backfill that may miss failure details. The
    discipline: after every runSubagent call returns (success OR failure), the archivist appends one ledger
    row before the next dispatch is issued. Batching ledger updates to "end of wave" is acceptable only
    when all dispatches in that wave share one atomic barrier step.

    '
  pattern: ledger write deferred past a wave barrier or context-handoff boundary
  false_positive_signature: "Single-dispatch cycles or cycles where the entire wave is within one uninterrupted\
    \ foreman session \u2014 the risk is low in that case, but the discipline still applies.\n"
  kind: anti_pattern
  fingerprint: metrics_tracking:unknown:c83a21db53bf
- id: LESSON-11
  cycle: g34
  category: subagent_dispatch
  lesson: "When a builder wraps or normalizes a plugin callsite (e.g. adds `_normalize_foo(plugin.get_foo(...))`)\
    \ it must run tests from ALL layers above the changed callsite, not just tests for its own owned files.\
    \ The integration failure pattern is: builder adds normalization to `module_A.py`, the correct test\
    \ lives in `test_module_B.py` (which exercises A through B), and B's test file belongs to a different\
    \ slice's owned-file scope. The builder's focused test suite never runs it. Prevention: builder prompts\
    \ must include the instruction \"after making changes, run the full test suite for any module that\
    \ imports your changed files, not just tests for your owned files\". The wave barrier catches this,\
    \ but the foreman should not have to fix it \u2014 the builder should.\n"
  pattern: 'Builder adds a transformation wrapper around a plugin callsite; the test exercising that callsite
    lives in a different slice''s owned file scope and uses a mock whose return type was silently compatible
    with the pre-wrapper code but breaks with the wrapper.

    '
  false_positive_signature: "Changes that are purely additive (new functions, new imports) and do not\
    \ wrap or transform any pre-existing callsite \u2014 those cannot introduce this cross-slice failure.\n"
  kind: anti_pattern
  fingerprint: subagent_dispatch:unknown:99793b01f25d
- id: LESSON-12
  cycle: g34
  category: typing
  lesson: 'Test mocks that stub Protocol methods must match the Protocol''s declared return type exactly.
    A mock returning `list[str]` for a method declared `-> dict[str, list[str]]` is a latent bug that
    survives until something normalizes the return value. Builder prompts should include: "verify that
    any mock in existing tests that stubs a method you are adding normalization for has a return type
    consistent with the Protocol declared in `scanner_plugins/interfaces.py`". Silent type mismatches
    in mocks are not caught by ruff, black, or even mypy if the mock is untyped.

    '
  pattern: 'Mock class defines a method with wrong return type; pre-existing code passed the value through
    unmodified so tests passed; new normalization code calls `.get()` or similar on the value and fails
    at runtime with AttributeError.

    '
  false_positive_signature: "Mocks that are fully typed and validated by mypy \u2014 those will fail at\
    \ type-check time before reaching the barrier.\n"
  kind: anti_pattern
  fingerprint: typing:unknown:bd3771313f24
