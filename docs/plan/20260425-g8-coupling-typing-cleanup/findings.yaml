plan_id: 20260425-g8-coupling-typing-cleanup
created: 2026-04-25
cycle: g8
type: light
focus_axes: [coupling, typing, abstraction]
parent_carry_forward: "g7b — mixed-concerns coupling in parsers/comment_doc/annotation_parsing.py"
status: closed

phase_0_summary: |
  Two parallel sweeps. Carry-forward verified: annotation_parsing.py imports zero
  symbols from prism.scanner_plugins.ansible.* — coupling is now lexical (regex
  named TASK_ENTRY_RE) not structural. 8 actionable findings; 3 deferred.

findings:
  - id: FIND-G8-01
    severity: medium
    category: duplication
    file: src/prism/scanner_plugins/parsers/yaml/line_shape.py:14-15
    statement: "COMMENTED_TASK_ENTRY_RE is byte-identical to TASK_ENTRY_RE. The name lies — comment-stripping happens upstream in COMMENT_CONTINUATION_RE so the alias adds zero behavior. Pre-existing pre-g7b."
    fix: "Delete COMMENTED_TASK_ENTRY_RE; update annotation_parsing.py:142 to use TASK_ENTRY_RE; remove from __all__."
    status: deferred
    deferred_reason: "COMMENTED_TASK_ENTRY_RE has 8-module re-export surface (policies/constants.py, policies/extract_defaults.py, ansible/extract_policies.py, ansible/task_annotation_strategy.py, ansible/default_policies.py, parsers/yaml/line_shape.py, parsers/comment_doc/annotation_parsing.py, scanner_extract/task_line_parsing.py). Wider than light cycle. Schedule dedicated alias-purge slice."

  - id: FIND-G8-02
    severity: high
    category: abstraction_leakage
    file: src/prism/scanner_plugins/parsers/comment_doc/annotation_parsing.py:29-34,163-170
    statement: "_normalize_marker_prefix and _get_marker_line_re are dead pass-through wrappers around marker_utils functions. __all__ re-exports get_marker_line_re which is owned by marker_utils."
    fix: "Delete both private wrappers; remove get_marker_line_re from __all__; callers import from marker_utils directly."
    status: closed

  - id: FIND-G8-03
    severity: high
    category: weak_typing
    file: src/prism/scanner_plugins/parsers/comment_doc/annotation_parsing.py:78-80
    statement: "Public extract_task_annotations_for_file returns tuple[list[dict[str, object]], dict[str, list[dict[str, object]]]]. Annotation has fixed shape but PreparedTaskAnnotationPolicy Protocol locks the same weak shape, so a TypedDict introduction needs a coordinated pass across Protocol + scanner_extract callers."
    fix: "Defer to Protocol-wide TypedDict narrowing slice (next cycle). TaskAnnotation TypedDict + Protocol return type + 4 caller sites must be updated together."
    status: deferred
    deferred_reason: "Wider than a light cycle: contracts_request.py Protocol + scanner_extract/task_annotation_parsing.py + 2 wrapper methods + tests must all change atomically."

  - id: FIND-G8-04
    severity: high
    category: weak_typing
    file: src/prism/scanner_plugins/ansible/default_policies.py:78-86
    statement: "collect_include_vars_files takes Callable[..., Iterable[Path]] and Callable[[Path], object]. The ... erases the keyword exclude_paths= contract the caller depends on."
    fix: "Promote to Protocols: CollectsTaskFiles (with __call__(role_root, exclude_paths=...) -> Iterable[Path]) and LoadsYamlFile (__call__(Path) -> object)."
    status: closed

  - id: FIND-G8-05
    severity: medium
    category: weak_typing
    file: src/prism/scanner_plugins/ansible/default_policies.py:166-186
    statement: "collect_unconstrained_dynamic_task_includes / collect_unconstrained_dynamic_role_includes keyword params role_root, task_files, load_yaml_file have NO annotations. Methods have no return type. Public registered plugin contract."
    fix: "Annotate role_root: Path, task_files: Iterable[Path], load_yaml_file: LoadsYamlFile, return type matching real shape."
    status: closed

  - id: FIND-G8-06
    severity: medium
    category: weak_typing
    file: src/prism/scanner_plugins/parsers/comment_doc/runbook_renderer.py:18-22,64
    statement: "render_runbook/render_runbook_csv take metadata: dict | None (bare); build_runbook_rows returns list[tuple[str, str, str]] — 3-tuple positional contract documented only in CSV header."
    fix: "metadata: Mapping[str, Any] | None; introduce RunbookRow NamedTuple(file, task_name, step); return list[RunbookRow]."
    status: closed

  - id: FIND-G8-07
    severity: low
    category: weak_typing
    file: src/prism/scanner_plugins/ansible/default_policies.py:78
    statement: "include_vars_keys: set[str] | None invites caller mutation; canonical vocabulary at task_vocabulary.py:23 is frozenset[str]."
    fix: "Type as Collection[str] | None; pass-through to caller already treats it as read-only."
    status: closed

  - id: FIND-G8-08
    severity: low
    category: duplication
    file: src/prism/scanner_plugins/parsers/comment_doc/annotation_parsing.py:46-55,108-117
    statement: "Two identical literal {...} set literals constructed on every call to split_task_annotation_label and inline check at :108-117."
    fix: "Lift to module-level frozenset _ANNOTATION_LABELS; reference both sites."
    status: closed

deferred:
  - id: FIND-G8-D-G
    statement: "runbook_renderer.py:14 imports from prism.scanner_readme.rendering_seams — layer violation."
    reason: "Depends on FIND-G6-06 implementation slice (scanner_readme plugin-ization). Not a g8 concern."

  - id: FIND-G8-D-H
    statement: "TASK_ENTRY_RE name in yaml/line_shape.py uses Ansible vocabulary in 'platform-neutral' module."
    reason: "Bigger rename touching many imports; needs design slice for yaml-shape genericization."

  - id: FIND-G8-D-I
    statement: "scanner_plugins/policies/__init__.py facade re-exports without DeprecationWarning."
    reason: "Per user g7b directive — facade-level shims accepted as silent re-export for one release; only the dedicated shim files emit warnings."

waves:
  - id: w1_typing
    findings: [FIND-G8-04, FIND-G8-05, FIND-G8-07]
    rationale: "Type-only changes in default_policies.py. Add Protocols, annotate methods, narrow set→Collection."
    files:
      - src/prism/scanner_plugins/ansible/default_policies.py
    parallel_with: w1_typing_b

  - id: w1_typing_b
    findings: [FIND-G8-03, FIND-G8-06]
    rationale: "TypedDict + NamedTuple in different files than w1_typing — disjoint."
    files:
      - src/prism/scanner_data/contracts.py
      - src/prism/scanner_plugins/parsers/comment_doc/annotation_parsing.py
      - src/prism/scanner_plugins/parsers/comment_doc/runbook_renderer.py
      - src/prism/scanner_plugins/ansible/default_policies.py  # method annotation only
    parallel_with: w1_typing

  - id: w2_abstraction
    findings: [FIND-G8-01, FIND-G8-02, FIND-G8-08]
    rationale: "Abstraction cleanup: collapse dead alias, drop dead wrappers, lift constants. After w1 to avoid type churn."
    files:
      - src/prism/scanner_plugins/parsers/yaml/line_shape.py
      - src/prism/scanner_plugins/parsers/comment_doc/annotation_parsing.py
      - src/prism/scanner_plugins/ansible/default_policies.py  # COMMENTED_TASK_ENTRY_RE re-export retire

gate:
  pytest: ".venv/bin/python -m pytest -p no:cov -p no:cacheprovider -q --tb=short"
  ruff: ".venv/bin/python -m ruff check src/prism"
  black: ".venv/bin/python -m black --check src/prism"
  mypy: ".venv/bin/python -m mypy src/prism > /tmp/mypy.g8.out 2>&1; tail -3 /tmp/mypy.g8.out"
  threshold: "all green; mypy delta=0 vs baseline 99 errors"
