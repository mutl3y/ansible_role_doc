# Persistent model reliability/quality history for gilfoyle cycles.
# Keep this file compact; append one snapshot per cycle.

version: 1
updated_at: "2026-04-28"
policy:
  source_of_truth: "docs/plan/<plan-id>/artifacts/model-usage-ledger.yaml"
  offload_rule: "Store detailed dispatch/recovery telemetry on filesystem; keep chat status to short barrier summaries only."
  demotion_triggers:
    - "route-failure-rate >= 20% in-cycle with >= 5 attempts"
    - "quality-failure-rate (quality_score<=2) >= 25% over last 3 cycles with >= 8 attempts"
    - "needed_reedit=true for 3 consecutive attempts in same task class"
  recovery_triggers:
    - "3 consecutive successes with quality_score>=4"
  prompt_vs_model_rule:
    - "low-signal but on-topic: tighten prompt then reroute in-tier"
    - "mis-scoped/empty: reroute immediately and tighten prompt"
    - "two retries with heavy re-edit burden: escalate tier"

cycles:
  - cycle: g30
    plan_id: gilfoyle-review-20260427-g30
    ledger_path: docs/plan/gilfoyle-review-20260427-g30/artifacts/model-usage-ledger.yaml
    highlights:
      - "Scout-ControlFlow failed twice (GPT-5 mini, GPT-4.1) with empty responses; recovered on Claude Haiku 4.5 with tightened prompt."
      - "Barrier recovered from STALL to OK after artifact backfill via reroute."
    model_snapshot:
      GPT-5 mini:
        attempts: 4
        successes: 2
        route_failures: 1
        quality_failures: 1
        quality_avg: 2.5
        status: degraded
      GPT-4.1:
        attempts: 1
        successes: 0
        route_failures: 1
        quality_avg: 1.0
        status: watch
      Claude Haiku 4.5:
        attempts: 1
        successes: 1
        route_failures: 0
        quality_avg: 4.0
        status: healthy

