do_not_re_flag:
  - find_id: FIND-G3-02-typecheck-import
    reason: >
      `scanner_core/di.py` TYPE_CHECKING-block import of
      `scanner_plugins.interfaces` is type-only. Zero runtime cost and zero
      runtime layer dependency. Do not re-flag as a layer leak.
  - find_id: FIND-G3-03-di-lazy-seams
    reason: >
      Lazy imports of `scanner_plugins` inside DI factory bodies
      (di.py:204 factory_blocker_fact_builder, standalone_di.py:20
      bundle_resolver) are intentional DI seams. Re-flag only with a
      registry-routed alternative on the table; a naive top-level import
      re-introduces LESSON-08 load-time cycles.
  - find_id: FIND-06
    reason: >
      All 4 broad-except sites (scanner_plugins/discovery.py x2, defaults.py,
      ansible/variable_discovery.py) are intentional 3rd-party plugin / YAML loader
      isolation perimeters with inline rationale comments. Per LESSON-04, do not
      re-raise without a new contract change.
  - find_id: FIND-07
    reason: >
      All 4 kernel broad-except sites (orchestrator.py L122/L170/L321,
      kernel_plugin_runner.py L49) are SCB1-contract plugin/kernel boundary protections.
      AGENTS.md SCB1 closure record is the rationale. Per LESSON-04, do not re-raise.
  - find_id: FIND-08
    reason: >
      Both scanner_context.py broad-except sites (L147, L166) are the SCB1
      `scan_policy_blocker_facts` translation paths. Tightening regresses the SCB1
      contract. Per LESSON-04, do not re-raise.
  - find_id: FIND-G2-04-as-tasks-literal
    reason: >
      The `provenance_source_file("tasks/")` literal in scanner_core/variable_discovery.py
      has been replaced with `None` (G2-04 closure). Do not re-introduce platform-shaped
      path literals into scanner_core; ownership belongs to the platform plugin.
  - find_id: FIND-G2-03-jinja-canonical-location
    reason: >
      Canonical JINJA_VAR_RE / JINJA_IDENTIFIER_RE definitions live in
      scanner_data/patterns_jinja.py (side-effect-free). Do not re-locate them under
      scanner_plugins/parsers/jinja/ — that path is eagerly loaded and triggers a
      load-time cycle for any consumer below the plugin layer (LESSON-08).
  - find_id: FIND-G4-01-loader-defaults-lazy-import
    reason: >
      scanner_io/loader.py:46 lazy imports scanner_plugins.defaults.resolve_yaml_parsing_policy_plugin —
      a generic resolver that already routes through the plugin registry via
      _resolve_plugin_with_precedence. The "soft fallback" is intentional pre-scan-path
      semantics, not a layer leak. Only re-flag bundled with FIND-G2-LOADER-DUAL-PATH
      for a registry-routed defaults contract reshape.
  - find_id: FIND-G4-03-inject-mock-wrappers
    reason: >
      The 12 inject_mock_* wrappers on DIContainer were collapsed to the generic
      inject_mock(name, mock) helper in g4. Do not re-introduce per-key wrappers —
      the generic helper is the single shape, per LESSON-04 (generic-helper-first
      surface design).
  - find_id: FIND-G5-01-bootstrap-table
    reason: >
      bootstrap_default_plugins() in scanner_plugins/__init__.py is now data-driven
      via _DIRECT_REGISTRATIONS / _DEFERRED_REGISTRATIONS / _RESERVED_UNSUPPORTED_PLATFORMS
      tables and slot->method dispatch maps. Adding a built-in is a single tuple
      addition — do not re-flag the dispatch indirection as 'too clever'; the
      previous imperative form was 80 lines of duplicated `if not in: register`.
  - find_id: FIND-G6-01-format-candidate-failure-path-canonical
    reason: >
      `_format_candidate_failure_path` (and its helper `_role_relative_candidate_path`)
      live in scanner_io/loader.py. parsing_policy.py imports from there. Do not
      re-add a local copy in plugin packages; if behaviour changes, change the
      canonical site.
  - find_id: FIND-G6-02-comment-continuation-re-canonical
    reason: >
      `COMMENT_CONTINUATION_RE` is defined in scanner_plugins/parsers/comment_doc/marker_utils.py.
      policies/constants.py re-exports via top-level import. Do not redefine the
      regex elsewhere — divergence between two compiled patterns is silent.
  - find_id: FIND-G6-03-ansible-builtin-variables-removed
    reason: >
      The `ansible_builtin_variables` policy schema key was deleted in g6 (zero
      readers, zero data). Do not re-introduce platform-shaped keys in
      scanner_config/patterns.py; ownership belongs to the platform plugin.
  - find_id: FIND-G6-04-seed-load-narrow-except
    reason: >
      `load_seed_variables` catches (OSError, yaml.YAMLError, UnicodeDecodeError,
      ValueError) — programmer errors (TypeError, AttributeError) intentionally
      propagate. Do not widen back to `except Exception`.
  - find_id: FIND-G6-05-meta-load-narrow-except
    reason: >
      `collect_role_contents` catches RuntimeError (load_meta's documented
      hard-failure surface). Do not widen to bare `Exception` — that masks
      regressions in load_meta's contract.

