related_conventions:
  naming_patterns_in_domain: scanner.py keeps public and private compatibility wrappers while submodule functions use direct verb names like render_primary_scan_output and emit_scan_outputs
  structure_of_domain: typed payload builders stay in scan_context.py, pure format/write primitives stay in output.py, and orchestration layers inject callbacks instead of importing scanner.py
  error_handling_in_domain: dry_run short-circuits sidecar writes after primary render; bytes output is decoded to str before emit_scan_outputs returns
  testing_in_domain: focused helper tests live in submodule-specific test files and scanner wrapper delegation is tested separately
  documentation_in_domain: modernization-plan-v2 explicitly calls for a dedicated Slice 2d test file src/prism/tests/test_render_output.py before implementation

related_dependencies:
  internal:
  - component: src/prism/scanner_submodules/render_readme.py
    relationship_to_domain: provides render_readme callback used for non-json primary output
    direction: outbound
  - component: src/prism/scanner_submodules/scanner_report.py
    relationship_to_domain: provides scanner-report markdown implementation behind _build_scanner_report_markdown
    direction: outbound
  - component: src/prism/scanner_submodules/runbook.py
    relationship_to_domain: provides standalone runbook markdown/CSV rendering behind scanner wrappers
    direction: outbound
  - component: src/prism/scanner_submodules/output.py
    relationship_to_domain: provides resolve_output_path, render_final_output, and write_output primitives
    direction: outbound
  - component: src/prism/scanner_submodules/scan_context.py
    relationship_to_domain: provides typed payload and arg builders consumed by orchestration
    direction: outbound
  - component: src/prism/scanner.py
    relationship_to_domain: exposes compatibility wrappers and top-level run_scan entrypoint
    direction: bidirectional
  - component: src/prism/api.py
    relationship_to_domain: separately emits runbook sidecars in batch flows without using scan_output_emission
    direction: inbound

testing_patterns:
  framework: pytest
  coverage_areas:
  - primary output format branching and dry-run behavior
  - scanner-report sidecar path and metadata mutation
  - optional runbook sidecar writing
  - scanner wrapper delegation and callback injection
  - concise README integration via metadata contracts
  test_organization: helper-specific tests are split between test_scan_output_primary.py and test_scan_output_emission.py, with higher-level README coupling covered in test_render_readme.py and test_render_readme_runbook.py
  mock_patterns:
  - injected fake render_readme/render_final_output/write_output callbacks capture forwarded kwargs
  - injected fake build_scanner_report_markdown/render_runbook/render_runbook_csv callbacks capture ordering and arguments
  - monkeypatch-based wrapper tests assert scanner.py preserves callback seams

open_questions:
- question: Should Slice 2d consolidate both scan_output_primary.py and scan_output_emission.py into emit_output.py, or only rename the sidecar coordinator and keep primary output separate?
  context: The modernization plan names emit_output.py as the target, but the current implementation already splits responsibilities across two submodules.
- question: Is scanner_runbook_report.py intended to remain the compatibility facade for Slice 2c artifacts after Slice 2d, or should emit_output.py depend directly on scanner_report.py and runbook.py?
  context: Current emission uses scanner wrappers and the Slice 2c shim rather than direct imports.
- question: Why do tests import prism.scanner_submodules.render_reports while no render_reports.py file was found in the examined workspace?
  context: This may indicate an alias/export not visible in the inspected files or an incomplete/inconsistent extraction state that affects Slice 2c/2d coupling.

gaps:
- area: dedicated Slice 2d test file
  description: src/prism/tests/test_render_output.py does not exist in the examined workspace even though modernization-plan-v2 calls for it as the TDD gate for Slice 2d.
  impact: The next slice lacks the planned focused test home and will otherwise continue to spread orchestration assertions across test_scan_output_primary.py and test_scan_output_emission.py.
- area: render_reports module resolution
  description: Tests reference prism.scanner_submodules.render_reports, but no render_reports.py file was found during file search in src/prism/scanner_submodules.
  impact: This is a likely coupling hazard when deciding whether Slice 2d should depend on scanner_runbook_report.py or a lower-level report module.
