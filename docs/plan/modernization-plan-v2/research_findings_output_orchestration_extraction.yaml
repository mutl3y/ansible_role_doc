plan_id: modernization-plan-v2
objective: Modernization Plan v2 Slice 2d - Output Orchestration Extraction
focus_area: output_orchestration_extraction
created_at: 2026-03-28
created_by: GitHub Copilot
status: completed

tldr: |
  - Current scanner output orchestration is already split across scanner wrappers, primary output helpers, and sidecar emission helpers; the remaining seam is consolidation, not first extraction.
  - The concrete orchestration path is scanner.run_scan -> scanner._build_emit_scan_outputs_args -> scanner._emit_scan_outputs -> scan_output_emission.emit_scan_outputs -> scan_output_primary.render_primary_scan_output / write_concise_scanner_report_if_enabled / write_optional_runbook_outputs.
  - Slice 2d should move the orchestration coordinator and write-side helpers into src/prism/scanner_submodules/emit_output.py while leaving rendering contracts in render_readme, scanner_report, runbook, and output.py.
  - Cross-slice coupling is strongest to Slice 2b README behavior through metadata keys concise_readme/include_scanner_report_link/scanner_report_relpath, and to Slice 2c report/runbook callbacks through _build_scanner_report_markdown, render_runbook, and render_runbook_csv.
  - Minimum new tests should cover dry-run ordering, scanner-report sidecar metadata/link behavior, runbook sidecar writes, wrapper delegation, and output-format branching without re-testing README/report formatting internals.

research_metadata:
  methodology: hybrid retrieval using semantic_search plus exact grep_search, then targeted read_file examination of scanner wrappers, submodules, and focused tests
  scope: scanner output emission path, its wrapper seams, injected rendering callbacks, and directly related tests only
  confidence: high
  coverage: 92

