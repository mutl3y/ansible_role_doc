plan_id: "gilfoyle-review-g6"
target: "src/prism (whole package)"
reviewer: "Gilfoyle"
date: "2026-04-26"
cycle: g6
focus_axis: ownership
review_type: thorough
grade: "B"
summary: >
  Thorough whole-codebase sweep on the ownership axis. Two real duplications,
  one dead-schema key, and two narrow broad-except sites. Many ownership
  candidates flagged by the sweep were dropped after verification:
  scanner_readme/* is appropriately Ansible-coupled by design (no
  platform-agnostic claim), and scanner_extract/discovery.py broad-excepts are
  well-designed strict/non-strict load patterns with explicit warning
  emission, so tightening them risks suppressing legitimate I/O failures
  with no clear behavioural win.

floor_checks:
  coverage_proof: pass         # Phase 0 sweeps covered scanner_core, scanner_extract, scanner_io, scanner_readme, scanner_config, scanner_plugins, scanner_kernel, cli/api facades
  category_proof: pass         # ownership, duplication, silent_fallback, abstraction, control_flow all examined
  density_floor: pass          # 5 findings across 5 modules; sweeps produced ≥30 raw observations before grading
  diff_probe: pass             # findings reference files not modified in the last 3 commits (loader.py, marker_utils.py, patterns.py)
  rotation_discipline: pass    # ownership axis covered for first time this loop

dropped_candidates:
  # NOTE: scanner_readme/* sweeps were initially dropped on the narrow argument
  # that scanner_readme makes no platform-agnostic claim today. User pushback
  # 2026-04-25 elevated this to a real architectural debt item: the product
  # vision is plug-and-play platform support (Terraform, Kubernetes, AAP)
  # where each plugin owns input + scanning logic + output rendering.
  # Captured as FIND-G6-06 below for a dedicated planning slice; the sweep
  # findings remain dropped *for in-loop fixing* because the refactor needs
  # design (renderer protocol + plugin contract) before code.
  - sweep_id: ownership-config-legacy-retirement-constants
    reason: "Documented retirement stubs; AGENTS.md notable findings 'legacy-ansible-role-doc-retire-20260329' confirms intentional retention for error-message guidance."
  - sweep_id: ownership-config-legacy-retirement-constants
    reason: "Documented retirement stubs; AGENTS.md notable findings 'legacy-ansible-role-doc-retire-20260329' confirms intentional retention for error-message guidance."
  - sweep_id: silent-fallback-discovery-load-meta-x4
    reason: "Strict/non-strict pattern with explicit warning_collector emission; tightening to (OSError, yaml.YAMLError) risks dropping legitimate I/O failure modes (PermissionError, IsADirectoryError, etc. are already OSError subclasses but other libs raise differently). No measurable win; design is intentional."
  - sweep_id: silent-fallback-cli-top-level
    reason: "Top-level UX boundary; intentional broad catch for clean error reporting."
  - sweep_id: silent-fallback-events-telemetry
    reason: "Event-bus listener and telemetry write defensiveness — pragma: no cover marked, intentional."

findings:

  - id: FIND-G6-01
    category: duplication
    severity: medium
    status: closed
    title: "_format_candidate_failure_path defined in two modules"
    description: >
      Two byte-identical definitions of `_format_candidate_failure_path(candidate, role_root)`
      exist: scanner_io/loader.py:59 and scanner_plugins/parsers/yaml/parsing_policy.py:11.
      Both render a stable failure-path string without crashing on outside-root symlinks.
      Any divergence between them will be silent.
    affected_files:
      - src/prism/scanner_io/loader.py
      - src/prism/scanner_plugins/parsers/yaml/parsing_policy.py
    decision: "Promote scanner_io/loader.py:_format_candidate_failure_path (and helper _role_relative_candidate_path) to a shared module; have parsing_policy.py import from there. loader is the older home and already exports two helpers."
    decision_rationale: "Single authoritative definition; no behaviour change."

  - id: FIND-G6-02
    category: duplication
    severity: medium
    status: closed
    title: "COMMENT_CONTINUATION_RE compiled in two modules"
    description: >
      `COMMENT_CONTINUATION_RE = re.compile(r"^\s*#\s?(.*)$")` is defined verbatim in
      scanner_plugins/policies/constants.py:62 and
      scanner_plugins/parsers/comment_doc/marker_utils.py:13. Three downstream consumers
      already re-export from one of these via policy proxies. Two compiled patterns will
      drift independently if regex tightens.
    affected_files:
      - src/prism/scanner_plugins/policies/constants.py
      - src/prism/scanner_plugins/parsers/comment_doc/marker_utils.py
    decision: "Keep marker_utils.py as the canonical home (it's the comment-doc parser package and the older symbol); have policies/constants.py import COMMENT_CONTINUATION_RE from marker_utils and re-export via __all__."
    decision_rationale: "marker_utils owns comment-parsing primitives; constants.py is policy-default config that should reference parser symbols, not redefine them."

  - id: FIND-G6-03
    category: ownership
    severity: medium
    status: closed
    title: "Dead policy key 'ansible_builtin_variables' in scanner_config/patterns.py"
    description: >
      `policy.setdefault("ansible_builtin_variables", [])` plus normalize in patterns.py:86-89
      sets up a policy key that has zero readers in src/ or any data YAML. Normalises a value
      that nothing consumes. Either dead or an undocumented forward-compat slot.
    affected_files:
      - src/prism/scanner_config/patterns.py
    decision: "Delete the 4 lines (setdefault + assignment back through _normalise_token_collection). No callers, no data."
    decision_rationale: "Dead schema; remove rather than carry forward Ansible-specific naming in scanner_config."

  - id: FIND-G6-04
    category: silent_fallback
    severity: medium
    status: closed
    title: "scanner_extract/variable_extractor.py:90 broad except for seed files"
    description: >
      `load_seed_variables` wraps load_yaml_file(candidate) in `except Exception:` and
      silently `continue`s. Seed files are documented as optional, but TypeError /
      AttributeError from a programming bug would also be swallowed.
    affected_files:
      - src/prism/scanner_extract/variable_extractor.py
    decision: "Tighten to (OSError, yaml.YAMLError, UnicodeDecodeError, ValueError). TypeError/AttributeError will propagate as the bugs they are."
    decision_rationale: "Optional inputs should still surface programmer errors; only catch parser/IO exceptions."

  - id: FIND-G6-05
    category: silent_fallback
    severity: medium
    status: closed
    title: "scanner_core/scan_facade_helpers.py:46 broad except for meta load"
    description: >
      collect_role_contents wraps `load_meta(role_path, warning_collector=meta_warnings)`
      in `except Exception as exc:` and falls back to {}. load_meta itself raises only
      RuntimeError on hard failure (other paths feed warning_collector internally), so the
      broad catch is wider than the contract requires.
    affected_files:
      - src/prism/scanner_core/scan_facade_helpers.py
    decision: "Tighten to `except RuntimeError as exc:` since that is load_meta's documented hard-failure surface."
    decision_rationale: "Match the callee's actual error contract; let unexpected exceptions surface."

  - id: FIND-G6-06
    category: architecture
    severity: high
    status: closed
    closed_in_commit: "G6-06 W1-W5 (b18f4bb, a803a0b, c40edfa, 483bfa2 + ledger)"
    title: "scanner_readme/* hardcodes Ansible role rendering — blocks Terraform/K8s/AAP plug-and-play"
    description: >
      Product vision (confirmed by user 2026-04-25) is plug-and-play platform
      support where each plugin owns input parsing, scanning logic, AND output
      rendering. Today scanner_readme/* (render, style, guide, render_legacy_markers,
      doc_insights, guide_galaxy) hardcodes Ansible role concepts: meta/main.yml,
      Galaxy install fragments, role variables/tasks/handlers/defaults sections,
      and ansible-role-doc legacy marker pair. When Terraform / Kubernetes / AAP
      README generation lands, this package will either fork per platform or grow
      a switch statement — both are wrong shapes.

      The correct shape is a ReadmeRendererPlugin protocol (parallel to existing
      VariableDiscoveryPlugin / FeatureDetectionPlugin / YAMLParsingPolicyPlugin
      seams) with scanner_readme/* reduced to a thin dispatcher that delegates
      section assembly, style guidance, and platform-specific marker handling to
      the registered plugin for the active platform key.
    affected_files:
      - src/prism/scanner_readme/render.py
      - src/prism/scanner_readme/style.py
      - src/prism/scanner_readme/guide.py
      - src/prism/scanner_readme/guide_galaxy.py
      - src/prism/scanner_readme/doc_insights.py
      - src/prism/scanner_readme/render_legacy_markers.py
    decision: >
      Defer to dedicated planning slice (e.g. plan id
      'scanner-readme-platform-agnostic-20260YYNN'). Required artefacts before
      code: (1) ReadmeRendererPlugin protocol design, (2) section/style/marker
      ownership matrix per platform, (3) registry wiring + DI factory plan,
      (4) Ansible plugin migration of current rendering as the reference impl,
      (5) parity test strategy against current Ansible-only output.
    decision_rationale: >
      Mechanical refactor in-loop would either (a) prematurely freeze the
      protocol shape before Terraform/K8s requirements are known, or (b) split
      Ansible-specific code across two homes during the migration. Neither is
      cheaper than waiting for one well-shaped slice. The debt is real and
      blocks the stated product direction; this finding records the contract
      so the next planning cycle starts with the constraint already written down.
    resolution: >
      Implemented in 5 waves as planning slice 'FIND-G6-06':
      W1 — ReadmeRendererPlugin protocol (@runtime_checkable, 8 methods) +
           registry slot 'readme_renderer' in _STATELESS_REQUIRED_SLOTS.
      W2 — AnsibleReadmeRendererPlugin (full 8-method impl) + ansible/templates/
           README.md.j2 copy; bootstrap wiring via _DIRECT_REGISTRATIONS /
           _DIRECT_SLOT_DISPATCH; exported from ansible/__init__.py.
      W3 — scanner_readme/render.py + guide.py delegated to plugin:
           _get_readme_renderer_plugin() dispatches by metadata['platform_key'];
           fails closed with ValueError for unknown platform; render_section_body,
           render_identity_section, default_template_path, legacy markers, and
           scanner_report_blurb all routed through plugin.
      W4 — 4 test files (70 tests): protocol compliance, registry round-trip,
           output parity, Terraform stub isolation.
      W5 — Full gate: 949 passed (879 + 70 new), mypy 99 errors (baseline),
           ruff clean, black clean.
    evidence:
      test_count_before: 879
      test_count_after: 949
      new_tests: 70
      mypy_errors: 99
      mypy_baseline: 99
      ruff: clean
      black: clean

