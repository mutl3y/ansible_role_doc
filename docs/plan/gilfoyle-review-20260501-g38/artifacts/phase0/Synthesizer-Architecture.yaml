- id: ARCH-01
  category: registry_authority
  severity_hint: high
  title: Split Registry Authority Across Execution Paths
  files:
    - src/prism/api.py
    - src/prism/api_layer/plugin_facade.py
    - src/prism/api_layer/non_collection.py
    - src/prism/scanner_core/execution_request_builder.py
    - src/prism/scanner_core/di.py
  related_scouts:
    - Scout-Ownership
    - Scout-Graph
  verification_evidence: 'api.py:63 DEFAULT_PLUGIN_REGISTRY = _get_default_plugin_registry(); execution_request_builder.py:479 runtime_registry = default_plugin_registry; di.py has registry param + plugin_registry property'
  evidence_command: "grep -n 'DEFAULT_PLUGIN_REGISTRY\\|default_plugin_registry\\|runtime_registry\\|plugin_registry' src/prism/api.py src/prism/api_layer/non_collection.py src/prism/scanner_core/execution_request_builder.py src/prism/scanner_core/di.py"
  fingerprint: registry-authority-split-five-resolution-paths
  fix_group_key: registry_composition_root
  suggested_narrow_gate: pytest -q src/prism/tests/test_di_registry_resolution.py
  summary: The plugin registry still resolves through multiple authorities across the public API, facade, non-collection runtime, and DI path. The split is observable in tests that patch API-local registry globals separately from the facade resolver, which means injected registry authority is still not singular end-to-end.
- id: ARCH-02
  category: facade_leakage
  severity_hint: high
  title: Internal Assembly Helpers Exposed at Public API Boundary
  files:
    - src/prism/api.py
  related_scouts:
    - Scout-Ownership
  verification_evidence: 'api.py:55-56 build_run_scan_options_canonical = api_non_collection.build_run_scan_options_canonical; route_scan_payload_orchestration = api_non_collection.route_scan_payload_orchestration'
  evidence_command: "nl -ba src/prism/api.py | sed -n '54,66p'"
  fingerprint: api-facade-internal-assembly-helpers-exposed
  fix_group_key: api_public_contract_cleanup
  suggested_narrow_gate: pytest -q src/prism/tests/test_api_cli_entrypoints.py -k public
  summary: api.py still leaks non-collection assembly helpers as top-level module attributes. Those aliases are not part of the declared public contract, but they remain patchable and keep internal orchestration seams frozen at the API boundary.
