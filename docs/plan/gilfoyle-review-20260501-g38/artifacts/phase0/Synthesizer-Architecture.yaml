- id: ARCH-05
  category: ownership
  severity_hint: medium
  title: Module-Level Registry Singleton Eager Construction
  files:
    - src/prism/api.py
    - src/prism/api_layer/plugin_facade.py
  related_scouts:
    - Scout-Ownership
  verification_evidence: 'api.py:63 DEFAULT_PLUGIN_REGISTRY = _get_default_plugin_registry()'
  evidence_command: "nl -ba src/prism/api.py | sed -n '59,64p'"
  fingerprint: api-module-level-registry-eager-init
  fix_group_key: registry_composition_root
  suggested_narrow_gate: pytest -q src/prism/tests/test_api_cli_entrypoints.py -k DEFAULT_PLUGIN_REGISTRY
