objective: >
  Define Protocol types for the 9 Callable[..., Any] parameters in
  api_layer/collection.py::scan_collection. For each parameter: find the
  concrete function passed at all call sites, derive its actual signature,
  and define the minimal Protocol that would work without mypy errors.
focus_area: collection_callable_protocols
created_at: "2026-04-26"
created_by: RESEARCHER
status: completed

tldr: |
  - Single call site: api.py:178 passes all 9 concretes; cli.py calls api.scan_collection only (facade).
  - 6 of 9 parameters receive named module-level functions; 2 receive lambdas (render + write_runbook).
  - build_collection_scan_result returns dict[str, Any] but outer function is annotated CollectionScanResult:
    fixing the concrete return type to CollectionScanResult (it already builds the right shape) is the
    correct path; no cast needed.
  - scan_role_fn Protocol return type must be dict[str, Any] (not RoleScanResult) because collection.py
    calls role_payload.get("metadata") which is not a key in RoleScanResult TypedDict.
  - 4 parameters share an identical 1-arg positional signature (collection_root: Path) -> dict[str, Any]:
    build_collection_identity_fn, aggregate_collection_dependencies_fn, scan_collection_plugins_fn
    (and render is kwarg-only, separate).
  - Protocol names: ScanRoleFn, BuildCollectionIdentityFn, AggregateCollectionDependenciesFn,
    ScanCollectionPluginsFn, RenderCollectionRoleReadmeFn, WriteCollectionRunbookArtifactsFn,
    BuildCollectionRoleEntryFn, BuildCollectionFailureRecordFn, BuildCollectionScanResultFn.

