protocol_definitions:
  # For each protocol: name, Protocol __call__ signature, concrete function, compatibility notes.

  - param: scan_role_fn
    protocol_name: ScanRoleFn
    concrete_function: "prism.api.scan_role"
    concrete_return: "RoleScanResult  (TypedDict total=False: role_name: str, payload: dict[str, Any])"
    protocol_return: "dict[str, Any]"
    protocol_return_rationale: >
      collection.py calls role_payload.get("metadata") which is NOT a declared
      key in RoleScanResult. Typing role_payload as RoleScanResult would cause a
      mypy error on that .get() call. Using dict[str, Any] as the protocol return
      type is correct: RoleScanResult is a TypedDict subtype of dict[str, Any], so
      scan_role satisfies the protocol (covariant return).
    call_in_collection_py: |
      role_payload = scan_role_fn(
          str(role_dir),
          compare_role_path=compare_role_path,
          style_readme_path=style_readme_path,
          role_name_override=role_dir.name,
          vars_seed_paths=vars_seed_paths,
          concise_readme=concise_readme,
          scanner_report_output=scanner_report_output,
          include_vars_main=include_vars_main,
          include_scanner_report_link=include_scanner_report_link,
          readme_config_path=readme_config_path,
          adopt_heading_mode=adopt_heading_mode,
          style_guide_skeleton=style_guide_skeleton,
          keep_unknown_style_sections=keep_unknown_style_sections,
          exclude_path_patterns=exclude_path_patterns,
          style_source_path=style_source_path,
          policy_config_path=policy_config_path,
          fail_on_unconstrained_dynamic_includes=fail_on_unconstrained_dynamic_includes,
          fail_on_yaml_like_task_annotations=fail_on_yaml_like_task_annotations,
          ignore_unresolved_internal_underscore_references=ignore_unresolved_internal_underscore_references,
          detailed_catalog=detailed_catalog,
          include_collection_checks=include_collection_checks,
          include_task_parameters=include_task_parameters,
          include_task_runbooks=include_task_runbooks,
          inline_task_runbooks=inline_task_runbooks,
      )
    minimal_protocol: |
      class ScanRoleFn(Protocol):
          def __call__(
              self,
              role_path: str,
              *,
              compare_role_path: str | None = ...,
              style_readme_path: str | None = ...,
              role_name_override: str | None = ...,
              vars_seed_paths: list[str] | None = ...,
              concise_readme: bool = ...,
              scanner_report_output: str | None = ...,
              include_vars_main: bool = ...,
              include_scanner_report_link: bool = ...,
              readme_config_path: str | None = ...,
              adopt_heading_mode: str | None = ...,
              style_guide_skeleton: bool = ...,
              keep_unknown_style_sections: bool = ...,
              exclude_path_patterns: list[str] | None = ...,
              style_source_path: str | None = ...,
              policy_config_path: str | None = ...,
              fail_on_unconstrained_dynamic_includes: bool | None = ...,
              fail_on_yaml_like_task_annotations: bool | None = ...,
              ignore_unresolved_internal_underscore_references: bool | None = ...,
              detailed_catalog: bool = ...,
              include_collection_checks: bool = ...,
              include_task_parameters: bool = ...,
              include_task_runbooks: bool = ...,
              inline_task_runbooks: bool = ...,
          ) -> dict[str, Any]: ...
    notes: >
      failure_policy is NOT passed by collection.py; it must be absent from the
      Protocol. The concrete scan_role has it as an extra kwarg with a default,
      which is compatible.

  - param: build_collection_identity_fn
    protocol_name: BuildCollectionIdentityFn
    concrete_function: "prism.scanner_io.collection_payload.build_collection_identity"
    concrete_signature: "(collection_root: Path) -> dict[str, Any]"
    concrete_return: "dict[str, Any]  (shape: {path: str, metadata: dict[str, Any]})"
    protocol_return: "dict[str, Any]"
    call_in_collection_py: "collection_identity = build_collection_identity_fn(collection_root)"
    minimal_protocol: |
      class BuildCollectionIdentityFn(Protocol):
          def __call__(self, collection_root: Path) -> dict[str, Any]: ...
    notes: >
      Single positional argument only; no keyword args.

  - param: aggregate_collection_dependencies_fn
    protocol_name: AggregateCollectionDependenciesFn
    concrete_function: "prism.scanner_reporting.collection_dependencies.aggregate_collection_dependencies"
    concrete_signature: "(collection_root: Path) -> dict[str, Any]"
    concrete_return: "dict[str, Any]  (shape: {collections: list, roles: list, conflicts: list})"
    protocol_return: "dict[str, Any]"
    call_in_collection_py: "dependencies = aggregate_collection_dependencies_fn(collection_root)"
    minimal_protocol: |
      class AggregateCollectionDependenciesFn(Protocol):
          def __call__(self, collection_root: Path) -> dict[str, Any]: ...
    notes: >
      Identical shape to BuildCollectionIdentityFn; could share a common base Protocol
      CollectionRootFn[T] but per implementation-discipline, separate named protocols
      are cleaner.

  - param: scan_collection_plugins_fn
    protocol_name: ScanCollectionPluginsFn
    concrete_function: "prism.scanner_io.collection_plugins.scan_collection_plugins"
    concrete_signature: "(collection_root: Path) -> dict[str, Any]"
    concrete_return: "dict[str, Any]  (shape: CollectionPluginCatalog — schema_version, summary, by_type, failures)"
    protocol_return: "dict[str, Any]"
    call_in_collection_py: "plugin_catalog = scan_collection_plugins_fn(collection_root)"
    minimal_protocol: |
      class ScanCollectionPluginsFn(Protocol):
          def __call__(self, collection_root: Path) -> dict[str, Any]: ...

  - param: render_collection_role_readme_fn
    protocol_name: RenderCollectionRoleReadmeFn
    concrete_function: "lambda *, role_name, payload: render_collection_role_readme(role_name=role_name, payload=payload, render_readme_fn=render_readme)"
    concrete_signature: "(*, role_name: str, payload: dict[str, Any]) -> str"
    concrete_return: "str"
    call_in_collection_py: |
      rendered_readme = render_collection_role_readme_fn(
          role_name=role_dir.name,
          payload=role_payload,
      )
    minimal_protocol: |
      class RenderCollectionRoleReadmeFn(Protocol):
          def __call__(self, *, role_name: str, payload: dict[str, Any]) -> str: ...
    notes: >
      The concrete is a lambda (closes over render_readme). The lambda's two
      parameters are both keyword-only in the lambda signature (lambda *, ...).

  - param: write_collection_runbook_artifacts_fn
    protocol_name: WriteCollectionRunbookArtifactsFn
    concrete_function: "lambda **kwargs: write_collection_runbook_artifacts(**kwargs, render_runbook_fn=render_runbook, render_runbook_csv_fn=render_runbook_csv)"
    concrete_effective_signature: "(*, role_name: str, metadata: dict[str, Any], runbook_output_dir: str | None, runbook_csv_output_dir: str | None) -> None"
    concrete_return: "None"
    call_in_collection_py: |
      write_collection_runbook_artifacts_fn(
          role_name=role_dir.name,
          metadata=(role_payload.get("metadata") or {}),
          runbook_output_dir=runbook_output_dir,
          runbook_csv_output_dir=runbook_csv_output_dir,
      )
    minimal_protocol: |
      class WriteCollectionRunbookArtifactsFn(Protocol):
          def __call__(
              self,
              *,
              role_name: str,
              metadata: dict[str, Any],
              runbook_output_dir: str | None,
              runbook_csv_output_dir: str | None,
          ) -> None: ...
    notes: >
      The lambda uses **kwargs, so mypy cannot infer its parameter types from
      the lambda literal. The protocol is derived from the actual call in collection.py.
      The underlying write_collection_runbook_artifacts expects metadata: dict (untyped),
      which is compatible with dict[str, Any] in the protocol.

  - param: build_collection_role_entry_fn
    protocol_name: BuildCollectionRoleEntryFn
    concrete_function: "prism.scanner_io.collection_payload.build_collection_role_entry"
    concrete_signature: "(*, role_dir: Path, payload: dict[str, Any], rendered_readme: str | None) -> dict[str, Any]"
    concrete_return: "dict[str, Any]  (shape: CollectionRoleEntry)"
    protocol_return: "dict[str, Any]"
    call_in_collection_py: |
      roles_payload.append(
          build_collection_role_entry_fn(
              role_dir=role_dir,
              payload=role_payload,
              rendered_readme=rendered_readme,
          )
      )
    minimal_protocol: |
      class BuildCollectionRoleEntryFn(Protocol):
          def __call__(
              self,
              *,
              role_dir: Path,
              payload: dict[str, Any],
              rendered_readme: str | None,
          ) -> dict[str, Any]: ...

  - param: build_collection_failure_record_fn
    protocol_name: BuildCollectionFailureRecordFn
    concrete_function: "prism.scanner_io.collection_payload.build_collection_failure_record"
    concrete_signature: "(*, role_dir: Path, exc: Exception, include_traceback: bool) -> dict[str, Any]"
    concrete_return: "dict[str, Any]  (shape: CollectionFailureRecord)"
    protocol_return: "dict[str, Any]"
    call_in_collection_py: |
      failures.append(
          build_collection_failure_record_fn(
              role_dir=role_dir,
              exc=exc,
              include_traceback=include_traceback,
          )
      )
    minimal_protocol: |
      class BuildCollectionFailureRecordFn(Protocol):
          def __call__(
              self,
              *,
              role_dir: Path,
              exc: Exception,
              include_traceback: bool,
          ) -> dict[str, Any]: ...

  - param: build_collection_scan_result_fn
    protocol_name: BuildCollectionScanResultFn
    concrete_function: "prism.scanner_io.collection_payload.build_collection_scan_result"
    concrete_signature: |
      (
          *,
          collection_root: Path,
          collection_identity: dict[str, Any] | None = None,
          dependencies: dict[str, Any] | None = None,
          plugin_catalog: dict[str, Any] | None = None,
          roles: list[dict[str, Any]],
          failures: list[dict[str, Any]],
      ) -> dict[str, Any]
    concrete_return: "dict[str, Any]  (builds the CollectionScanResult shape)"
    protocol_return: "CollectionScanResult"
    call_in_collection_py: |
      return build_collection_scan_result_fn(
          collection_root=collection_root,
          collection_identity=collection_identity,
          dependencies=dependencies,
          plugin_catalog=plugin_catalog,
          roles=roles_payload,
          failures=failures,
      )
    minimal_protocol: |
      class BuildCollectionScanResultFn(Protocol):
          def __call__(
              self,
              *,
              collection_root: Path,
              collection_identity: dict[str, Any] | None,
              dependencies: dict[str, Any] | None,
              plugin_catalog: dict[str, Any] | None,
              roles: list[dict[str, Any]],
              failures: list[dict[str, Any]],
          ) -> CollectionScanResult: ...
    decision_blocker:
      description: >
        The concrete build_collection_scan_result is currently annotated as returning
        dict[str, Any], but scan_collection is annotated as returning CollectionScanResult.
        For the Protocol return type to be CollectionScanResult (required so that
        collection.py's `return build_collection_scan_result_fn(...)` type-checks
        cleanly), the concrete function must also be updated to return CollectionScanResult.
        The function already builds the exact CollectionScanResult shape so the fix
        is a one-line return annotation change.
      action_required: >
        Change `build_collection_scan_result` return annotation from
        `dict[str, Any]` to `CollectionScanResult` in
        src/prism/scanner_io/collection_payload.py.
      impact: decision_blocker

patterns_found:
  - category: architecture
    pattern: injectable-callable with lambda wrapper for partial application
    description: >
      2 of the 9 injectable callables (render_collection_role_readme_fn,
      write_collection_runbook_artifacts_fn) use lambdas in api.py to partially
      apply internal dependencies (render_readme, render_runbook, render_runbook_csv)
      that the inner function requires but the collection orchestrator should not know
      about. This is the standard dependency-injection pattern in this codebase.
    examples:
      - file: api.py
        location: "src/prism/api.py:205-221"
        snippet: |
          render_collection_role_readme_fn=lambda *, role_name, payload: render_collection_role_readme(
              role_name=role_name, payload=payload, render_readme_fn=render_readme,
          ),
          write_collection_runbook_artifacts_fn=lambda **kwargs: write_collection_runbook_artifacts(
              **kwargs, render_runbook_fn=render_runbook, render_runbook_csv_fn=render_runbook_csv,
          ),
    prevalence: occasional

  - category: naming
    pattern: protocol-naming convention
    description: >
      No Protocol types yet exist for these callables; the rest of the codebase
      uses Protocol classes in scanner_data/contracts.py and
      scanner_data/contracts_request.py. Protocol names follow the pattern
      `<VerbNoun>Fn` for callable protocols (e.g. PreparedTaskAnnotationPolicy,
      PreparedYamlParsingPolicy). For callables that are pure functions rather
      than plugin policies, `<VerbNoun>Fn` suffix is recommended.
    examples:
      - file: scanner_data/contracts_request.py
        location: "src/prism/scanner_data/contracts_request.py"
        snippet: "class PreparedTaskAnnotationPolicy(Protocol): ..."
    prevalence: common

