gaps:
  - area: build_collection_scan_result return annotation
    description: >
      build_collection_scan_result in scanner_io/collection_payload.py is annotated
      -> dict[str, Any] but already builds and returns the CollectionScanResult shape.
      The Protocol for build_collection_scan_result_fn must return CollectionScanResult
      (because scan_collection's return type is CollectionScanResult and it returns
      build_collection_scan_result_fn(...) directly). Updating the concrete annotation
      is required before adding the Protocol.
    impact: decision_blocker
    affects:
      - src/prism/scanner_io/collection_payload.py
      - src/prism/api_layer/collection.py
      - Protocol: BuildCollectionScanResultFn

  - area: lambda type inference for render/write callables
    description: >
      The two lambda concretes in api.py use bare lambda syntax without type
      annotations (render lambda) and **kwargs (write lambda). mypy cannot infer
      their signatures from the lambda literal. This means the Protocol types will
      serve as the checked interface at the declaration point in api_layer/collection.py,
      but mypy will not independently verify the lambda bodies in api.py against the
      Protocol. A typed partial or a named helper function at the api.py call site
      would give stronger static verification.
    impact: nice_to_know
    affects:
      - src/prism/api.py (render_collection_role_readme_fn and write_collection_runbook_artifacts_fn lambdas)
