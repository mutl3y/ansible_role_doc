pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Helper-boundary extraction changes strict/non-strict fallback envelopes or causes a second plugin preflight invocation.
      likelihood: medium
      impact: high
      mitigation: Keep wave 1 limited to `_orchestrate_with_scan_pipeline_plugin` ownership, leave API context construction untouched, and gate on focused API/kernel orchestration tests.
    - scenario: Prepared policy bundle drifts from current resolver behavior and regresses the first adopted consumer path.
      likelihood: medium
      impact: high
      mitigation: Limit wave 2 to the request/schema carrier plus variable-discovery adoption only, preserve current DI/default resolution as the preparation source, and gate on focused variable-discovery coverage.
    - scenario: Implementing policy_context.selection.plugin reorders routing unexpectedly and changes fallback behavior for callers that rely on current platform/default behavior.
      likelihood: low
      impact: high
      mitigation: Land selection-order alignment only after wave 1 centralizes the runtime helper seam, and keep the request-option override plus existing strict/non-strict fallback contracts unchanged.
  assumptions:
    - Existing fsrc tests are the authoritative behavior baseline for these slices.
    - Public callable signatures in fsrc/src/prism/api.py must remain stable across all waves.
    - src_do_not_use is a hard no-edit boundary and never participates in implementation or verification changes.

implementation_specification:
  code_structure: >-
    Keep the plan fsrc-only and seam-first. In wave 1, extract only the
    `_orchestrate_with_scan_pipeline_plugin` behavior behind a neutral runtime helper
    boundary while leaving API scan-context construction and higher-level run_scan
    orchestration ownership unchanged. In wave 2, carry a prepared policy bundle
    through the canonical request/schema seam and adopt it only in the
    variable-discovery consumer path. In wave 3, align router selection order with
    `policy_context.selection.plugin` directly from the wave-1 helper boundary,
    without waiting on unrelated consumer adoption.
  affected_areas:
    - fsrc/src/prism/api.py
    - fsrc/src/prism/scanner_kernel/orchestrator.py
    - fsrc/src/prism/scanner_core/scan_request.py
    - fsrc/src/prism/scanner_core/variable_discovery.py
    - fsrc/src/prism/tests/test_fsrc_api_cli_entrypoints.py
    - fsrc/src/prism/tests/test_fsrc_plugin_kernel_extension_parity.py
    - fsrc/src/prism/tests/test_fsrc_variable_discovery_pipeline.py
  component_details:
    - component: API facade boundary
      responsibility: Preserve public run-scan entrypoints while keeping scan-context construction stable and delegating only the extracted runtime helper seam in wave 1.
      interfaces:
        - prism.api.run_scan
        - prism.api.scan_role
        - prism.api.scan_collection
        - prism.api.scan_repo
    - component: Runtime orchestration helper boundary
      responsibility: Own the extracted `_orchestrate_with_scan_pipeline_plugin` behavior, including selected-plugin resolution, preflight reuse, strict/non-strict plugin failure handling, and payload merge behavior.
      interfaces:
        - prism.scanner_kernel.orchestrator.resolve_scan_pipeline_plugin_name
        - prism.scanner_kernel.orchestrator.route_scan_payload_orchestration
        - prism.scanner_kernel.orchestrator.execute_scan_pipeline_plugin
    - component: Request/schema carrier
      responsibility: Carry prepared policy state and selection-order inputs through the canonical run-scan options seam without changing public signatures.
      interfaces:
        - scan_options.prepared_policy_bundle
        - prepared_policy_bundle.task_line_parsing
        - prepared_policy_bundle.jinja_analysis
        - policy_context.selection.plugin
    - component: Variable-discovery consumer adoption
      responsibility: Consume prepared task-line and Jinja policies in variable discovery while leaving other consumers unchanged for this follow-up slice.
      interfaces:
        - prism.scanner_core.variable_discovery.VariableDiscovery
  dependencies:
    - component: API facade boundary
      relationship: Delegates only the extracted runtime helper seam while keeping context construction stable in wave 1.
    - component: Runtime orchestration helper boundary
      relationship: Reads canonical scan options and preflight context, then executes payload orchestration without owning broader API context shaping.
    - component: Request/schema carrier
      relationship: Is populated from existing fsrc DI/default seams and passed forward to both consumer-adoption and selection-order slices.
    - component: Variable-discovery consumer adoption
      relationship: Reads prepared policy instances from the request/schema carrier instead of resolving defaults directly.
  integration_points:
    - fsrc canonical scan-option builder in prism.scanner_core.scan_request
    - fsrc runtime DI/plugin resolution seams in prism.scanner_plugins.defaults and prism.scanner_core.di
    - focused fsrc runtime tests for API routing, kernel routing, and variable discovery

compatibility_constraints:
  - Preserve public callable signatures and return shapes for prism.api entrypoints.
  - Preserve existing strict/non-strict fallback behavior and warning/error metadata already asserted by current fsrc tests.
  - Preserve _scan_pipeline_preflight_context reuse semantics during the routing move.
  - Do not add imports from fsrc/src/prism into src_do_not_use or src/prism.
  - Keep rollback granular so wave 1 can be retained even if later selection-order work is reverted.

