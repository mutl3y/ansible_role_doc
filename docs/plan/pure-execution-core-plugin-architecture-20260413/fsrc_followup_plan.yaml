  Execute a safe fsrc-only follow-up plan that makes the pure-execution-core design
  materially truer in seam-based slices by first extracting a neutral scan-pipeline
  runtime helper boundary, then carrying a prepared policy bundle through one
  consumer path, and independently aligning router selection with the canonical
  plugin-selection contract.
