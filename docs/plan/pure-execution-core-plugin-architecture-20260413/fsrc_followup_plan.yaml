tldr: |
  This follow-up plan keeps the work fsrc-only and intentionally small:
  1. Wave 1 extracts only the `_orchestrate_with_scan_pipeline_plugin` ownership seam into a neutral runtime helper boundary, leaving API scan-context construction unchanged.
  2. Wave 2 introduces a request/schema carrier for a prepared policy bundle and adopts it only in the variable-discovery consumer path; other consumers stay out of scope for this slice.
  3. Selection-order alignment can follow Wave 1 directly because it only depends on router/carrier seams, not on prepared-policy consumer adoption.

