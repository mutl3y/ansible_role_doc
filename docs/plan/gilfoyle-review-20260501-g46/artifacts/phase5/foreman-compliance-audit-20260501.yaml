root_cause:
  - "The foreman optimized for continuity and momentum after successful wave-1 and wave-2 execution, and let planned work masquerade as executed work."
  - "The mandatory rules existed, but they were distributed across the skill and were not being applied as a final pre-message gate."
  - "Once the top-level plan pointer drifted, chat state became easier to trust than repo state; that inverted the intended source-of-truth model."

enforcement_added:
  - "Added Foreman Compliance Checklist to the skill as a mandatory pre-message gate."
  - "Added Minimal Artifact Inventory to the skill so missing cycle-local artifacts become explicit stall signals."
  - "Added a mandatory phase-start artifact-audit rule so Phase 0 and each Phase 5 wave need a repo-backed audit artifact before any start/progress narration."
  - "Refactored the main skill to top-load a short guardrail contract and moved the full foreman execution protocol into a dedicated mandatory reference file to reduce lost-in-the-middle risk."

expected_behavior_change:
  - "Any future phase/wave claim without receipt plus artifact proof must be emitted as STALL, BLOCKED, or PAUSED instead of progress narration."
  - "Cycle-local learning and routing artifacts are now part of the explicit artifact inventory, not implicit background bookkeeping."
  - "Phase-start narration now requires a start-audit artifact on disk, so planned work cannot be described as started without a repo-backed preflight record."
  - "Critical execution rules are now surfaced near the top of the main skill and backed by a mandatory reference, reducing the chance that long mid-file procedural text dilutes the non-negotiables."
