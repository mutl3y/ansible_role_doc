findings:
  - id: G46-P0-001
    severity: high
    category: trust_boundary
    title: Importing the plugin package executes third-party entry-point code at bootstrap time
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/__init__.py
        lines: 202
        detail: DEFAULT_PLUGIN_REGISTRY is initialized at module import time.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/bootstrap.py
        lines: 195
        detail: initialize_default_registry performs entry-point discovery during bootstrap.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/discovery.py
        lines: 66
        detail: entry-point discovery calls ep.load(), which imports and executes third-party package code.
      - path: /raid5/source/test/prism/src/prism/api_layer/plugin_facade.py
        lines: 37
        detail: public registry access imports scanner_plugins.DEFAULT_PLUGIN_REGISTRY.
    impact: Any consumer that resolves the default registry crosses an uncontrolled execution boundary before explicit bootstrap consent, request validation, or runtime policy selection.
    recommendation: Move entry-point loading behind an explicit bootstrap step or startup command, and keep default imports side-effect free.

  - id: G46-P0-002
    severity: high
    category: fail_open
    title: Entry-point discovery swallows third-party bootstrap failures and keeps running with a partial registry
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/discovery.py
        lines: 66-77
        detail: ep.load() failures are logged and skipped instead of failing bootstrap.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/discovery.py
        lines: 83-87
        detail: non-callable entry points are warned and skipped.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/discovery.py
        lines: 91-105
        detail: registration-time exceptions are logged and skipped by default.
    impact: Prism can continue with an incomplete control plane after plugin bootstrap defects, silently changing which plugins are present and which fallbacks or defaults take over.
    recommendation: Make registry bootstrap fail closed by default, or at minimum gate continued startup on an explicit allow-degraded flag.

  - id: G46-P0-003
    severity: high
    category: plugin_selection
    title: Default plugin and platform resolution is order-dependent and can select an arbitrary registered plugin
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/scanner_kernel/plugin_name_resolver.py
        lines: 56
        detail: when multiple scan-pipeline plugins exist and no default is declared, the resolver chooses sorted(registered)[0].
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/registry.py
        lines: 425-436
        detail: registry default platform resolution falls back to the first key in internal plugin maps.
      - path: /raid5/source/test/prism/src/prism/scanner_core/di.py
        lines: 90
        detail: DI platform resolution consumes registry.get_default_platform_key().
    impact: Adding or renaming plugins can silently change the execution path, which is exactly the sort of trust-boundary roulette competent systems avoid.
    recommendation: Require an explicit default platform/plugin declaration whenever more than one candidate is registered.

  - id: G46-P0-004
    severity: high
    category: shared_mutable_state
    title: Runtime plugins receive and can mutate the live scan_options control plane shared across the scan
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/scanner_core/di.py
        lines: 150
        detail: DIContainer stores the caller-provided scan_options dict by reference.
      - path: /raid5/source/test/prism/src/prism/scanner_core/di.py
        lines: 169
        detail: DIContainer exposes the same dict back to callers.
      - path: /raid5/source/test/prism/src/prism/scanner_core/feature_detector.py
        lines: 87-88
        detail: feature-detection plugins receive self._options directly.
      - path: /raid5/source/test/prism/src/prism/scanner_core/variable_discovery.py
        lines: 93-98
        detail: variable-discovery plugins receive the same mutable options dict for static discovery.
      - path: /raid5/source/test/prism/src/prism/scanner_core/variable_discovery.py
        lines: 111-116
        detail: referenced-variable discovery also receives the same mutable options dict.
      - path: /raid5/source/test/prism/src/prism/scanner_core/variable_discovery.py
        lines: 137-141
        detail: unresolved-variable resolution receives the same mutable options dict again.
    impact: A plugin can mutate policy, cache inputs, or downstream routing state for later phases, creating cross-phase coupling and plugin-to-core control-plane corruption.
    recommendation: Freeze or deep-copy scan_options before passing them into plugin code, and expose only typed read-only views where possible.

  - id: G46-P0-005
    severity: high
    category: shared_mutable_state
    title: Cached scan results are stored and returned as live mutable objects
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/scanner_core/scan_cache.py
        lines: 69-71
        detail: InMemoryLRUScanCache.get returns the stored object reference directly.
      - path: /raid5/source/test/prism/src/prism/scanner_core/scan_cache.py
        lines: 79
        detail: InMemoryLRUScanCache.set stores the provided object reference directly.
      - path: /raid5/source/test/prism/src/prism/api_layer/non_collection.py
        lines: 279
        detail: run_scan returns the cached object as-is on cache hit.
      - path: /raid5/source/test/prism/src/prism/api_layer/non_collection.py
        lines: 304
        detail: run_scan stores the result object as-is into the cache.
    impact: One caller can mutate a cached payload and poison subsequent callers, creating cross-request data contamination and non-deterministic output.
    recommendation: Copy values on cache set/get or require an immutable cached payload representation.

  - id: G46-P0-006
    severity: high
    category: cache_integrity
    title: Cache-key fingerprinting collapses prepared policy objects to class names only
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/api_layer/non_collection.py
        lines: 243-261
        detail: non-primitive prepared_policy_bundle values are fingerprinted as module.qualname strings instead of state-bearing content.
      - path: /raid5/source/test/prism/src/prism/api_layer/non_collection.py
        lines: 263-276
        detail: that lossy bundle fingerprint becomes part of the cache key.
    impact: Distinct policy/plugin instances with the same class identity collide onto the same cache key, so callers can receive results computed under different policy state.
    recommendation: Either ban stateful objects from cache-key inputs or require a stable, state-aware fingerprint contract for prepared policy participants.

  - id: G46-P0-007
    severity: high
    category: fail_open
    title: Non-strict runtime mode downgrades malformed plugin construction and shape errors into default-plugin fallback
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/api_layer/non_collection.py
        lines: 341
        detail: role-scan failure_policy.strict directly controls strict_phase_failures.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/bundle_resolver.py
        lines: 102
        detail: prepared-policy resolution uses strict_phase_failures to decide plugin strictness.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/defaults.py
        lines: 200
        detail: malformed plugin shape returns the fallback plugin in non-strict mode.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/defaults.py
        lines: 226-232
        detail: construction failures log a warning and fall back to defaults instead of failing closed.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/defaults.py
        lines: 330
        detail: unresolved plugin precedence also falls back to the default plugin.
    impact: A caller asking for content-level degradation also weakens control-plane integrity, letting broken or unexpected plugins silently devolve to defaults.
    recommendation: Separate content/runtime tolerance from plugin/bootstrap integrity; malformed plugins should fail closed regardless of scan strictness.

  - id: G46-P0-008
    severity: high
    category: trust_boundary
    title: The API path-safety boundary validates only the primary target path while sibling file-path inputs are used raw
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/api.py
        lines: 90
        detail: run_scan validates only role_path.
      - path: /raid5/source/test/prism/src/prism/api.py
        lines: 172
        detail: scan_collection validates only collection_path.
      - path: /raid5/source/test/prism/src/prism/api.py
        lines: 258
        detail: scan_role validates only role_path.
      - path: /raid5/source/test/prism/src/prism/scanner_config/readme.py
        lines: 57-66
        detail: explicit config_path is accepted and returned as a raw Path without confinement to the role root.
      - path: /raid5/source/test/prism/src/prism/scanner_config/policy.py
        lines: 29
        detail: policy loaders pass config_path through to resolve_role_config_file.
      - path: /raid5/source/test/prism/src/prism/scanner_config/style_parser.py
        lines: 141
        detail: style_readme_path is opened directly with Path(style_readme_path).read_text().
    impact: The documented last-line path guard covers the headline path while related file-bearing inputs bypass it, leaving the public boundary porous.
    recommendation: Apply the same boundary validation rules to all filesystem-bearing API inputs, not just role_path and collection_path.

  - id: G46-P0-009
    severity: high
    category: fail_open
    title: Collection scans demote broad runtime failures into per-role recoverable errors and continue
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/api.py
        lines: 50-52
        detail: collection runtime recoverable errors include PrismRuntimeError and RuntimeError.
      - path: /raid5/source/test/prism/src/prism/api_layer/collection.py
        lines: 161
        detail: recoverable_scan_errors combines content and runtime recoverable classes.
      - path: /raid5/source/test/prism/src/prism/api_layer/collection.py
        lines: 199-207
        detail: recoverable scan exceptions are converted to failure records and the loop continues.
    impact: Control-plane failures inside a role scan can be quietly converted into partial collection output instead of aborting the collection run, which masks real execution defects as ordinary per-role fallout.
    recommendation: Restrict collection continuation to content/data errors; abort on runtime and plugin-contract failures.

  - id: G46-P0-010
    severity: medium
    category: fail_open
    title: README rendering silently defaults a missing platform_key to ansible
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/scanner_readme/guide.py
        lines: 68-71
        detail: identity rendering logs and defaults missing platform_key to ansible.
      - path: /raid5/source/test/prism/src/prism/scanner_readme/guide.py
        lines: 95-98
        detail: section-body rendering repeats the same ansible fallback.
    impact: Output generation silently crosses platform boundaries instead of failing when routing metadata is missing.
    recommendation: Treat missing platform_key as a contract error, not a renderer default.

  - id: G46-P0-011
    severity: medium
    category: config_fail_open
    title: Malformed policy config payloads silently revert scan-policy toggles to defaults
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/scanner_config/policy.py
        lines: 43-51
        detail: non-dict policy config roots are logged and replaced with an empty dict.
      - path: /raid5/source/test/prism/src/prism/scanner_config/policy.py
        lines: 68-77
        detail: invalid boolean coercions warn and return None.
      - path: /raid5/source/test/prism/src/prism/scanner_config/policy.py
        lines: 137-163
        detail: fail_on_unconstrained_dynamic_includes falls back to default when config is missing or coercion fails.
      - path: /raid5/source/test/prism/src/prism/scanner_config/policy.py
        lines: 167-193
        detail: fail_on_yaml_like_task_annotations also falls back to default on malformed input.
      - path: /raid5/source/test/prism/src/prism/scanner_config/policy.py
        lines: 197-223
        detail: ignore_unresolved_internal_underscore_references does the same.
    impact: Broken config does not fail closed; it quietly changes enforcement behavior back to defaults.
    recommendation: Fail configuration loading for malformed roots and invalid coercions when the value controls policy enforcement.

  - id: G46-P0-012
    severity: medium
    category: concurrency
    title: Default event listeners are process-global shared mutable state inherited by all new scans
    confidence: high
    evidence:
      - path: /raid5/source/test/prism/src/prism/scanner_core/events.py
        lines: 146
        detail: default listeners are held in a process-global list.
      - path: /raid5/source/test/prism/src/prism/scanner_core/events.py
        lines: 150-169
        detail: listeners are globally registered and unregistered.
      - path: /raid5/source/test/prism/src/prism/scanner_core/di.py
        lines: 163
        detail: every new DIContainer inherits the current default listener set.
      - path: /raid5/source/test/prism/src/prism/progress.py
        lines: 47-56
        detail: CLI progress reporting mutates the global listener set for the duration of a context manager.
    impact: Concurrent or nested scans in the same process can leak observability state across requests and deliver events to the wrong listener.
    recommendation: Move default listeners behind explicit per-run wiring, or scope them to a request-local context instead of process-global state.

  - id: G46-P0-013
    severity: medium
    category: concurrency
    title: Default registry bootstrap is unsynchronized despite side-effectful initialization
    confidence: medium
    evidence:
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/bootstrap.py
        lines: 23
        detail: the singleton registry reference is a plain module-global variable.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/bootstrap.py
        lines: 64
        detail: initialization checks the singleton without any lock.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/bootstrap.py
        lines: 195
        detail: initialization performs side-effectful entry-point discovery before publication.
      - path: /raid5/source/test/prism/src/prism/scanner_plugins/bootstrap.py
        lines: 203
        detail: the singleton is published only after all side effects complete, still without synchronization.
    impact: Concurrent first-use can race through duplicate bootstrap work, including repeated entry-point discovery and registration attempts.
    recommendation: Guard initialize_default_registry with a lock or one-time initialization primitive.

  - id: G46-P0-014
    severity: medium
    category: repo_boundary
    title: scan_repo treats any existing local filesystem path as a repo_url and bypasses clone semantics
    confidence: medium
    evidence:
      - path: /raid5/source/test/prism/src/prism/repo_services.py
        lines: 155-156
        detail: if repo_url exists locally, resolve_repo_scan_target uses it as repo_root directly.
      - path: /raid5/source/test/prism/src/prism/repo_services.py
        lines: 189-190
        detail: lightweight_readme_only can then widen the scan target from repo_role_path to the repo root.
    impact: The public repo-scan surface silently shifts from remote-repo intake to arbitrary local filesystem scanning, bypassing clone/ref/timeout semantics.
    recommendation: Separate local-path scanning from repo-url scanning into distinct public APIs or require an explicit opt-in for local-path mode.
