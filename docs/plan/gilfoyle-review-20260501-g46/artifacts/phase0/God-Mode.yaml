findings:
  - id: G46-H01
    severity: High
    category: input-validation
    confidence: High
    file: src/prism/repo_services.py
    line: 114
    title: Repo-scoped paths are resolved outside the checkout root without containment checks
    evidence: >-
      resolve_repo_scan_target computes role_path as (repo_root / repo_role_path).resolve()
      and repo_style_readme_path the same way, then only checks exists/is_dir or
      exists/is_file. There is no relative_to(repo_root) check and no reuse of the
      existing path_safety allowed-root guard. api.scan_repo and the CLI forward these
      inputs directly into repo_services.
    impact: >-
      A caller can supply repo_role_path values such as ../../.. or absolute paths and
      make a repo scan operate on directories outside the cloned repository. The same
      bug lets repo_style_readme_path point at arbitrary local files, turning a repo-
      scoped operation into host file disclosure and incorrect review output.
    recommendation: >-
      Treat repo_role_path and repo_style_readme_path as repository-relative inputs:
      reject absolute paths, resolve them against repo_root, require the resolved target
      to stay under repo_root, and add regression tests for ../ and absolute-path cases.

  - id: G46-H02
    severity: High
    category: command-execution
    confidence: Medium
    file: src/prism/repo_services.py
    line: 67
    title: clone_repo allows Git option injection because repo_url is passed without a -- delimiter
    evidence: >-
      clone_repo builds ['git', 'clone', '--depth', '1'] plus optional --branch and then
      appends repo_url directly before the destination path. There is no validation that
      repo_url does not start with '-' and no '--' separator to force Git to stop option
      parsing. Existing tests only prove shell metacharacters are not interpreted by a
      shell; they do not cover leading-dash arguments parsed by Git itself.
    impact: >-
      A crafted repo_url beginning with '-' is treated as additional git clone flags
      rather than data. That lets an attacker alter clone behavior, inject Git options,
      and potentially trigger local helper execution or unexpected transport/config paths
      instead of cloning the intended repository.
    recommendation: >-
      Insert '--' before repo_url after all intended clone options, or reject repo_url
      values that begin with '-'. Add a regression test that passes a leading-dash
      repo_url and asserts Prism rejects it before invoking git.

  - id: G46-H03
    severity: High
    category: path-traversal
    confidence: High
    file: src/prism/scanner_plugins/ansible/default_policies.py
    line: 101
    title: include_vars targets can escape the role root and are then loaded as trusted variable files
    evidence: >-
      AnsibleDefaultVariableExtractorPolicyPlugin.collect_include_vars_files resolves
      include_vars values against task_file.parent and accepts any resulting file that
      exists, with no relative_to(role_root) containment check. variable_discovery then
      iterates those returned paths and passes each candidate into
      _load_yaml_mapping_with_metadata for parsing and merge. In the same codebase,
      task_file_traversal._resolve_task_include explicitly rejects resolved files outside
      role_root, which makes this missing boundary check stand out even more.
    impact: >-
      A malicious role can point include_vars at ../../../host.yml or an absolute path,
      causing the scanner to read YAML outside the role tree and merge it into discovered
      variables. That corrupts scan results and can disclose host-side YAML content in
      generated reports or diagnostics.
    recommendation: >-
      Apply the same containment rule used for task includes: reject absolute or resolved
      include_vars targets that do not stay under role_root, and add traversal tests for
      ../ and absolute-path include_vars inputs.

  - id: G46-M01
    severity: Medium
    category: correctness
    confidence: High
    file: src/prism/scanner_extract/discovery.py
    line: 58
    title: Non-strict discovery paths silently convert parse and IO failures into empty metadata, requirements, and variable sets
    evidence: >-
      load_meta, load_requirements, and load_variables return {} or [] on YAML/IO errors
      whenever strict=False, and load_yaml_file itself already collapses parser and IO
      failures into None. scan_facade_helpers.collect_role_contents and
      compute_quality_metrics call these helpers without strict mode, so malformed role
      inputs are reduced to missing data plus warnings instead of a hard failure.
    impact: >-
      Comparison and auxiliary scan outputs can report incomplete or deceptively clean
      results for broken roles because invalid metadata, requirements, or vars are simply
      dropped. That is durable false confidence, not graceful degradation.
    recommendation: >-
      Preserve a typed failure record in the returned payload for these paths or promote
      malformed metadata/requirements/variable files to explicit scan degradation signals
      that downstream consumers cannot mistake for absence of data.
