plan_id: "gilfoyle-review-20260426-g17"
target: "src/prism/"
reviewer: "Gilfoyle"
date: "2026-04-26"
grade: "B+"
summary: "Performance axis: 4 concrete hot-path wins — redundant regex compilation, uncached builtin policy loading, dual file-read in feature detection, inline pattern literals in loops. All are low-risk annotation-only or small-function changes. Two deferred: PolicyBackedProxy intentional DI pattern; module-level DEFAULT_PLUGIN_REGISTRY intentional singleton."

findings:

  # ── PERFORMANCE / CACHING ─────────────────────────────────────────────────

  - id: FIND-G17-01
    category: performance
    severity: high
    status: closed
    title: "get_marker_line_re() recompiles regex on every call; called per scan file"
    description: >
      marker_utils.py:35 — get_marker_line_re(marker_prefix) calls re.escape() + re.compile()
      on every invocation. It is called from annotation_parsing.py:80 inside
      extract_task_annotations_for_file(), which is called once per task file during both
      feature detection and task catalog assembly. For a role with 50 task files, that is
      50 redundant re.compile() calls with the same input. The function is pure: same
      marker_prefix always produces the same pattern.
    affected_files:
      - src/prism/scanner_plugins/parsers/comment_doc/marker_utils.py
    needs_investigation: false
    decision: "Add @functools.cache to get_marker_line_re(). Add 'import functools' if absent."
    decision_rationale: "Pure function, hashable input (str), deterministic output. Cache is safe."
    closed_evidence: "commit e89c5ab — gate GREEN (959/959, ruff, black, mypy delta=0)"

  - id: FIND-G17-02
    category: performance
    severity: high
    status: closed
    title: "_load_builtin_policy() globs + yaml.safe_load per file on every load_pattern_config() call"
    description: >
      patterns.py:97 — _load_builtin_policy() calls _BUILTIN_DATA_DIR.glob('*.yml'), then
      _load_yaml() + _deep_merge() for each file on every invocation. load_pattern_config()
      calls _load_builtin_policy() every time it is called, and load_pattern_config is called
      once per scan at scan setup. For a multi-role collection scan, this repeats the full
      glob + N loads + N deep_merges on every scan. The builtin data directory is read-only
      at runtime (package data); the result is deterministic with no arguments.
    affected_files:
      - src/prism/scanner_config/patterns.py
    needs_investigation: false
    decision: "Add @functools.cache to _load_builtin_policy(). Add 'import functools' if absent. The function takes no arguments so the cache key is trivial."
    decision_rationale: "No arguments, package-data input, immutable at runtime. Cache is safe and effective."
    closed_evidence: "commit e89c5ab — gate GREEN (959/959, ruff, black, mypy delta=0)"

  - id: FIND-G17-03
    category: performance
    severity: high
    status: closed
    title: "feature_detection.detect_features() reads every task file twice"
    description: >
      feature_detection.py:80 first loop calls load_task_yaml_file(task_file, di=self._di)
      which internally calls read_text() to parse YAML. The second loop (line 120) calls
      task_file.read_text(encoding='utf-8').splitlines() again on the same file for
      raw-line annotation extraction. For a role with N task files, this is 2N file reads
      instead of N. The raw lines are only used in the second pass and are not stored from
      the first pass.
    affected_files:
      - src/prism/scanner_plugins/ansible/feature_detection.py
    needs_investigation: false
    decision: >
      In the first loop, also collect raw_lines via try/except read_text() and store in a
      dict[Path, list[str]] keyed by task_file. The second loop reads from this dict instead
      of calling read_text() again. The DI-injected YAML parsing path (load_task_yaml_file)
      is preserved; only the redundant raw-text re-read is eliminated.
    decision_rationale: "Same file, same content — no reason to read twice. Dict lookup replaces OS syscall."
    closed_evidence: "commit e89c5ab — gate GREEN (959/959, ruff, black, mypy delta=0)"

  - id: FIND-G17-04
    category: performance
    severity: medium
    status: closed
    title: "style_parser.py: 8+ inline regex literals compiled per call inside per-line loops"
    description: >
      scanner_config/style_parser.py contains 8 distinct inline re.match()/re.search() calls
      inside detect_style_section_level() and parse_style_readme(). These compile a new Pattern
      object on every invocation. detect_style_section_level() is called once per style guide
      parse, and parse_style_readme() is called once per scan (or per role). The fence-detection
      pattern (r'^\\s*([`~]{3,})') appears twice identically. The setext-h2 pattern (r'^-+$')
      appears twice identically. Hoisting to module-level named constants also removes the
      duplication.
    affected_files:
      - src/prism/scanner_config/style_parser.py
    needs_investigation: false
    decision: >
      Extract all 8 inline patterns to module-level re.compile() constants with descriptive names:
      _FENCE_RE, _SETEXT_H2_RE, _SETEXT_H1_RE, _ATX_HEADING_DETECT_RE, _ATX_HEADING_RE,
      _TABLE_ROW_RE, _BULLET_VAR_RE, _BULLET_DEFAULT_RE. Replace all inline re.match/re.search
      calls with references to these constants. The two duplicate patterns become shared references.
    decision_rationale: "Module-level compiled patterns eliminate repeated re.compile() overhead and remove the duplicate pattern duplication."
    closed_evidence: "commit e89c5ab — gate GREEN (959/959, ruff, black, mypy delta=0)"

  - id: FIND-G17-05
    category: performance
    severity: medium
    status: closed
    title: "_normalize_style_heading() executes 3 inline re.sub() calls per invocation"
    description: >
      style_parser.py:18 — _normalize_style_heading() calls re.sub() three times with inline
      pattern literals (strip markdown links, normalize non-alphanum chars, collapse whitespace).
      Called once per section heading during style guide parse. Not a per-task-line hot path,
      but the inline patterns are compiled on every call and the function is also used by
      build_section_title_stats() in a loop over all sections.
    affected_files:
      - src/prism/scanner_config/style_parser.py
    needs_investigation: false
    decision: "Extract the 3 patterns to module-level constants: _MARKDOWN_LINK_RE, _NON_ALPHANUM_RE, _WHITESPACE_RE. Already covered by FIND-G17-04 fix wave — handle in the same edit."
    decision_rationale: "Same file, same fix class. Bundle with FIND-G17-04 to keep the wave atomic."
    closed_evidence: "commit e89c5ab — gate GREEN (959/959, ruff, black, mypy delta=0)"

  # ── DEFERRED ─────────────────────────────────────────────────────────────

  - id: FIND-G17-D01
    category: performance
    severity: low
    status: deferred
    title: "DEFAULT_PLUGIN_REGISTRY = bootstrap_default_plugins() runs at module import"
    description: >
      scanner_plugins/__init__.py:179 — bootstrap_default_plugins() runs the full plugin
      registration loop at module import. This is the intentional singleton pattern: the
      module-level registry is the DI default. Changing to lazy init would require all
      callers to call an accessor function, breaking the simple module-attribute access pattern
      that tests and DI rely on.
    decision: "Defer — intentional singleton. Only re-flag if bootstrap cost becomes measurable in profiling."
    closed_evidence: null

  - id: FIND-G17-D02
    category: performance
    severity: medium
    status: deferred
    title: "task_line_parsing.py PolicyBackedProxy calls require_prepared_policy() on every method call"
    description: >
      _PolicyBackedRegexProxy._current_regex() and _PolicyBackedCollectionProxy._current_value()
      each call require_prepared_policy(None, 'task_line_parsing', 'task_line_parsing') on every
      match/search/__contains__ invocation. These proxies are module-level constants used for
      test injection of task-line parsing policy. The per-call resolution is the intentional
      mechanism that allows tests to swap the policy without reinitialising the module.
    decision: "Defer — intentional proxy pattern for DI test injection. Caching would break test isolation."
    closed_evidence: null
