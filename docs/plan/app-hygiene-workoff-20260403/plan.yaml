    result: pass
    summary: 90 modules imported, 0 failures after correcting scanner_compat import routing.
  - command: pytest -q src/prism/tests/test_cli_api_architecture_guardrails.py src/prism/tests/test_scanner_architecture_guardrails.py
    result: pass
    summary: 21 passed
  - command: pytest -q src/prism/tests/test_module_public_api_guardrails.py
    result: pass
    summary: 18 passed
  - command: rg scans over docs and source ownership language
    result: findings
    summary: active docs and source docstrings still contain shorthand package labels and a few retired module references.

current_state_findings:
  - finding_id: H1
    severity: high
    summary: Repo-wide package importability is not yet protected by a dedicated automated gate.
    evidence:
      - A latent `prism.scanner_compat` import-surface issue was discovered only during ad hoc `PYTHONPATH=src python3` package import smoke.
      - Existing focused architecture tests stayed green while that import-path issue still existed.
    implication: Similar package-boundary regressions can escape until someone manually imports the affected package.

  - finding_id: H2
    severity: medium
    summary: Runtime public-API guardrails are inconsistent across packages.
    evidence:
      - "`prism.scanner_core`, `prism.scanner_data`, `prism.scanner_extract`, and `prism.scanner_readme` enforce `__all__` plus runtime `__getattr__/__dir__`."
      - "`prism.api_layer`, `prism.cli_app`, `prism.repo_layer`, `prism.scanner_analysis`, `prism.scanner_io`, `prism.scanner_config`, and `prism.scanner_compat` do not yet provide the same runtime enforcement pattern."
    implication: Boundary behavior is harder to reason about consistently, and some packages still rely only on convention/tests rather than runtime guardrails.

  - finding_id: H3
    severity: medium
    summary: Active documentation still mixes shorthand package labels with fully qualified ownership language.
    evidence:
      - "`docs/dev_docs/modernization-plan-v2.md` still presents the active package map as `scanner_core/`, `scanner_data/`, and similar shorthand labels."
      - "The repo now has an explicit naming rule preferring fully qualified package names such as `prism.scanner_core` and `prism.api_layer`."
    implication: Onboarding and extension guidance can drift away from the actual import/package contract.

  - finding_id: H4
    severity: low
    summary: Some source docstrings still reference retired or pre-split module maps.
    evidence:
      - "`src/prism/scanner_core/feature_detector.py` still mentions `scanner_submodules`."
      - "`src/prism/scanner_core/variable_discovery.py` still mentions `scanner_dataload.py`, `scan_discovery.py`, and slash-style package references."
    implication: Engineers reading the source can get stale guidance even when higher-level docs are current.

recommended_target_shape:
  validation:
    - repo-wide non-test package import smoke is an explicit automated gate
    - package boundary guardrail coverage is consistent and intentional across the package set
  documentation:
    - active docs use fully qualified package names where the ownership contract matters
    - source docstrings describe the current package-owned architecture rather than retired execution history
  governance:
    - newly discovered hygiene regressions are caught by focused tests before they become onboarding or refactor hazards

execution_policy:
  change_unit: small hygiene slices with explicit guardrail additions
  commit_template: "hygiene(<wave_id>/<task_id>): <short outcome>"
  priority_rules:
    - add permanent verification before or alongside source cleanup when a latent issue was discovered ad hoc
    - prefer current architecture truth over historical terminology in active docs and docstrings
    - make package-boundary rules explicit when they are intended to be invariant
  telemetry:
    - count of non-test prism modules covered by import smoke
    - count of packages with runtime public-API guardrails
    - count of active docs using shorthand package labels where fully qualified names should be used
    - count of source docstrings referencing retired module maps

