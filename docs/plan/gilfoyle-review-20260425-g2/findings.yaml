findings:

  - id: FIND-G2-01
    title: "AnsibleDefault* policy classes live in `scanner_plugins/policies/` but are Ansible-shaped"
    category: ownership
    severity: high
    files:
      - src/prism/scanner_plugins/policies/extract_defaults.py
    evidence: |
      `AnsibleDefaultTaskLineParsingPolicyPlugin`, `AnsibleDefaultTaskAnnotationPolicyPlugin`,
      `AnsibleDefaultTaskTraversalPolicyPlugin`, `AnsibleDefaultVariableExtractorPolicyPlugin`
      live under `scanner_plugins.policies` (the platform-agnostic namespace) but import from
      `scanner_plugins.ansible.task_traversal_bare` and use Ansible-specific helpers. The
      `test_no_ansible_builtin_in_module_constants` neutrality test only checks for
      `ansible.builtin.` strings in module-level constants of `extract_defaults.py` — it
      does NOT cover imports or class behavior. The class names admit it themselves: they
      are prefixed `Ansible`. The namespace lies.
    investigation_outcome: |
      Resolves the open architecture question recorded in g1 digest. The cleanest fix:
      move the `AnsibleDefault*` classes into `scanner_plugins/ansible/extract_defaults.py`
      and route through the registry from `scanner_plugins/defaults.py`. Keeps the generic
      baseline in policies/ (just constants + helpers, no plugin classes), and Ansible owns
      its plugin classes in its own namespace.
    proposed_fix: |
      Move `AnsibleDefault*` classes from `scanner_plugins/policies/extract_defaults.py`
      into `scanner_plugins/ansible/default_policies.py`. Update import in
      `scanner_plugins/defaults.py`. Update `scanner_plugins/policies/__init__.py` exports.
      Verify `test_no_ansible_builtin_in_module_constants` still passes (it should — the
      neutrality contract is about constants, not class location).
    status: closed

  - id: FIND-G2-02
    title: "Weak `Callable[..., Any]` aliases at DI / orchestrator boundary should be Protocols"
    category: abstraction
    severity: high
    files:
      - src/prism/scanner_core/di.py
      - src/prism/scanner_core/execution_request_builder.py
      - src/prism/scanner_kernel/kernel_plugin_runner.py
      - src/prism/scanner_kernel/orchestrator.py
      - src/prism/scanner_kernel/plugin_name_resolver.py
    evidence: |
      Concrete sites (line refs from sweep):
        - di.py L68:  factory_overrides: dict[str, Callable[..., Any]] | None
        - di.py L195: factory_blocker_fact_builder() -> Callable[..., Any]
        - execution_request_builder.py L61: variable_discovery_cls: Callable[..., Any]
        - execution_request_builder.py L62: feature_detector_cls: Callable[..., Any]
        - execution_request_builder.py L199: di_container_cls: Callable[..., Any]
        - execution_request_builder.py L201: scanner_context_cls: Callable[..., ScannerContext]
        - kernel_plugin_runner.py L13: load_plugin_fn: Callable[[str], Any]
        - orchestrator.py L191: kernel_orchestrator_fn: Callable[..., dict[str, Any]]
        - orchestrator.py L285: load_plugin_fn: Callable[[str], Any]
        - plugin_name_resolver.py L157: kernel_orchestrator_fn: Callable[..., dict[str, Any]]
      All of these cross a layer boundary (DI ↔ orchestrator, kernel ↔ plugin loader)
      and have a concrete implementation class on the other side. Protocols with named
      methods document the contract; `Callable[..., Any]` documents nothing.
    proposed_fix: |
      Add a `scanner_core/protocols_runtime.py` (or extend scanner_data) defining:
        - PluginLoader (load_plugin_fn protocol)
        - KernelOrchestrator (kernel_orchestrator_fn protocol)
        - DIContainerFactory (di_container_cls)
        - VariableDiscoveryFactory / FeatureDetectorFactory (the *_cls aliases)
        - BlockerFactBuilderFactory
      Update annotations at the call sites. Existing call shapes preserved; only types change.
    status: closed

  - id: FIND-G2-03
    title: "`JINJA_*` regexes owned by scanner_extract and duplicated; belong in parsers/jinja"
    category: ownership_duplication
    severity: medium
    files:
      - src/prism/scanner_extract/variable_extractor.py
      - src/prism/scanner_extract/variable_helpers.py
      - src/prism/scanner_extract/__init__.py
    evidence: |
      `JINJA_IDENTIFIER_RE = re.compile(r"\b([A-Za-z_][A-Za-z0-9_]*)\b")` is defined at
      both variable_extractor.py:34 and variable_helpers.py:142 with identical bodies.
      `JINJA_VAR_RE` is also defined in scanner_extract/variable_extractor.py:33 and
      re-exported from `scanner_extract/__init__.py`. Jinja parsing concerns belong in
      `scanner_plugins.parsers.jinja`, not in the extract layer.
    proposed_fix: |
      Move canonical `JINJA_VAR_RE` and `JINJA_IDENTIFIER_RE` definitions to
      `scanner_plugins/parsers/jinja/__init__.py` (or a new patterns.py inside that pkg).
      Re-export from `scanner_extract.variable_extractor` and `scanner_extract.variable_helpers`
      to preserve back-compat. Verify `test_package_export_parity.py` JINJA_* assertions stay green.
    status: closed

  - id: FIND-G2-04
    title: "Ansible-shaped literal `\"tasks/\"` hardcoded in scanner_core/variable_discovery.py"
    category: ownership
    severity: medium
    files:
      - src/prism/scanner_core/variable_discovery.py
    evidence: |
      Line 140: `provenance_source_file("tasks/")` — bakes the Ansible role-layout
      directory name into scanner_core. This is exactly the kind of platform-leak
      that the scanner-core-genericization closure was meant to eliminate (per AGENTS.md).
      Other platforms (Kubernetes manifests, Terraform modules) do not have a "tasks/"
      directory.
    proposed_fix: |
      Two options:
      (a) Pass the unresolved-source label through from the variable discovery plugin
          (each plugin owns its own source labels — Ansible says "tasks/", Kubernetes
          would say "manifests/").
      (b) Use a generic constant like "<unresolved>" or omit provenance_source_file
          entirely for unresolved referenced names.
      Recommend (a). `AnsibleVariableDiscoveryPlugin.resolve_unresolved_variables` already
      returns reasons; extend the contract to also return a source-file label per name,
      with sensible default.
      Defer the contract change to a follow-up if it turns out to require tests touch;
      do (b) in g2 to remove the literal cleanly.
    status: closed

  - id: FIND-G2-05
    title: "Stale `fsrc`-lane naming in test scaffolding post-promotion"
    category: test_gap
    severity: low
    files:
      - src/prism/tests/test_import_style_guardrails.py
      - src/prism/tests/test_package_import_smoke.py
    evidence: |
      Post fsrc→src promotion (2026-04-22), these tests still carry the old vocabulary:
        - test_import_style_guardrails.py: `FSRC_RUNTIME_ROOT`, `FSRC_FORBIDDEN_PATH_TOKENS`,
          test name `test_fsrc_runtime_modules_do_not_contain_hardcoded_src_path_tokens`.
          Forbidden tokens still include `"src/prism"` — but src IS now the canonical lane.
          This test is structurally wrong post-promotion: it would forbid the canonical
          path. Currently passes only because tests/ are excluded from the walk.
        - test_package_import_smoke.py: `_prefer_fsrc_prism_on_sys_path`, `FSRC_SOURCE_ROOT`,
          tests `test_fsrc_prism_package_root_imports_cleanly`, `test_fsrc_lane_imports_cli_and_api_shells`,
          and `test_fsrc_lane_cannot_import_src_only_submodules` — all reference a removed
          dual-lane reality.
    proposed_fix: |
      test_import_style_guardrails.py:
        - Rename `FSRC_*` → drop the prefix (RUNTIME_ROOT, FORBIDDEN_PATH_TOKENS, …).
        - Remove `"src/prism"`, `"src\\prism"`, `"/src/prism"`, `"\\src\\prism"` from
          forbidden tokens (those are now canonical paths). Keep `"fsrc/prism_next"`
          retired-stub guardrail.
        - Rename test function to drop `fsrc_`.
      test_package_import_smoke.py:
        - Rename helpers and tests to drop `fsrc_`.
        - Delete `test_fsrc_lane_cannot_import_src_only_submodules` — assertion that
          `prism.scanner` raises ModuleNotFoundError no longer reflects an architectural
          contract; it just measures that nobody re-added a top-level scanner.py module.
          That's a legitimate guardrail BUT name it accordingly:
          `test_no_top_level_scanner_module_in_canonical_lane`.
    status: closed

