context: >
  Per user standing directive (2026-04-25, recorded in focus-axis-log.yaml under
  g7b): "no deprecation cycle, delete on relocation". The g7b implementation
  commit (2182bb4) left three deprecation shims in scanner_plugins/policies/
  (annotation_parsing.py, extract_defaults.py, constants.py) and an
  __init__.py façade re-exporting four Ansible default-policy classes plus a
  Jinja and YAML parser plugin. The g7b ledger explicitly scheduled them for
  "removal one release post-this commit". g9 honours that schedule.

  The user vision (2026-04-25): "core components need to be clean of platform
  related code that should belong in the plugins... I envisioned all this would
  be plug and play by now." A façade directory named "policies" that holds zero
  policy logic and only re-exports ansible/parsers ownership undermines that
  vision by presenting a fake home for plugins.

