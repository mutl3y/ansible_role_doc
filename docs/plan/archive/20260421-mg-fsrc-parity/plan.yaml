plan_id: 20260421-mg-fsrc-parity
objective: >
  Implement fsrc parity for MG-02, MG-04, MG-05, MG-06, MG-08, MG-10, MG-11,
  MG-12, MG-13. Explicitly exclude MG-03 and MG-09 (feedback loop — being
  redesigned as Policy as Code audit plugin).
created_at: "2026-04-21"
created_by: PLANNER
status: closed
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 5
  risk_score: medium

tldr: |
  Port 9 surface-area gaps from src/ to fsrc/src/prism/ in four sequential waves.
  Wave 1 handles three independent quick-wins (version string, payload alias
  normalization, render_compat wrappers). Wave 2 adds filter scanning, style guide
  resolution, and the role-comparison facade (MG-06 depends on MG-04). Wave 3
  completes the full scanner_config package (constants, loaders, pattern policy,
  policy toggles, README section config — MG-02 and MG-08 combined). Wave 4
  extracts cli_app helpers (runtime, presenters, shared) from inline fsrc/cli.py
  definitions. All changes target fsrc/src/prism/ only; src/ is frozen. Gate after
  each wave: PYTHONPATH=fsrc/src .venv/bin/python -m pytest fsrc/src/prism/tests/ -q
  + ruff check fsrc/src/prism + black --check fsrc/src/prism.

open_questions:
  - question: Does fsrc/src/prism/errors.py export normalize_metadata_warnings?
    context: >
      api_layer/common.py in src imports normalize_metadata_warnings from
      prism.errors. MG-11 task must confirm this exists in fsrc before porting.
    type: research
    affects: [mg11-payload-normalization]

  - question: Does fsrc/src/prism/feedback.py exist?
    context: >
      resolve_include_collection_checks in cli_app/shared.py depends on
      prism.feedback. If absent in fsrc the function must be stubbed or omitted.
      MG-09 is explicitly excluded, so prism.feedback is unlikely to be ported.
    type: research
    affects: [mg10-cli-app-helpers]

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: >
        scanner_config/patterns.py port introduces live network calls into tests
        because fetch_remote_policy is called with a default URL rather than
        being stubbed.
      likelihood: low
      impact: high
      mitigation: >
        fetch_remote_policy accepts an injectable URL parameter. Test helpers
        must stub the network path. Never call with a live URL in tests. Gate
        checks must pass offline.

    - scenario: >
        MG-06 (scan_facade_helpers) ports collect_scan_artifacts and
        apply_style_and_comparison_metadata in full, inadvertently pulling in
        too many orchestrator-layer dependencies that break fsrc DI contracts.
      likelihood: medium
      impact: medium
      mitigation: >
        Scope wave 2 MG-06 task to ONLY collect_role_contents,
        compute_quality_metrics, and build_comparison_report. Defer
        apply_style_and_comparison_metadata and collect_scan_artifacts to a
        future wave if needed. Verify orchestrator wiring before exposing via
        api.py.

    - scenario: >
        MG-13 render_compat adds private helper functions directly to
        fsrc/scanner_readme/render.py and guide.py in a way that changes
        their public API surface or triggers parity test failures.
      likelihood: low
      impact: medium
      mitigation: >
        Add the three missing private functions (_generated_merge_markers,
        _strip_prior_generated_merge_block, _render_guide_identity_sections)
        as private (underscore-prefixed) additions only. Do not remove or rename
        any existing functions. Run parity tests after each file change.

    - scenario: >
        Wave 3 scanner_config port misses an internal import chain so that
        readme.py or patterns.py fails at runtime when the new package is used
        from fsrc/api.py or fsrc/cli.py.
      likelihood: medium
      impact: high
      mitigation: >
        Port files in strict dependency order within wave 3:
        section.py + legacy_retirement.py → marker.py + policy.py → readme.py
        → style.py (extending MG-05 stub) → patterns.py → __init__.py.
        Validate each file's imports compile before moving to the next.

  assumptions:
    - All target modules are stdlib or PyYAML only — no new pip dependencies required.
    - fsrc/src/prism/errors.py exposes the same error codes as src/prism/errors.py (high confidence).
    - prism.feedback does NOT exist in fsrc; resolve_include_collection_checks is excluded from MG-10 scope.
    - MG-03 and MG-09 are deliberately excluded from this plan and must not be touched.
    - The gate is run from the repo root: PYTHONPATH=fsrc/src .venv/bin/python -m pytest fsrc/src/prism/tests/ -q.

