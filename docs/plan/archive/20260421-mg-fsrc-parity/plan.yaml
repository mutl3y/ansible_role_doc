      fsrc/src/prism/scanner_compat/__init__.py  — package root
      fsrc/src/prism/scanner_compat/render_compat.py  — 9 public wrappers

    Wave 2 adds scanner_extract and scanner_core surface areas:
      fsrc/src/prism/scanner_extract/filter_scanner.py  — filter scan logic
      fsrc/src/prism/scanner_config/__init__.py          — empty stub (for MG-05)
      fsrc/src/prism/scanner_config/style.py             — resolve_default_style_guide_source
