      fsrc/src/prism/cli_app/__init__.py
      fsrc/src/prism/cli_app/runtime.py
      fsrc/src/prism/cli_app/presenters.py
      fsrc/src/prism/cli_app/shared.py
      fsrc/src/prism/cli.py                 — import from cli_app, remove inlined constants

  affected_areas:
    - fsrc/src/prism/__init__.py
    - fsrc/src/prism/api.py
    - fsrc/src/prism/api_layer/common.py (new)
