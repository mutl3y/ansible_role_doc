      fsrc/src/prism/scanner_config/marker.py
      fsrc/src/prism/scanner_config/policy.py
      fsrc/src/prism/scanner_config/readme.py
      fsrc/src/prism/scanner_config/patterns.py
      fsrc/src/prism/scanner_config/__init__.py  — full re-export
      fsrc/src/prism/cli.py                      — wire --policy-config to loader

