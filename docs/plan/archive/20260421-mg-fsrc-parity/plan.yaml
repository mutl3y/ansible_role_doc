    - fsrc/src/prism/scanner_readme/render.py
    - fsrc/src/prism/scanner_readme/guide.py
    - fsrc/src/prism/scanner_compat/ (new package)
    - fsrc/src/prism/scanner_extract/filter_scanner.py (new)
