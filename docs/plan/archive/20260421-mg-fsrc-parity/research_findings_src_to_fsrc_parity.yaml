# ─────────────────────────────────────────────────────────────
# MG-12: __version__ in fsrc
# ─────────────────────────────────────────────────────────────
mg_12_version:
  summary: >
    src/prism/__init__.py does not exist at all (the file is absent from the
    src/ tree). Version is only defined in setup.cfg (version = 0.1.0) and
    pyproject.toml (version = "0.1.0"). fsrc/__init__.py exists but contains
    only a module-level docstring — no __version__ attribute.

  src_implementation:
    file: src/prism/__init__.py
    status: FILE_DOES_NOT_EXIST
    version_source: setup.cfg and pyproject.toml
    version_value: "0.1.0"

  fsrc_current_state:
    file: fsrc/src/prism/__init__.py
    content: '"""Prism next-generation package root hosted under fsrc/src."""'
    has_version: false

  implementation_gap:
    description: >
      Add __version__ = "0.1.0" to fsrc/__init__.py, or use
      importlib.metadata.version("prism") to derive it at runtime.
    preferred_approach: >
      importlib.metadata.version("prism") with a try/except fallback to
      __version__ = "0.1.0" — matches common packaging conventions and
      avoids hard-coding.
    estimated_lines: 5
    external_deps: none
    risk: trivial

# ─────────────────────────────────────────────────────────────
# MG-13: scanner_compat/render_compat
# ─────────────────────────────────────────────────────────────
mg_13_render_compat:
  summary: >
    src/prism/scanner_compat/render_compat.py exposes public-facing wrappers
    around private underscore-prefixed functions from scanner_readme/render.py
    and scanner_readme/guide.py. fsrc/src/prism/scanner_compat/ does NOT exist.
    Of the 9 private functions that render_compat wraps, 6 already exist in
    fsrc (5 in render.py, 1 in guide.py), but 3 are missing entirely from fsrc.

  src_implementation:
    file: src/prism/scanner_compat/render_compat.py
    lines: 120
    imports_from:
      - prism.scanner_data.contracts_request.StyleGuideConfig
      - prism.scanner_readme.render (8 private functions)
      - prism.scanner_readme.guide (2 private functions)
    public_wrappers_exported:
      - render_guide_identity_sections(section_id, role_name, description, requirements, galaxy, metadata) -> str | None
      - render_guide_section_body(section_id, role_name, description, variables, requirements, default_filters, metadata, *, variable_guidance_keywords) -> str
      - generated_merge_markers(section_id) -> list[tuple[str, str]]
      - strip_prior_generated_merge_block(section, guide_body) -> str
      - resolve_section_content_mode(section, modes) -> str
      - compose_section_body(section, generated_body, mode) -> str
      - resolve_ordered_style_sections(style_guide, metadata) -> tuple[list[dict], set[str], dict[str,str], bool]
      - append_scanner_report_section_if_enabled(parts, style_guide, style_guide_skeleton, scanner_report_relpath, include_scanner_report_link, enabled_sections) -> None
      - render_readme_with_style_guide(role_name, description, variables, requirements, default_filters, metadata) -> str
    private_functions_wrapped:
      from_render_py:
        - _generated_merge_markers
        - _strip_prior_generated_merge_block
        - _resolve_section_content_mode
        - _compose_section_body
        - _resolve_ordered_style_sections
        - _append_scanner_report_section_if_enabled
        - _render_readme_with_style_guide
      from_guide_py:
        - _render_guide_identity_sections
        - _render_guide_section_body

  fsrc_current_state:
    scanner_compat_package: DOES_NOT_EXIST
    scanner_readme_render_py:
      file: fsrc/src/prism/scanner_readme/render.py
      functions_present_matching_compat:
        - _resolve_section_content_mode  # line 60 — exists, private
        - _compose_section_body          # line 105 — exists, private
        - _resolve_ordered_style_sections # line 138 — exists, private
        - _render_readme_with_style_guide # line 202 — exists, private
        - append_scanner_report_section_if_enabled  # line 171 — exists but PUBLIC (no underscore)
      functions_MISSING_in_fsrc:
        - _generated_merge_markers       # Not in fsrc/render.py
        - _strip_prior_generated_merge_block  # Not in fsrc/render.py
    scanner_readme_guide_py:
      file: fsrc/src/prism/scanner_readme/guide.py
      functions_present_matching_compat:
        - render_guide_section_body      # line 7 — exists but PUBLIC (no underscore)
      functions_MISSING_in_fsrc:
        - _render_guide_identity_sections  # Not in fsrc/guide.py (galaxy_info, requirements, install, license, author, purpose sections)

  implementation_gap:
    step_1: >
      Add 3 missing private functions to fsrc/scanner_readme/:
        - _generated_merge_markers (render.py)
        - _strip_prior_generated_merge_block (render.py)
        - _render_guide_identity_sections (guide.py — substantial, ~50 lines in src)
    step_2: >
      Create fsrc/src/prism/scanner_compat/__init__.py
    step_3: >
      Create fsrc/src/prism/scanner_compat/render_compat.py importing from fsrc
      scanner_readme modules (note: fsrc uses public names not underscored for
      some functions — wrappers must adapt accordingly)
    note_on_underscore_mismatch: >
      append_scanner_report_section_if_enabled is PUBLIC in fsrc (no underscore)
      but PRIVATE in src. render_compat must import the public name in fsrc.
      Same for render_guide_section_body.
    estimated_lines: 80  # render_compat.py wrapper
    additional_lines_for_missing_functions: ~80  # 3 missing private functions in scanner_readme
    external_deps: none (StyleGuideConfig already in fsrc contracts)
    risk: low-medium

# ─────────────────────────────────────────────────────────────
# MG-11: Payload alias normalization
# ─────────────────────────────────────────────────────────────
mg_11_payload_normalization:
  summary: >
    src/prism/api_layer/common.py contains normalize_scan_role_payload_shape(),
    which renames internal payload keys to stable public field names. fsrc has
    no api_layer/common.py; fsrc scan_role() returns the raw run_scan() payload
    without any normalization.

  src_implementation:
    file: src/prism/api_layer/common.py
    lines: 150
    key_functions:
      collection_role_failure_details:
        signature: "(exc, *, collection_role_failure_codes) -> tuple[str, str, str | None]"
        purpose: Classify exception into error_code, error_category, error_detail_code
      parse_scan_role_payload:
        signature: "(payload: str | dict[str, Any]) -> dict[str, Any]"
        purpose: Parse and validate JSON payload at API boundary
      normalize_scan_role_payload_shape:
        signature: "(payload: dict[str, Any]) -> dict[str, Any]"
        purpose: >
          Attach stable public field names. Key renames:
            display_variables -> variables
            requirements_display -> requirements
            undocumented_default_filters -> default_filters
          Also extracts metadata.warnings via normalize_metadata_warnings()
      build_failure_record:
        signature: "(*, role_name, role_path, exc, include_traceback, collection_role_failure_details_fn, to_failure_detail_fn) -> dict[str, Any]"
        purpose: Build a structured failure entry for collection scan results
    imports:
      - prism.errors (ERROR_CATEGORY_RUNTIME, PrismRuntimeError, ROLE_SCAN_FAILED, etc.)
      - prism.errors.normalize_metadata_warnings

  fsrc_current_state:
    api_layer_common_py: DOES_NOT_EXIST
    scan_role_normalization: >
      fsrc/src/prism/api_layer/non_collection.py scan_role() returns
      run_scan_fn(...) directly — no field rename, no normalize_scan_role_payload_shape
      applied. Payload consumers see internal field names (display_variables,
      requirements_display, undocumented_default_filters) rather than the
      stable public names.
    normalize_metadata_warnings: >
      Must verify whether prism.errors.normalize_metadata_warnings exists in
      fsrc/src/prism/errors.py before porting.

  implementation_gap:
    step_1: Create fsrc/src/prism/api_layer/common.py with all 4 functions
    step_2: >
      Update fsrc/src/prism/api_layer/non_collection.py scan_role() to apply
      normalize_scan_role_payload_shape() before returning
    estimated_lines: 135  # common.py
    external_deps: prism.errors (already exists in fsrc)
    risk: low
    open_question: >
      Confirm normalize_metadata_warnings is exported from fsrc/src/prism/errors.py

# ─────────────────────────────────────────────────────────────
# MG-04: scan_for_default_filters / scan_for_all_filters
# ─────────────────────────────────────────────────────────────
mg_04_filter_scanning:
  summary: >
    scan_for_default_filters and scan_for_all_filters are public API functions
    in src/prism/scanner.py (NOT in src/prism/api.py). The core logic lives in
    src/prism/scanner_extract/filter_scanner.py. fsrc has no filter_scanner.py
    in scanner_extract, and fsrc/api.py does not expose these functions.

  src_implementation:
    public_api_location: src/prism/scanner.py  # lines 164-193
    logic_location: src/prism/scanner_extract/filter_scanner.py
    scanner_py_wrappers:
      scan_for_default_filters:
        signature: "(role_path: str, exclude_paths: list[str] | None = None) -> list"
        delegates_to: _filter_scanner.scan_for_default_filters with injected helpers
        injected_deps:
          - IGNORED_DIRS
          - _collect_task_files
          - _is_relpath_excluded
          - _is_path_excluded
          - _scan_file_for_default_filters
      scan_for_all_filters:
        signature: "(role_path: str, exclude_paths: list[str] | None = None) -> list[dict]"
        delegates_to: _filter_scanner.scan_for_all_filters with injected helpers
        injected_deps:
          - IGNORED_DIRS
          - _collect_task_files
          - _is_relpath_excluded
          - _is_path_excluded
          - _scan_file_for_all_filters
    filter_scanner_py:
      file: src/prism/scanner_extract/filter_scanner.py
      lines: 189
      key_functions:
        scan_for_default_filters:
          signature: "(role_path, *, exclude_paths, ignored_dirs, collect_task_files, is_relpath_excluded, is_path_excluded, scan_file_for_default_filters) -> list[dict]"
          logic: >
            Walks role tree via collect_task_files + os.walk (with dir exclusions),
            calls scan_file_for_default_filters on each file, returns sorted
            occurrences keyed by (file, line_no)
        scan_for_all_filters:
          signature: "(role_path, *, exclude_paths, ignored_dirs, collect_task_files, is_relpath_excluded, is_path_excluded, scan_file_for_all_filters) -> list[dict]"
          logic: Same walk pattern but scans for all Jinja filters
        scan_file_for_default_filters:
          signature: "(file_path, role_root, *, default_re, scan_text_for_default_filters_with_ast) -> list[dict]"
        scan_file_for_all_filters:
          signature: "(file_path, role_root, *, any_filter_re, scan_text_for_all_filters_with_ast) -> list[dict]"
      external_deps: os, pathlib — stdlib only
      return_shape:
        default_filter_hit: "{file: str, line_no: int, line: str, match: str, args: list}"
        all_filter_hit: "{file: str, line_no: int, line: str, match: str, args: list, filter_name: str}"

  fsrc_current_state:
    scanner_extract_filter_scanner: DOES_NOT_EXIST
    fsrc_api_py_exports: scan_for_default_filters and scan_for_all_filters NOT exposed
    scanner_extract_files_present:
      - dataload.py
      - discovery.py
      - requirements.py
      - task_annotation_parsing.py
      - task_catalog_assembly.py
      - task_file_traversal.py
      - task_line_parsing.py
      - variable_extractor.py

  implementation_gap:
    step_1: Port src/prism/scanner_extract/filter_scanner.py to fsrc/src/prism/scanner_extract/filter_scanner.py
    step_2: >
      Create wrapper functions in fsrc (analogous to scanner.py wrappers) —
      either in fsrc/api.py or a new fsrc/scanner_extract/filter_api.py seam
    step_3: Expose scan_for_default_filters and scan_for_all_filters from fsrc/api.py
    estimated_lines: 200  # filter_scanner.py port + minimal wrapper exposure
    external_deps: os, pathlib, re — all stdlib
    risk: low
    note: >
      The DI-style injection in filter_scanner.py (passing callables) is already
      consistent with fsrc architecture. The injected helpers (_collect_task_files,
      _is_path_excluded, etc.) from scanner.py also need to be available in fsrc.

# ─────────────────────────────────────────────────────────────
# MG-06: collect_role_contents / build_comparison_report
# ─────────────────────────────────────────────────────────────
mg_06_role_comparison:
  summary: >
    Both functions live in src/prism/scanner_core/scan_facade_helpers.py (326 lines).
    Neither exists anywhere in fsrc. build_comparison_report depends on
    compute_quality_metrics which depends on collect_role_contents and
    scan_for_default_filters — so MG-04 is a prerequisite.

  src_implementation:
    file: src/prism/scanner_core/scan_facade_helpers.py
    lines: 326
    key_functions:
      collect_role_contents:
        signature: "(*, role_path, exclude_paths, is_path_excluded, load_meta, extract_role_features) -> dict"
        purpose: >
          Lists files in 7 role subdirs (handlers, tasks, templates, files, tests,
          defaults, vars); loads meta; loads role features. Returns dict with
          subdirectory file lists plus meta and features keys.
        logic_notes: Uses Path.rglob for each subdir; respects is_path_excluded
      compute_quality_metrics:
        signature: "(*, role_path, exclude_paths, collect_role_contents, load_variables, scan_for_default_filters) -> dict"
        purpose: Compute a 0-100 quality score from dir presence, var count, task count, module count, default_filter count
        return_keys: [score, present_dirs, variable_count, task_count, module_count, default_filter_count]
      build_comparison_report:
        signature: "(*, target_role_path, baseline_role_path, exclude_paths, compute_quality_metrics) -> dict"
        purpose: >
          Call compute_quality_metrics for both roles, return delta dict with:
          baseline_path, target_score, baseline_score, score_delta,
          metrics (per-dimension target/baseline/delta for 5 metrics)
      collect_scan_artifacts:
        signature: "(*, role_path, include_vars_main, exclude_path_patterns, detailed_catalog, marker_prefix, load_variables, load_requirements, scan_for_default_filters, collect_role_contents, collect_molecule_scenarios, collect_unconstrained_dynamic_task_includes, collect_unconstrained_dynamic_role_includes, collect_task_handler_catalog) -> tuple[dict, list, list[dict], dict]"
        purpose: Orchestrate all artifact collection for a role scan
      apply_style_and_comparison_metadata:
        signature: "(*, metadata, style_readme_path, style_source_path, style_guide_skeleton, compare_role_path, role_path, exclude_path_patterns, resolve_default_style_guide_source, parse_style_readme, build_comparison_report, policy_context) -> None"
        purpose: Attach style and comparison data to metadata dict in place
    all_use_di_injection: true
    external_deps: pathlib — stdlib only

  fsrc_current_state:
    scan_facade_helpers_py: DOES_NOT_EXIST in fsrc/scanner_core/
    scanner_core_files_present:
      - di.py
      - feature_detector.py
      - scan_request.py
      - scanner_context.py
      - task_extract_adapters.py
      - variable_discovery.py
    any_equivalent: NONE found in fsrc

  implementation_gap:
    prerequisite: MG-04 must be done first (scan_for_default_filters needed by compute_quality_metrics)
    step_1: Create fsrc/src/prism/scanner_core/scan_facade_helpers.py
    step_2: Port collect_role_contents, compute_quality_metrics, build_comparison_report
    note: >
      apply_style_and_comparison_metadata and collect_scan_artifacts also live in
      this file and may be needed depending on how the fsrc scanner_context
      orchestrates scans. Port scope should be confirmed against orchestrator usage.
    estimated_lines: 200  # 3 key functions only
    estimated_lines_full: 326  # full file if all helpers needed
    external_deps: none beyond stdlib
    risk: low-medium (depends on MG-04 being done first)

# ─────────────────────────────────────────────────────────────
# MG-05: resolve_default_style_guide_source
# ─────────────────────────────────────────────────────────────
mg_05_style_guide_resolution:
  summary: >
    resolve_default_style_guide_source lives in src/prism/scanner_config/style.py.
    fsrc has NO scanner_config/ package. The function does 5-tier path resolution
    using env vars, XDG conventions, system paths, and a bundled fallback.
    It has no HTTP calls or heavy deps.

  src_implementation:
    file: src/prism/scanner_config/style.py
    lines: 281
    key_functions:
      default_style_guide_user_paths:
        signature: "(xdg_data_home_env, style_guide_data_dirname, style_guide_source_filename) -> list[Path]"
        purpose: Returns XDG-compliant user-level style guide candidate paths
      resolve_default_style_guide_source:
        signature: "(explicit_path=None, env_style_guide_source_path='PRISM_STYLE_SOURCE', xdg_data_home_env='XDG_DATA_HOME', style_guide_data_dirname='prism', style_guide_source_filename='STYLE_GUIDE_SOURCE.md', system_style_guide_source_path=None, default_style_guide_source_path=None) -> str"
        precedence_tiers:
          1: "$PRISM_STYLE_SOURCE env var"
          2: "./STYLE_GUIDE_SOURCE.md (cwd)"
          3: "$XDG_DATA_HOME/prism/STYLE_GUIDE_SOURCE.md"
          4: "/var/lib/prism/STYLE_GUIDE_SOURCE.md"
          5: "bundled package template path"
        raises: FileNotFoundError if explicit_path provided but not found
        returns: str path to resolved style guide
      resolve_section_selector:
        signature: "(selector, all_section_ids, style_section_aliases, normalize_heading_fn) -> str | None"
        purpose: Resolve section selector string to canonical section id
      load_section_display_titles:
        signature: "(display_titles_path, *, strict, warning_collector, yaml_invalid_code, io_error_code, shape_invalid_code) -> dict[str, str]"
        purpose: Load optional section display-title overrides from bundled YAML
    external_deps:
      - os (stdlib)
      - pathlib (stdlib)
      - yaml (PyYAML — already a dep of prism)

  fsrc_current_state:
    scanner_config_package: DOES_NOT_EXIST
    scanner_readme_style_py:
      file: fsrc/src/prism/scanner_readme/style.py
      note: >
        Has style-formatting functions (format_heading, normalize_style_heading,
        parse_style_readme, get_style_section_aliases_snapshot,
        refresh_policy_derived_state) but NOT path resolution functions.
        resolve_default_style_guide_source is absent from fsrc entirely.

  implementation_gap:
    option_A:
      description: Create full fsrc/src/prism/scanner_config/ package (scope includes all 8 files)
      risk: high scope, many side effects on imports
      when_preferred: MG-02/MG-08 is being done anyway
    option_B:
      description: Add resolve_default_style_guide_source to fsrc/scanner_readme/style.py or a new fsrc/scanner_config/style.py stub
      risk: low scope, cleaner if MG-02/MG-08 deferred
      when_preferred: MG-05 needed independently before full scanner_config port
    estimated_lines: 70  # just resolve_default_style_guide_source + default_style_guide_user_paths
    external_deps: os, pathlib, yaml — all already available
    risk: low

