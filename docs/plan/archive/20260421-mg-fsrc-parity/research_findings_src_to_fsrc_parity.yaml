# ─────────────────────────────────────────────────────────────
# MG-10: cli_app helpers
# ─────────────────────────────────────────────────────────────
mg_10_cli_app_helpers:
  summary: >
    src/prism/cli_app/ is a 6-file package (~1,220 lines). The user-requested
    subset is shared.py, presenters.py, and runtime.py (~457 lines combined).
    fsrc has NO cli_app/ package. fsrc/cli.py inlines EXIT code constants
    (duplicating runtime.py values) and does not use any cli_app helpers.

  src_implementation:
    shared_py:
      file: src/prism/cli_app/shared.py
      lines: 122
      key_functions:
        resolve_effective_readme_config:
          signature: "(role_path: Path, explicit_config_path: str | None) -> str | None"
          purpose: Find effective README config from explicit or auto-discovered .prism.yml
          deps: SECTION_CONFIG_FILENAMES from prism.scanner (or scanner_config)
        resolve_vars_context_paths:
          signature: "(args: argparse.Namespace) -> list[str] | None"
          purpose: Merge --vars-context-path and deprecated --vars-seed args
        resolve_include_collection_checks:
          signature: "(feedback_source, include_collection_checks, ...) -> bool | None"
          purpose: Apply feedback recommendations for collection check toggle
          deps: prism.feedback.load_feedback, prism.feedback.apply_feedback_recommendations
          note: prism.feedback may NOT exist in fsrc — needs verification
        normalize_repo_json_payload:
          signature: "(rendered_payload, *, repo_style_readme_path, scanner_report_relpath, normalize_repo_scan_result_payload) -> str"
          purpose: Normalize repo JSON output, swallowing known error codes
        save_style_comparison_artifacts:
          signature: "(style_readme_path, generated_output, ...) -> tuple[str | None, str | None]"
          purpose: Delegate to cli_presenters.save_style_comparison_artifacts
      external_deps: argparse, json, pathlib, sys, urllib.error, prism.feedback, prism.scanner

    presenters_py:
      file: src/prism/cli_app/presenters.py
      lines: 231
      key_exports:
        CAPTURE_SCHEMA_VERSION: 1
        CAPTURE_MAX_SECTIONS: 50
        CAPTURE_MAX_CONTENT_CHARS: 20000
        CAPTURE_MAX_TOTAL_CHARS: 1_000_000
        REDACTION_PATTERNS: >
          tuple of 2 compiled re.Pattern objects:
            1. password|passwd|token|secret|api_key patterns (case-insensitive)
            2. bearer token patterns
      key_functions:
        sanitize_captured_content: "(text: str) -> str"
        truncate_content: "(text: str, max_chars: int) -> tuple[str, bool]"
        as_dict: "(value: object) -> dict"
        bounded_list: "(items: list[dict], limit: int) -> tuple[list[dict], int]"
        render_collection_markdown_payload: "(payload: dict) -> str"
        emit_success: "(args, outpath, style_source_path=None, style_demo_path=None) -> int"
        save_style_comparison_artifacts: "(style_readme_path, generated_output, ...) -> tuple[str | None, str | None]"
      key_class:
        ReadableYamlDumper: "yaml.SafeDumper subclass emitting multiline strings as literal blocks"
      external_deps: datetime, pathlib, re, shutil, yaml, prism.scanner_io.collection_renderer

    runtime_py:
      file: src/prism/cli_app/runtime.py
      lines: 104
      exit_code_constants:
        EXIT_CODE_GENERIC_ERROR: 2
        EXIT_CODE_NOT_FOUND: 3
        EXIT_CODE_PERMISSION_DENIED: 4
        EXIT_CODE_JSON_PAYLOAD_ERROR: 5
        EXIT_CODE_NETWORK_ERROR: 6
        EXIT_CODE_OS_ERROR: 7
        EXIT_CODE_INTERRUPTED: 130
      key_functions:
        finalize_repo_json_output: "(rendered_or_path, *, dry_run, repo_style_readme_path, scanner_report_relpath, normalize_repo_json_payload) -> str"
        resolve_cli_output_path: "(output: str, output_format: str) -> Path"
        persist_collection_role_markdown_documents: "(*, output_path: Path, payload: dict) -> None"
        map_top_level_exception_to_exit_code: "(exc: Exception) -> int"
        format_top_level_exception: "(exc: Exception) -> str"
      external_deps: json, pathlib, urllib.error, prism.errors

  fsrc_current_state:
    cli_app_package: DOES_NOT_EXIST
    cli_py_inline_exit_codes: >
      fsrc/src/prism/cli.py defines _EXIT_CODE_GENERIC_ERROR=2, _EXIT_CODE_NOT_FOUND=3,
      _EXIT_CODE_PERMISSION_DENIED=4, _EXIT_CODE_JSON_PAYLOAD_ERROR=5,
      _EXIT_CODE_NETWORK_ERROR=6, _EXIT_CODE_OS_ERROR=7, _EXIT_CODE_INTERRUPTED=130
      — EXACTLY duplicating runtime.py constants (prefixed with underscore)
    fsrc_cli_currently_uses:
      - argparse
      - json, sys
      - urllib.error.HTTPError, URLError
      - prism.api (scan_collection, scan_role, scan_repo, run_scan)
      - prism.errors.PrismRuntimeError
      - prism.scanner_io.collection_renderer (format_collection_summary, render_collection_markdown)
      - prism.scanner_io.output (resolve_output_path, write_output, write_role_scan_output)
    fsrc_cli_currently_DOES_NOT_USE:
      - REDACTION_PATTERNS / sanitize_captured_content
      - ReadableYamlDumper
      - resolve_include_collection_checks (prism.feedback)
      - save_style_comparison_artifacts
      - resolve_effective_readme_config
      - persist_collection_role_markdown_documents

  implementation_gap:
    priority_subset_for_fsrc:
      runtime_py:
        rationale: >
          Exit code constants are already duplicated inline in fsrc/cli.py.
          Extracting to cli_app/runtime.py eliminates the duplication and adds
          the helper functions (map_top_level_exception_to_exit_code,
          format_top_level_exception, etc.) for proper error handling.
        estimated_lines: 104
        risk: low
      presenters_py:
        rationale: >
          REDACTION_PATTERNS and sanitize_captured_content needed if fsrc CLI
          handles sensitive output. ReadableYamlDumper needed for YAML output
          formatting. render_collection_markdown_payload is a thin wrapper.
        estimated_lines: 231
        risk: low
      shared_py:
        rationale: >
          resolve_effective_readme_config needed for robust config discovery.
          normalize_repo_json_payload needed if fsrc supports repo scan output.
          resolve_include_collection_checks depends on prism.feedback — DEFERRED.
        estimated_lines: 122
        risk: low-medium (prism.feedback dependency needs audit)
    open_question: >
      Does fsrc/src/prism/feedback.py exist? If not, resolve_include_collection_checks
      must be stubbed or omitted from shared.py in the fsrc port.
    total_estimated_lines: 457
    external_deps:
      new_to_fsrc: shutil, datetime (stdlib) — already available
      uncertain: prism.feedback

