# ─────────────────────────────────────────────────────────────
# Patterns found
# ─────────────────────────────────────────────────────────────
patterns_found:
  - category: architecture
    pattern: DI-injectable functions
    description: >
      All filter scanning and scan facade helpers use callable injection rather
      than direct imports. This pattern is consistent with fsrc's plugin
      architecture and makes porting straightforward.
    examples:
      - file: src/prism/scanner_extract/filter_scanner.py
        location: "filter_scanner.py:10"
        snippet: "def scan_for_default_filters(role_path, *, exclude_paths, ignored_dirs, collect_task_files, ...)"
    prevalence: common

  - category: architecture
    pattern: Compatibility wrapper surface
    description: >
      scanner_compat/ exposes public names wrapping private (underscore-prefixed)
      implementations from inner modules. fsrc partially breaks this pattern by
      making some functions public directly in scanner_readme.
    examples:
      - file: src/prism/scanner_compat/render_compat.py
        location: "render_compat.py:20"
        snippet: "def render_guide_identity_sections(...) -> str | None: return _render_guide_identity_sections(...)"
    prevalence: occasional

  - category: naming
    pattern: Underscore-prefix divergence between src and fsrc
    description: >
      src/scanner_readme uses underscore-prefixed private functions (e.g.,
      _render_guide_section_body, _append_scanner_report_section_if_enabled).
      fsrc/scanner_readme exposes some of these as public (no underscore).
      render_compat.py adapters must account for this difference.
    examples:
      - file: fsrc/src/prism/scanner_readme/render.py
        location: "render.py:171"
        snippet: "def append_scanner_report_section_if_enabled("  # public in fsrc
    prevalence: occasional

  - category: structure
    pattern: Exit code duplication
    description: >
      EXIT_CODE_* constants defined in src/prism/cli_app/runtime.py are
      duplicated inline (with underscore prefix) in fsrc/cli.py. This is
      identified MG-10 technical debt.
    examples:
      - file: fsrc/src/prism/cli.py
        location: "cli.py:31"
        snippet: "_EXIT_CODE_GENERIC_ERROR = 2"
    prevalence: occasional

