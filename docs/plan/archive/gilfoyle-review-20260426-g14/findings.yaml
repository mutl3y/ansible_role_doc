    severity: medium
    category: weak_typing
    status: closed
    title: "scanner_io — cast(TypedDict, dict(TypedDict)) anti-pattern (3 sites)"
    description: >
      emit_output.py lines 78, 111, 117, 252 and output_orchestrator.py line 53 use
