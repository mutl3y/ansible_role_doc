      - "src/prism/scanner_io/output_orchestrator.py"
    decision: fixed
    fix_wave: typing
    commit: "942d9cc"
    evidence: "copy.copy() replaces cast(TypedDict, dict(TypedDict)) in emit_output.py + output_orchestrator.py."

