findings:
  - id: FIND-G14-01
    severity: critical
    category: weak_typing
    status: closed
    title: "scanner_plugins/defaults.py — all 7 resolver functions return Any"
    description: >
      All public resolver functions (resolve_yaml_parsing_policy_plugin,
      resolve_jinja_analysis_policy_plugin, resolve_comment_driven_documentation_plugin,
      resolve_task_line_parsing_policy_plugin, resolve_task_annotation_policy_plugin,
      resolve_task_traversal_policy_plugin, resolve_variable_extractor_policy_plugin)
      return Any instead of their concrete Policy Protocol types. This eliminates
      type safety at all callsites that consume the resolved plugin.
    files:
      - "src/prism/scanner_plugins/defaults.py"
    decision: fixed
    fix_wave: typing
    commit: "942d9cc"
    evidence: "6 resolver functions now return Protocol types from contracts_request."

  - id: FIND-G14-02
    severity: high
    category: silent_fallback
    status: closed
    title: "scanner_core/events.py — event bus handler swallows exceptions silently"
    description: >
      EventBus._dispatch() contains `except Exception: pass` with no logging,
      followed by a bare `return`. Errors from event handlers are silently swallowed
      with no diagnostic path. This is a genuine error-suppression bug that makes
      the event system invisible when it fails.
    files:
      - "src/prism/scanner_core/events.py"
    decision: fixed
    fix_wave: error_handling
    commit: "942d9cc"
    evidence: "except Exception as exc with type name in log."

  - id: FIND-G14-03
    severity: high
    category: weak_typing
    status: deferred
    title: "api_layer/collection.py — 9 constructor params typed Callable[..., Any]"
    description: >
      CollectionScanAdapter.__init__ takes 9 parameters all typed Callable[..., Any].
      These should be named Protocols (e.g. ScanRoleFn, BuildCollectionIdentityFn)
      with concrete signatures to enable callsite type checking.
    files:
      - "src/prism/api_layer/collection.py"
    decision: deferred
    fix_wave: typing
    deferred_reason: "Requires build_collection_scan_result return annotation fix -> CollectionScanResult before safe Protocol addition; research artifact saved."

