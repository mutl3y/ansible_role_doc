    summary: "The unbiased independent review found that bootstrap.initialize_default_registry() performs lockless check-then-act initialization over the canonical registry singleton, while the earlier seam-tilted pass separately exposed the process-global mutable registry surface in scanner_plugins.registry. Together they define one fix family: bootstrap and registry authority are globally shared and insufficiently hardened."
