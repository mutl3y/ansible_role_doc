      - "Code: src/prism/scanner_plugins/registry.py:481 and src/prism/scanner_plugins/registry.py:505 add snapshot_state()/replace_state() so bootstrap can publish validated state without rebinding the canonical registry object."
      - "Tests: src/prism/tests/test_t2_03_entry_point_discovery.py:143 proves fail-closed unpublished state on discovery defects, and src/prism/tests/test_t2_03_entry_point_discovery.py:177 exercises concurrent first initialization."
