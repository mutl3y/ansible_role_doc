summary: >-
  The first thorough cycle after g63 surfaced one cross-cutting High around
  YAML-policy resolution authority and four actionable Medium slices across
  silent fallback, policy resolution, facade error channels, and weakly typed
  request contracts. No Critical finding emerged.
cross_cutting_micro_checks:
  registry_authority: >-
    Scout-Graph-03 plus Scout-Graph-04 and Scout-ControlFlow-01 describe the
    same split-authority seam: loader retains a documented dual-path fallback
    while defaults._resolve_registry falls back to bootstrap singleton
    authority when DI is absent.
  facade_leakage: >-
    No new public-facade leakage finding was promoted because the recovered
    Scout-Ownership artifact is empty and no persisted public facade evidence
    outranked the promoted error-handling seams in this cycle.
promoted_findings:
  - id: G64-H01
    severity: high
    category: registry_authority
    source_observations:
      - docs/plan/mutl3y-review-20260504-g64/mutl3y-artifacts/phase0/Scout-ControlFlow.yaml#Scout-ControlFlow-01
      - docs/plan/mutl3y-review-20260504-g64/mutl3y-artifacts/phase0/Scout-Graph.yaml#Scout-Graph-03
      - docs/plan/mutl3y-review-20260504-g64/mutl3y-artifacts/phase0/Scout-Graph.yaml#Scout-Graph-04
    rationale: >-
      YAML parsing still retains split fallback authority across loader and
      defaults: loader explicitly preserves a standalone dual-path soft
      fallback, while defaults._resolve_registry falls back to the bootstrap
      singleton when DI registry authority is absent. The seam is documented
      and tested, but it still keeps two runtime authorities alive in a path
      that the architecture otherwise pushes toward explicit injected or
      prepared-policy ownership.
    fix_group_key: loader.yaml_parsing.dual_path_fallback
    suggested_narrow_gate: pytest -q src/prism/tests/test_di_registry_resolution.py::test_live_yaml_policy_resolution_preserves_loader_standalone_contract
  - id: G64-M01
    severity: medium
    category: silent_fallback
    source_observations:
      - docs/plan/mutl3y-review-20260504-g64/mutl3y-artifacts/phase0/Scout-Typing.yaml#ST-003
      - docs/plan/mutl3y-review-20260504-g64/mutl3y-artifacts/phase0/Scout-ControlFlow.yaml#Scout-ControlFlow-03
    rationale: >-
      load_seed_variables silently skips optional seed files on OSError,
      YAML parse failure, ValueError, and RuntimeError with no structured
      diagnostic path, which makes user-supplied configuration problems look
      identical to absent optional inputs.
    fix_group_key: variable_extractor.seed_file_silent_skip
    suggested_narrow_gate: pytest -q src/prism/tests/test_variable_extractor.py::test_load_seed_variables_handles_malformed
  - id: G64-M02
    severity: medium
    category: policy_coercion
    source_observations:
      - docs/plan/mutl3y-review-20260504-g64/mutl3y-artifacts/phase0/Scout-ControlFlow.yaml#Scout-ControlFlow-04
    rationale: >-
      task_line_parsing still exposes policy-backed proxies that resolve
      prepared policy through require_prepared_policy(None, ...) rather than
      explicit DI or prepared-bundle ownership, reopening a global fallback
      path that g63 already sized as broader compatibility-facade debt.
    fix_group_key: task_line_parsing.require_prepared_policy_none
    suggested_narrow_gate: pytest -q src/prism/tests/test_task_parser_precedence_matrix.py::test_policy_backed_proxies_resolve
  - id: G64-M03
    severity: medium
    category: error_channel
    source_observations:
      - docs/plan/mutl3y-review-20260504-g64/mutl3y-artifacts/phase0/Scout-ControlFlow.yaml#Scout-ControlFlow-05
    rationale: >-
      collect_role_contents swallows RuntimeError from load_meta, replaces meta
      with an empty mapping, and only appends a warning string. That keeps the
      scan running, but it collapses the structured error channel at a facade
      seam that feeds user-visible role metadata.
    fix_group_key: scan_facade_helpers.meta_load_swallow
    suggested_narrow_gate: pytest -q src/prism/tests/test_scan_facade_helpers.py::TestCollectRoleContents::test_load_meta_exception_adds_meta_load_warnings
  - id: G64-M04
    severity: medium
    category: typing
    source_observations:
      - docs/plan/mutl3y-review-20260504-g64/mutl3y-artifacts/phase0/Scout-Typing.yaml#ST-004
    rationale: >-
      contracts_request still types several request and display payload fields
      as object, which keeps error-handling and malformed-input paths weakly
      specified even where nearby policy bundles have gained named protocols.
    fix_group_key: weak-typed-contracts
    suggested_narrow_gate: .venv/bin/python -m mypy src/prism/scanner_data/contracts_request.py
