cycle: g4
date: 2026-04-25
focus_axis: registry_lifecycle
grade: B+
gate: GREEN

scope_intent: |
  Address the three g3-deferred lanes (G3-04 loader routing, G3-05 plugin
  self-registration, G3-06 DIContainer surface). Pick the lowest-risk axis-
  bounded slice that still removes durable scaffolding; defer architectural
  rewrites that need a planning slice of their own.

findings:
  - id: G4-01
    title: scanner_io/loader.py lazy import of scanner_plugins.defaults
    severity: low
    axis: graph
    decision: do_not_re_flag
    location: src/prism/scanner_io/loader.py:46
    evidence: |
      The import is to scanner_plugins.defaults.resolve_yaml_parsing_policy_plugin
      — a generic resolver that already routes through the plugin registry via
      _resolve_plugin_with_precedence. The "soft fallback" is intentional pre-
      scan-path semantics, not a layer leak. Reclassifying this as a leak would
      require defining a new "no defaults helper" rule for scanner_io, which is
      out of scope here.
    rationale: |
      Routing already passes through the registry. Re-flag only when bundled
      with FIND-G2-LOADER-DUAL-PATH for a registry-routed defaults slice that
      actually reshapes the resolver contract.

  - id: G4-02
    title: scanner_plugins/__init__.py eagerly imports every built-in plugin
    severity: medium
    axis: abstraction
    decision: defer_to_g5
    location: src/prism/scanner_plugins/__init__.py:11-42
    evidence: |
      bootstrap_default_plugins() registers 12+ built-in plugins via explicit
      imports at module top level. Per-plugin decorator self-registration is
      the proper fix and closes LESSON-08 at the source. Affects every sub-
      package; deferred-string pairs (variable_discovery, feature_detection)
      and order-sensitive tests need careful handling.
    rationale: |
      Architectural rewrite. Needs a dedicated lifecycle slice with a planning
      step, not an axis-bounded fix wave.

  - id: G4-03
    title: DIContainer carries 12 inject_mock_* convenience wrappers
    severity: medium
    axis: surface_area
    decision: fix
    location: src/prism/scanner_core/di.py:348-393
    evidence: |
      Twelve one-line wrappers around the generic inject_mock(name, mock) at
      L344. Pure surface bloat: every wrapper just calls the generic helper
      with a hardcoded key string. ~33 call sites across 6 test files.
    fix_summary: |
      Removed all 12 wrappers from DIContainer. Migrated all test call sites
      to .inject_mock("<key>", value). Rewrote the parametrized
      test_inject_mock_helpers_thread_to_mocks coverage in
      test_scanner_core_di.py to assert generic inject_mock + factory
      resolution instead.
    delta:
      di_lines_removed: 36
      test_lines_net: -84
      di_total_lines: "401 -> 365"

deferred:
