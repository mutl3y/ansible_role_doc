summary: "God Mode found one net-new High around strict_mode semantics and several adjacent medium contract defects that should influence later wave sizing but do not all belong in the first builder slice."
findings:
  - id: DR-G55-GM-H01
    title: strict_mode is a fake switch in plugin-default resolution
    severity: high
    block_phase2_planning: true
    promote_to_shortlist: true
    anchors:
      - src/prism/scanner_plugins/defaults.py:183
      - src/prism/scanner_plugins/defaults.py:192
      - src/prism/scanner_plugins/defaults.py:202
      - src/prism/scanner_plugins/defaults.py:210
      - src/prism/scanner_plugins/bundle_resolver.py:90
      - src/prism/scanner_plugins/bundle_resolver.py:102
      - src/prism/tests/test_defaults.py:24
      - src/prism/tests/test_defaults.py:38
    rationale: "strict_phase_failures still flows into bundle resolution and defaults helpers as though non-strict fallback exists, but both fallback helpers drop strict_mode and always raise, so the seam advertises control-flow behavior that runtime and tests do not implement."
  - id: DR-G55-GM-M01
    title: Registry constructor validation does not enforce the constructor contract it claims to guard
    severity: medium
    block_phase2_planning: true
    promote_to_shortlist: false
    anchors:
      - src/prism/scanner_plugins/registry.py:122
      - src/prism/scanner_plugins/registry.py:142
      - src/prism/scanner_core/di.py:124
      - src/prism/scanner_core/di.py:330
    rationale: "require_di_constructor() only proves di can be partially bound, not that the full plugin constructor contract is satisfiable at runtime."
  - id: DR-G55-GM-M02
    title: replace_scan_options refreshes scan options but leaves the resolved platform identity stale
    severity: medium
    block_phase2_planning: true
    promote_to_shortlist: false
    anchors:
      - src/prism/scanner_core/di.py:200
      - src/prism/scanner_core/di.py:315
      - src/prism/scanner_core/execution_request_builder.py:521
    rationale: "replace_scan_options() refreshes the snapshot but not the constructor-time platform key, which creates a stale-state seam if the method is ever treated as a general refresh contract."
  - id: DR-G55-GM-M03
    title: resolve_platform_key violates its Mapping contract and can skip explicit precedence on non-dict mappings
    severity: medium
    block_phase2_planning: false
    promote_to_shortlist: false
    anchors:
      - src/prism/scanner_core/di.py:99
      - src/prism/scanner_core/di.py:104
      - src/prism/tests/test_scanner_core_di.py:79
    rationale: "resolve_platform_key() advertises Mapping[str, Any] but only inspects explicit plugin keys when scan_options is a concrete dict, so MappingProxyType-style inputs can fall through to registry defaults."
shortlist_decision:
  additional_high_found: true
