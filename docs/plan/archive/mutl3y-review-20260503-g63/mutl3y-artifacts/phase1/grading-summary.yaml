  The light follow-up found no reopen-worthy High/Critical defect after g62.
  Two medium slices remain actionable: test fixture coupling against the
  module-global comment-doc plugin registry, and task-line policy proxies that
  still resolve prepared policy through a global require_prepared_policy(None,
