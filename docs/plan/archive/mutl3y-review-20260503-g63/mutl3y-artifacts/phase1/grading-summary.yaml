    severity: medium
    category: test_fixture_coupling
    source_observations:
      - docs/plan/mutl3y-review-20260503-g63/mutl3y-artifacts/phase0/Scout-Ownership.yaml#Scout-Ownership-02
    rationale: >-
      Tests in test_comment_doc_plugin_resolution mutate the module-global
      plugin_registry and its private _comment_driven_doc_plugins map directly.
      The try/finally cleanup limits immediate breakage, but the test seam still
      freezes singleton internals and obscures the intended DI-over-registry
      contract.
    fix_group_key: tests.registry_mutation
    suggested_narrow_gate: pytest -q src/prism/tests/test_comment_doc_plugin_resolution.py
  - id: G63-M02
    severity: medium
    category: policy_coercion
    source_observations:
      - docs/plan/mutl3y-review-20260503-g63/mutl3y-artifacts/phase0/Scout-ControlFlow.yaml#G63-CF-03
    rationale: >-
      task_line_parsing policy-backed proxies still call
      require_prepared_policy(None, ...) at module scope. That keeps a global
      late-resolver path alive in a slice where nearby code has otherwise been
      moving toward explicit prepared-policy ownership.
    fix_group_key: prepared_policy_resolution_consistency
    suggested_narrow_gate: pytest -q src/prism/tests/test_task_parser_precedence_matrix.py src/prism/tests/test_comment_doc_plugin_resolution.py
