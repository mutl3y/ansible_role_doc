- id: SEAM-001
  category: control_flow_contracts
  fingerprint: strict_mode_threaded_but_ignored_in_fallback_helpers
  file: src/prism/scanner_plugins/defaults.py
  line: 189
  severity_hint: high
  confidence: high
  detector: ownership_signal_ignored
  memory_status: new
  memory_match: null
  evidence_snippet: |
    def _fallback_or_raise_malformed_plugin_shape(..., strict_mode: bool, fallback_plugin: Any) -> Any:
        del strict_mode
        del fallback_plugin
        _raise_malformed_plugin_shape_error(...)
  fix_group_key: g56_fallback_strict_mode_reconciliation
  rationale: |
    bundle_resolver and defaults thread strict_mode as though policy ownership
    includes a non-strict fallback branch, but the terminal helper discards the
    signal entirely. The caller owns a control flag that the callee refuses to honor.

