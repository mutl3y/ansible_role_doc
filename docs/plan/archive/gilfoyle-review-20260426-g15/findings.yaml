findings:

  - id: FIND-G15-01
    category: duplication
    severity: high
    status: closed
    title: "_TRUTHY_VALUES frozenset byte-identical in repo_context.py and feature_flags.py"
    description: >
      `scanner_kernel/repo_context.py:14` and `scanner_plugins/ansible/feature_flags.py:10`
      both define `_TRUTHY_VALUES = frozenset({"1", "true", "yes", "on"})` with identical
      membership and identical usage pattern (env-var .lower() in _TRUTHY_VALUES).
      Any future divergence (e.g. adding "y" or "enabled") will be silent and asymmetric.
    affected_files:
      - src/prism/scanner_kernel/repo_context.py
      - src/prism/scanner_plugins/ansible/feature_flags.py
    needs_investigation: false
    decision: "feature_flags.py imports _TRUTHY_VALUES from repo_context.py; remove local copy"
    decision_rationale: >
      repo_context.py already owns this constant (kernel env-var parsing lives there);
      feature_flags.py already depends on the same kernel feature-flag semantics.
      Import direction (scanner_plugins importing from scanner_kernel) is acceptable
      per layering rules (plugins compose kernel primitives).
    closed_evidence: "feature_flags.py now imports _TRUTHY_VALUES from scanner_kernel/repo_context.py; local duplicate constant removed (2026-05-01)."

  - id: FIND-G15-02
    category: abstraction
    severity: medium
    status: closed
    title: "scanner_readme/style.py imports directly from scanner_plugins.parsers (layer violation)"
    description: >
      `scanner_readme/style.py:12` imports `build_section_title_stats`,
      `detect_style_section_level`, and `parse_style_readme` directly from
      `prism.scanner_plugins.parsers.markdown.style_parser`. This is the same
      layer violation pattern fixed for guide.py and render.py in FIND-G14-06
      (scanner_readme must not import from scanner_plugins). style.py was missed
      in that wave. The module re-exports these as part of the scanner_readme public API,
      meaning consumers of scanner_readme.style are transitively importing from the
      plugin layer.
    affected_files:
      - src/prism/scanner_readme/style.py
      - src/prism/scanner_plugins/parsers/markdown/style_parser.py
    needs_investigation: true
    investigation_conclusion: >
      `build_section_title_stats`, `detect_style_section_level`, and `parse_style_readme`
      are generic markdown utilities — no Ansible-specific logic. They live in
      scanner_plugins.parsers.markdown because of historical placement, not because they
      are plugin-resolvable per-platform. Unlike the renderer plugin (which needs DI
      resolution), these are stateless pure functions. The correct fix is to move them
      to scanner_readme/style_parser.py (or similar) and have scanner_plugins.parsers
      import from there if needed, reversing the dependency direction.
      Alternative: add a `resolve_style_parser_functions()` thin accessor in defaults.py
      (but overkill for non-DI functions). Decision: move functions into scanner_readme.
    options:
      - id: a
        label: "Move functions from scanner_plugins.parsers.markdown.style_parser → scanner_readme/style_parser.py"
        description: >
          Relocate parse_style_readme, detect_style_section_level, build_section_title_stats
          to a new scanner_readme/style_parser.py (or directly into style.py).
          Update any callers. Scanner_plugins keeps no copy.
      - id: b
        label: "Add resolver trampoline in defaults.py"
        description: >
          Keep functions in scanner_plugins.parsers; add resolve_style_parser_plugin()
          in defaults.py that returns the functions; scanner_readme imports through defaults.
          Overkill for non-DI functions.
    decision: a
    decision_rationale: >
      These are stateless pure functions, not plugin-resolvable per platform.
      Moving them into scanner_readme removes the layer violation cleanly and
      eliminates the cross-layer import. scanner_plugins.parsers.markdown.style_parser
      becomes unused and can be removed.
    closed_evidence: "scanner_readme/style.py now imports parser helpers from prism.scanner_config.style_parser, not scanner_plugins.parsers.*"

  - id: FIND-G15-03
    category: security
    severity: medium
    status: closed
    title: "urllib.request.urlopen without URL scheme allowlist in patterns.py"
    description: >
      `scanner_config/patterns.py:233` calls `urllib.request.urlopen(url, timeout=timeout)`
      where `url` comes from config/options without URL scheme validation.
      A `file://` or `ftp://` URL would be accepted, allowing local-filesystem reads
      or FTP fetches from a prism.yml config. The `# noqa: S310` comment suppresses
      the bandit warning but does not eliminate the risk. SHA256 integrity verification
      runs after the fetch (correct, but only validates content — not the transport
      scheme). Prism.yml is user-editable; this is not a direct HTTP-injection surface
      but an SSRF-via-config surface for users sharing config files.
    affected_files:
      - src/prism/scanner_config/patterns.py
    needs_investigation: false
    decision: "Add scheme allowlist before urlopen: raise RuntimeError if not https://"
    decision_rationale: >
      Remote policy patterns should only be fetched over HTTPS.
      A one-line guard before urlopen eliminates file://, ftp://, and other
      non-HTTPS schemes. The existing SHA256 integrity check is kept unchanged.
    closed_evidence: "scanner_config/patterns.py enforces https-only URLs before urllib.request.urlopen (RuntimeError on non-HTTPS)."

  - id: FIND-G15-04
    category: guard
    severity: medium
    status: closed
    title: "Jinja2 Environment uses permissive Undefined as non-strict default in two locations"
    description: >
      Both `scanner_readme/rendering_seams.py:30` and
      `scanner_plugins/parsers/comment_doc/jinja_utils.py:35` build Jinja2 Environments
      with `undefined=jinja2.Undefined` (the permissive default) when strict=False.
      Permissive Undefined means references to undefined template variables render
      as empty string silently, producing incorrect documentation output with no
      diagnostic. For a documentation generator, silent empty-string substitution
      is effectively a data-correctness bug in output. StrictUndefined raises immediately
      on the undefined access; callers that require lenient mode can pass strict=False
      but should document why.
    affected_files:
      - src/prism/scanner_readme/rendering_seams.py
      - src/prism/scanner_plugins/parsers/comment_doc/jinja_utils.py
    needs_investigation: false
    decision: "Change non-strict default from jinja2.Undefined to jinja2.StrictUndefined; make strict=True the default; callers pass strict=False explicitly with a comment"
    decision_rationale: >
      Documentation generators have no reason to silently swallow undefined template
      variables. StrictUndefined as default means bugs surface immediately.
      Any caller that genuinely needs lenient rendering can opt-in with a comment
      explaining why. Aligns with the fail-closed principle applied everywhere else
      in this codebase.
    closed_evidence: "rendering_seams.py and comment_doc/jinja_utils.py now default to jinja2.StrictUndefined; lenient mode requires explicit jinja_undefined_policy='lenient'."

