  - id: FIND-G15-07
    category: test_gap
    severity: medium
    status: closed
    title: "repo_services.clone_repo subprocess security boundary has no explicit tests"
    description: >
      `repo_services.py:77` calls `subprocess.run(cmd, check=True, ...)` where `cmd` is
      a list containing the user-supplied `repo_url`. Because subprocess is called with
      a list (not shell=True), there is no shell injection risk. However, the security
      boundary — URL validation before it reaches subprocess, and subprocess failure
      modes (SubprocessError, timeout, partial clone, CalledProcessError) — is not
      explicitly tested. Current tests in test_api_cli_repo_parity.py check only
      function existence, not error-path behaviour. A regression could silently pass
      malformed URLs into git clone without diagnostic.
    affected_files:
      - src/prism/repo_services.py
      - src/prism/tests/test_api_cli_repo_parity.py
    needs_investigation: false
    decision: "Add subprocess boundary tests: SubprocessError, CalledProcessError, timeout, URL with shell metacharacters (confirm list-form prevents injection)"
    decision_rationale: >
      Security-sensitive subprocess boundary test. Low implementation effort;
      high diagnostic value for future regressions. Not an active exploit vector
      (list-form subprocess) but missing negative-path coverage is a gap.
    closed_evidence: "Subprocess boundary tests exist in src/prism/tests/test_api_cli_repo_parity.py for list-form command safety and subprocess exception wrapping."

  - id: FIND-G15-08
    category: weak_typing
    severity: low
    status: closed
    title: "_reserved_unsupported_platforms mutable set[str] should be frozenset[str]"
    description: >
      `scanner_plugins/registry.py:128` `_reserved_unsupported_platforms: set[str] = set()`
      is a module-level mutable set. The `_reserved` prefix communicates immutable-once-
      populated intent, but the type does not. Mutable module-level sets are an
      anti-pattern (LESSON-01 category): they can be accidentally mutated in test code
      or across threads. Given values are only added during registry initialization,
      this should be `frozenset[str]` or rebuilt as frozenset after initialization.
    affected_files:
      - src/prism/scanner_plugins/registry.py
    needs_investigation: false
    decision: "Investigate initialization pattern; if set is populated incrementally, introduce a build phase then freeze. If populated once, change type annotation to frozenset."
    decision_rationale: "LESSON-01 anti-pattern. One-line fix if populated at construction; small refactor if incremental."
    closed_evidence: "PluginRegistry now stores _reserved_unsupported_platforms as frozenset[str] and rebuilds on registration; regression test added in src/prism/tests/test_registry_reserved_platforms.py."

