    stable_fingerprint: "kernel_plugin_runner:run_kernel_plugin_orchestrator:scan_options_untyped"
    fix_group_key: "scan_options_schema_typing"
    proposed_fix_class: "contract_refinement"
    suggested_narrow_gate: "Check if ScanOptions TypedDict exists in scanner_data.scan_options_schema; if yes, use it; if no, create contract and propagate through all layers"
    confidence: high
    runtime_risk: "Scan configuration shape not validated; misconfigured runs undetected"

  - id: FIND-G35-T08
    severity: low
