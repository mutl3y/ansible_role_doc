  - id: FIND-G35-C02
    severity: medium
    category: typing
    title: "scan_options parameter widely typed as dict[str, Any] without schema"
    description: |
      scan_options is passed through many layers (kernel_plugin_runner:17,
      non_collection:284, etc.) as dict[str, Any] without a schema TypedDict.
      This is a primary configuration vector that should have explicit keys/types.
    file: src/prism/scanner_kernel/kernel_plugin_runner.py
