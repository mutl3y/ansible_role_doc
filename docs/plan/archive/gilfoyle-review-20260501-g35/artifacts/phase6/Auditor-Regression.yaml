    details:
      - execution_request_builder now fails closed when ensure_prepared_policy_bundle_fn is missing, rather than silently constructing a partially wired request (/raid5/source/test/prism/src/prism/scanner_core/execution_request_builder.py#L515-L520).
      - loader still retains a documented soft fallback when prepared_policy_bundle is absent; it resolves YAML parsing policy via the default resolver path instead of failing closed (/raid5/source/test/prism/src/prism/scanner_io/loader.py#L63-L90). This is a pre-existing loader behavior, not a regression introduced by the registry-authority fix wave.
