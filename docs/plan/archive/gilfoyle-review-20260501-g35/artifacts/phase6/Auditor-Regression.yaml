findings:
  - id: AUDIT-REG-01
    severity: low
    category: regression_test_gap
    status: confirmed
    title: Loader regression coverage does not prove DI registry authority on the live YAML-policy resolution path
    summary: The new loader coverage verifies only the helper-level bypass removal and a narrow AST guardrail. It does not behavior-test the actual unprepared-bundle YAML policy resolution path with conflicting DI.plugin_registry versus scan_options.plugin_registry inputs.
    why_this_matters:
      - The wave goal was to make DI injection the sole registry authority for the live loader path.
      - The current loader test stops at _resolve_plugin_registry and therefore would not catch a future regression where _get_yaml_parsing_policy stops threading DI.plugin_registry into the resolver while still avoiding direct scan_options.get("plugin_registry") lookups.
      - The AST guardrail only matches .get("plugin_registry") calls, so it would not detect equivalent bypass reintroduction via subscript access or an indirect helper inside the live resolution path (/raid5/source/test/prism/src/prism/tests/test_scanner_guardrails.py#L104-L126).
    evidence:
      - _get_yaml_parsing_policy is the real live decision point for loader policy resolution and the place where registry override threading matters (/raid5/source/test/prism/src/prism/scanner_io/loader.py#L63-L90).
      - parse_yaml_candidate and load_yaml_file are the touched live entrypoints that depend on that policy resolution (/raid5/source/test/prism/src/prism/scanner_io/loader.py#L154-L199, /raid5/source/test/prism/src/prism/scanner_io/loader.py#L261-L272).
      - Current focused test coverage for loader ends at helper-level assertions (/raid5/source/test/prism/src/prism/tests/test_di_registry_resolution.py#L335-L351).
      - Current static guardrail is pattern-based rather than behavior-based (/raid5/source/test/prism/src/prism/tests/test_scanner_guardrails.py#L430-L444).
    recommended_follow_up:
      - Add one loader behavior test that injects an authoritative registry on the DI container, a conflicting plugin_registry object in scan_options, and a resolver/plugin spy that proves parse_yaml_candidate or load_yaml_file consumes only DI.plugin_registry on the no-prepared-bundle path.
non_findings:
  - Builder runtime registry ownership is internally consistent in the touched slice: the same authoritative registry object flows into platform resolution, DI construction, prepared-policy wiring, and the returned request (/raid5/source/test/prism/src/prism/scanner_core/execution_request_builder.py#L479-L528).
  - No new fail-open behavior was introduced in execution_request_builder by the wave; the newly mandatory ensure_prepared_policy_bundle_fn check is fail-closed (/raid5/source/test/prism/src/prism/scanner_core/execution_request_builder.py#L515-L520).
  - The focused test wave did add a useful static guardrail that prevents direct scan_options.get("plugin_registry") lookups from reappearing in the two touched modules (/raid5/source/test/prism/src/prism/tests/test_scanner_guardrails.py#L430-L444).
