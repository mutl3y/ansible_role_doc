findings:
  - id: FIND-G5-01
    severity: medium
    category: abstraction
    axis: registry/lifecycle
    location: src/prism/scanner_plugins/__init__.py:bootstrap_default_plugins
    summary: |
      bootstrap_default_plugins() was 80 lines of repetitive
      `if name not in list_X(): register_X(name, cls)` blocks, one per
      built-in plugin slot/name pair. Adding a new built-in required a
      new imperative branch.
    decision: closed
    fix: |
      Convert to data-driven table iteration. Two declarative tables
      (_DIRECT_REGISTRATIONS, _DEFERRED_REGISTRATIONS) plus
      _RESERVED_UNSUPPORTED_PLATFORMS, dispatched via slot->method-name
      maps (_DIRECT_SLOT_DISPATCH, _DEFERRED_SLOT_DISPATCH). Single loop
      per table replaces all branches. First-registrant-wins semantics
      preserved via the per-slot list-membership guard.
    why_not_decorator: |
      True decorator self-registration would close LESSON-08 at the
      source but breaks replay onto alternate registries
      (test_comment_doc_plugin_resolution.py restore-defaults pattern;
      bootstrap_default_plugins(registry=...) param). Architectural
      rewrite deferred to a future planning slice.
    files_touched:
      - src/prism/scanner_plugins/__init__.py
    validation: 754 passed / 7 skipped, ruff clean, black clean, mypy 0
      errors / 133 source files.

  - id: FIND-G5-02
    severity: low
    category: abstraction
    axis: registry/lifecycle
    location: src/prism/scanner_plugins/__init__.py decorator self-registration
    summary: |
      True decorator-based @register_scan_pipeline_plugin("ansible") on
      each plugin class would eliminate the bootstrap step entirely and
      close LESSON-08 (eager-import-cycle hazard) at source. Phase 0
      sweep (g5) flagged two blockers:
      (1) registry-replay tests pass an alternate registry to
      bootstrap_default_plugins(registry=...); decorators bind to module
      load-time singleton.
      (2) FQCN resolution timing: deferred registrations resolve class
      strings on first use; converting them mid-flight risks load-order
      bugs.
    decision: deferred
    defer_to: future planning slice (not axis-bounded)
    notes: |
      Pre-requisites: design replay-safe decorator binding (factory
      callback?), audit all `bootstrap_default_plugins(registry=...)`
      call sites, design migration path for deferred registrations.

  - id: FIND-G5-03
    severity: low
    category: surface_area
    axis: registry/lifecycle
    location: scanner_plugins/__init__.py __all__
    summary: |
      ScanPipelinePlugin imported for use in cast() but not exported in
      __all__. After g5 cast restoration (cast(type[ScanPipelinePlugin],
      ...)) the import is reachable; however other plugin interface
      classes used by external consumers are also legitimately public
      and should be re-exported from the package root.
    decision: closed
    fix: |
      Add ScanPipelinePlugin to __all__. Other plugin interfaces remain
      reachable via prism.scanner_plugins.interfaces (canonical home).
    files_touched:
      - src/prism/scanner_plugins/__init__.py
