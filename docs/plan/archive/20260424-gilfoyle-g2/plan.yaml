  # ─────────────────────────── WAVE 1 ───────────────────────────

  - id: W1-T01
    title: "FIND-01: Rename Default* → AnsibleDefault* and relocate to ansible/extract_policies.py"
    description: |
      Rename the four Default* policy plugin classes in scanner_plugins/policies/extract_defaults.py
      to AnsibleDefault* to reflect their true Ansible-specific nature.

      Steps:
      1. In extract_defaults.py, rename:
         - DefaultTaskLineParsingPolicyPlugin → AnsibleDefaultTaskLineParsingPolicyPlugin
         - DefaultTaskAnnotationPolicyPlugin  → AnsibleDefaultTaskAnnotationPolicyPlugin
         - DefaultTaskTraversalPolicyPlugin   → AnsibleDefaultTaskTraversalPolicyPlugin
         - DefaultVariableExtractorPolicyPlugin → AnsibleDefaultVariableExtractorPolicyPlugin
      2. Add PLUGIN_IS_STATELESS = True as a class attribute to each renamed class.
      3. Update __all__ in extract_defaults.py to export the new names.
      4. Update policies/__init__.py: replace all four Default* imports with AnsibleDefault*.
      5. Update scanner_plugins/defaults.py: replace four singleton imports + variable names
         (_TASK_LINE_PARSING_FALLBACK etc.) to use AnsibleDefault*.
      6. Update the registry's default extract-policy registration site (if any) in defaults.py
         or the registry bootstrap.
      7. Check tests/ for any test files importing Default* directly and update them.
      8. Verify ansible/extract_policies.py AnsibleTask* classes are the canonical ones
         (they are — already exist). No merge needed, just confirm they remain untouched.
      9. Do NOT delete extract_defaults.py; it still houses the AnsibleDefault* implementations
         and may house genuinely neutral stub classes in future.

      Files to modify:
        - src/prism/scanner_plugins/policies/extract_defaults.py
        - src/prism/scanner_plugins/policies/__init__.py
        - src/prism/scanner_plugins/defaults.py
        - src/prism/tests/*.py (any that import Default* by name)
