tldr: |
  Wave 1 resolves the two structural blockers that downstream waves depend on:
  FIND-01 removes Ansible-specific Default* classes from the neutral policies/ folder
  (moves/renames them → AnsibleDefault*) and FIND-04 eliminates the local
  _require_prepared_policy in ansible/variable_discovery.py that bypasses DI.
  Wave 2 is safe to start only after Wave 1 because it adds mixins to the now-renamed
  AnsibleDefault* classes and fixes the DEFAULT_DOC_MARKER_PREFIX import that those
  classes still need. Wave 3 cleans up wrapper functions, dead code, and two-phase
  construction anti-patterns, all of which reference stable post-Wave-2 names.

