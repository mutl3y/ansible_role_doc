  - id: W1-T02
    title: "FIND-04: Replace local _require_prepared_policy in ansible/variable_discovery.py with di_helpers"
    description: |
      ansible/variable_discovery.py defines its own _require_prepared_policy(options, policy_name, context_name)
      that takes a raw options dict instead of a DI object. This bypasses the canonical
      di_helpers.require_prepared_policy(di, policy_name, context_label) contract.

      Steps:
      1. In src/prism/scanner_plugins/ansible/variable_discovery.py:
         a. Add import: from prism.scanner_core.di_helpers import require_prepared_policy
         b. Delete the local _require_prepared_policy function (lines ~122-152).
         c. Delete the local _get_task_line_parsing_policy wrapper that calls it (lines ~150-155).
         d. At call site line ~150: replace _require_prepared_policy(options, ...) with
            require_prepared_policy(di, ...) — note the first argument changes from `options`
            to `di`. If the call site currently passes `options` dict, trace back to find
            the `di` object available in that scope; if `di` is not available, pass `di=None`
            only when a pre-check confirms the bundle is present, otherwise thread `di`.
         e. At call site line ~414: same replacement.
      2. Assess scanner_core/scanner_context.py's _require_prepared_policy_bundle:
         it validates multiple bundle keys at once (bundle-level validation) — this is NOT
         a duplicate of di_helpers.require_prepared_policy (which is per-policy).
         Leave scanner_context.py's function unchanged.

      Files to modify:
        - src/prism/scanner_plugins/ansible/variable_discovery.py
