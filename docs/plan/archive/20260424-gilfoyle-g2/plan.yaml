  critical_failure_modes:
    - scenario: >
        FIND-01 rename leaves dangling references in registry, defaults.py,
        scanner_plugins/policies/__init__.py, or external test files that import the
        old Default* names.
      likelihood: medium
      impact: high
      mitigation: >
        Task W1-T01 explicitly lists every import site (defaults.py, policies/__init__.py,
        tests/) and updates them atomically in the same change. Acceptance criteria require
        a full pytest -q pass before wave is declared done.
    - scenario: >
        FIND-03 moves DEFAULT_DOC_MARKER_PREFIX import; if marker_utils.py also keeps its
        own definition, the two values could diverge at runtime if one file is cached.
      likelihood: low
      impact: medium
      mitigation: >
        Task W2-T02 deletes the duplicate definition from marker_utils.py and replaces it
        with an import from scanner_config.section. Re-exports via __all__ preserve
        downstream imports unchanged.
    - scenario: >
        FIND-10 two-phase construction fix in execution_request_builder.py causes
        _assemble_execution_request to break because the call site at line 356 no longer
        calls set_container; the bridge now requires container at construction.
      likelihood: medium
      impact: high
      mitigation: >
        Task W3-T02 traces the single instantiation site (line 239) and the single
        set_container call (line 356) inside _assemble_execution_request, threads the
        container through to the constructor, and removes set_container in one atomic
        edit. Acceptance criteria include pytest -q on the execution_request_builder tests.
  assumptions:
    - ansible/extract_policies.py AnsibleTask* classes are already the canonical Ansible
      implementations; Default* classes in policies/extract_defaults.py are confirmed
      duplicates and can be retired after adding PLUGIN_IS_STATELESS.
    - scanner_config/section.py already defines DEFAULT_DOC_MARKER_PREFIX = "prism" (verified).
    - The only consumer of scanner_compat/render_compat.py is src/prism/tests/test_render_compat.py (verified via grep).
    - _ScanStateBridge is instantiated exactly once in build_non_collection_run_scan_execution_request (line 239) and set_container is called once in _assemble_execution_request (line 356).

