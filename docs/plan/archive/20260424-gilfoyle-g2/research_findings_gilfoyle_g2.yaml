patterns_found:
  - category: architecture
    pattern: "Ansible-backed classes named Default*"
    description: >
      DefaultTaskTraversalPolicyPlugin and DefaultTaskLineParsingPolicyPlugin in
      policies/extract_defaults.py import directly from ansible.task_traversal_bare.
      The naming implies they are generic platform defaults, but they are Ansible-specific
      implementations. Any non-Ansible platform (K8s, Terraform) would need its own
      traversal plugin — these "defaults" should be renamed to AnsibleDefault* or
      moved to scanner_plugins/ansible/.
    examples:
      - file: src/prism/scanner_plugins/policies/extract_defaults.py
        location: "L36-L49 (import block), L176-L213 (DefaultTaskTraversalPolicyPlugin body)"
        snippet: |
          from prism.scanner_plugins.ansible.task_traversal_bare import (
              TEMPLATED_INCLUDE_RE, ...
              collect_unconstrained_dynamic_role_includes,
              ...
          )
    prevalence: common

  - category: structure
    pattern: "DEFAULT_DOC_MARKER_PREFIX string literal defined twice"
    description: >
      Two files define DEFAULT_DOC_MARKER_PREFIX = "prism" as a literal string.
      scanner_config/section.py is not imported by marker_utils.py or vice versa —
      they are independent definitions. Tests import from scanner_config which re-exports
      from section.py. marker_utils.py is the canonical plugin-layer owner.
    examples:
      - file: src/prism/scanner_plugins/parsers/comment_doc/marker_utils.py
        location: "L11"
        snippet: 'DEFAULT_DOC_MARKER_PREFIX = "prism"'
      - file: src/prism/scanner_config/section.py
        location: "L5"
        snippet: 'DEFAULT_DOC_MARKER_PREFIX = "prism"'
    prevalence: occasional

  - category: structure
    pattern: "normalize_marker_prefix delegation wrappers in policy classes"
    description: >
      Both DefaultTaskAnnotationPolicyPlugin and AnsibleTaskAnnotationPolicyPlugin
      expose normalize_marker_prefix() as a static method that simply calls the
      canonical function. No logic is duplicated, but two extra method definitions
      exist. The canonical function could be called directly by callers.
    examples:
      - file: src/prism/scanner_plugins/policies/extract_defaults.py
        location: "L138-L139"
        snippet: |
          @staticmethod
          def normalize_marker_prefix(marker_prefix: str | None) -> str:
              return normalize_marker_prefix(marker_prefix)
      - file: src/prism/scanner_plugins/ansible/extract_policies.py
        location: "L149-L150"
        snippet: |
          @staticmethod
          def normalize_marker_prefix(marker_prefix: str | None) -> str:
              return task_annotation_strategy.normalize_marker_prefix(marker_prefix)
    prevalence: occasional

  - category: architecture
    pattern: "Three _require_prepared_policy implementations with different signatures"
    description: >
      di_helpers.require_prepared_policy(di, name, label) — canonical path via DI.
      scanner_context._require_prepared_policy_bundle(scan_options) — validates bundle
        structure (task_line_parsing + jinja_analysis required keys).
      ansible/variable_discovery._require_prepared_policy(options, name, ctx) — options
        dict directly, not DI, with its own isinstance chain.
      Only the di_helpers version is explicitly documented. The other two are private
      local functions. The variable_discovery variant is the only one with the
      options-dict signature — it predates the canonical DI path.
    examples:
      - file: src/prism/scanner_core/di_helpers.py
        location: "L27"
        snippet: "def require_prepared_policy(di, policy_name, context_label) -> Any"
      - file: src/prism/scanner_core/scanner_context.py
        location: "L49"
        snippet: "def _require_prepared_policy_bundle(scan_options: ScanOptionsDict) -> dict"
      - file: src/prism/scanner_plugins/ansible/variable_discovery.py
        location: "L122"
        snippet: "def _require_prepared_policy(options: dict | None, policy_name, context_name)"
    prevalence: occasional

  - category: structure
    pattern: "_get_*_policy one-liner functions duplicated across scanner_extract modules"
    description: >
      8 functions across 5 files all follow: `return require_prepared_policy(di, key, label)`.
      task_line_parsing and task_catalog_assembly both define _get_task_line_parsing_policy.
      task_line_parsing and task_annotation_parsing both define _get_task_annotation_policy.
      task_file_traversal and loader both define _get_yaml_parsing_policy (different behavior).
      variable_extractor defines _get_variable_extractor_policy with custom options-dict logic.
    examples:
      - file: src/prism/scanner_extract/task_line_parsing.py
        location: "L11-L12"
        snippet: |
          def _get_task_line_parsing_policy(di=None):
              return require_prepared_policy(di, "task_line_parsing", "task_line_parsing")
      - file: src/prism/scanner_extract/task_catalog_assembly.py
        location: "L14-L15"
        snippet: |
          def _get_task_line_parsing_policy(di: object | None = None):
              return require_prepared_policy(di, "task_line_parsing", "task_catalog_assembly")
    prevalence: common

  - category: structure
    pattern: "_PolicyBackedCollectionProxy and _PolicyBackedRegexProxy untyped"
    description: >
      Both proxy classes have no return-type annotations on _current_value() and
      no class-level type parameter. __iter__ returns Iterator[Any], __contains__
      takes object. Module-level TASK_INCLUDE_KEYS etc. are typed as the proxy object
      not as Collection[str]. ansible/extract_policies.py at line 20 binds
      _ANSIBLE_TASK_INCLUDE_KEYS from the proxy — iterating a proxy during class
      body evaluation triggers require_prepared_policy without a DI container.
    examples:
      - file: src/prism/scanner_extract/task_line_parsing.py
        location: "L20-L45"
        snippet: |
          class _PolicyBackedCollectionProxy:
              def _current_value(self) -> object: ...  # no Collection[str]
              def __iter__(self) -> Iterator[Any]: ...
    prevalence: occasional

  - category: structure
    pattern: "Registry slots typed as dict[str, type[Any]] despite Protocol availability"
    description: >
      YAMLParsingPolicyPlugin and JinjaAnalysisPolicyPlugin Protocols are defined in
      interfaces.py and imported in registry.py but not used in the slot dict or
      register_* method signatures. No Protocol exists for extract policy plugins
      (TaskLineParsingPolicy, TaskAnnotationPolicy, etc.) in interfaces.py.
    examples:
      - file: src/prism/scanner_plugins/registry.py
        location: "L113-L116"
        snippet: |
          self._extract_policy_plugins: dict[str, type[Any]] = {}
          self._yaml_parsing_policy_plugins: dict[str, type[Any]] = {}
          self._jinja_analysis_policy_plugins: dict[str, type[Any]] = {}
    prevalence: occasional

  - category: architecture
    pattern: "scanner_compat wrapping private symbols with only test consumers"
    description: >
      render_compat.py imports 9 private-by-convention (_-prefixed) symbols from
      scanner_readme. All 4 import sites of render_compat are in test_render_compat.py.
      No production code uses scanner_compat.render_compat. The compat wrappers
      add a delegation indirection with no consumer benefit.
    examples:
      - file: src/prism/scanner_compat/render_compat.py
        location: "L5-L16"
        snippet: |
          from prism.scanner_readme.render import (
              _compose_section_body, _generated_merge_markers, ...
          )
    prevalence: rare

  - category: architecture
    pattern: "Dead _repo_scan_facade slot in api.py"
    description: >
      api.py declares _repo_scan_facade: Any = None and a resolver that guards on
      it, but the variable is never set. The guard branch is always False.
      The canonical slot lives in api_layer/non_collection.py.
    examples:
      - file: src/prism/api.py
        location: "L65-L72"
        snippet: |
          _repo_scan_facade: Any = None
          def _resolve_repo_scan_facade() -> Any:
              if _repo_scan_facade is not None:  # always False
                  return _repo_scan_facade
              return api_non_collection._resolve_repo_scan_facade()
    prevalence: rare

  - category: architecture
    pattern: "_ScanStateBridge two-phase construction"
    description: >
      __init__ accepts all collaborators but not container, leaving the object in an
      invalid intermediate state. prepare_scan_context() raises ValueError at runtime
      if set_container() was not called. The two-call sequence is invisible at
      construction sites. The only call site (execution_request_builder.py:357)
      calls set_container immediately after constructing DIContainer, but this
      ordering is not enforced by the type system or constructor signature.
    examples:
      - file: src/prism/scanner_core/execution_request_builder.py
        location: "L29-L53"
        snippet: |
          def __init__(self, *, variable_discovery_cls, ...):
              ...
              self._container: Any = None  # must be set later
          def set_container(self, container: Any) -> None:
              self._container = container
    prevalence: rare

  - category: architecture
    pattern: "Module-level singletons bypass PLUGIN_IS_STATELESS enforcement"
    description: >
      Six Default* instances created at module import in defaults.py bypass
      require_stateless_plugin (which only fires during register_* calls).
      The classes lack PLUGIN_IS_STATELESS = True marker. The invariant is
      documented in a comment but not enforced. Any future mutable state added
      to a Default* class would silently violate the singleton contract.
    examples:
      - file: src/prism/scanner_plugins/defaults.py
        location: "L44-L49"
        snippet: |
          _TASK_LINE_PARSING_FALLBACK = DefaultTaskLineParsingPolicyPlugin()
          _TASK_ANNOTATION_FALLBACK = DefaultTaskAnnotationPolicyPlugin()
          ...
    prevalence: occasional

