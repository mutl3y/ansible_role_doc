      - path: src/prism/scanner_plugins/defaults.py
        lines:
          - "44: _TASK_LINE_PARSING_FALLBACK = DefaultTaskLineParsingPolicyPlugin()"
          - "45: _TASK_ANNOTATION_FALLBACK = DefaultTaskAnnotationPolicyPlugin()"
          - "46: _TASK_TRAVERSAL_FALLBACK = DefaultTaskTraversalPolicyPlugin()"
          - "47: _VARIABLE_EXTRACTOR_FALLBACK = DefaultVariableExtractorPolicyPlugin()"
          - "48: _YAML_PARSING_FALLBACK = YAMLParsingPolicyPlugin()"
          - "49: _JINJA_ANALYSIS_FALLBACK = JinjaAnalysisPolicyPlugin()"
          - "40-43: invariant comment — no enforcement"
      - path: src/prism/scanner_plugins/policies/extract_defaults.py
        lines:
          - "67,97,122,176: Default* class definitions — no PLUGIN_IS_STATELESS = True"
      - path: src/prism/scanner_plugins/registry.py
        lines:
          - "37-60: require_stateless_plugin — only called from register_* methods"
          - "52: getattr(plugin_class, 'PLUGIN_IS_STATELESS', None)"
    symbols_to_rename_or_move:
      - "Add PLUGIN_IS_STATELESS = True to all Default* classes in extract_defaults.py"
      - "Add PLUGIN_IS_STATELESS = True to YAMLParsingPolicyPlugin and JinjaAnalysisPolicyPlugin in parsers/"
      - "Or: add a module-load assertion in defaults.py that calls require_stateless_plugin for each singleton class"
    import_sites_to_update:
      - "No import changes — attribute additions only"
    estimated_complexity: trivial

open_questions:
  - question: >
      Should DefaultTask*/DefaultVariable* classes be renamed in-place with deprecation
      re-exports, or moved physically to scanner_plugins/ansible/?
    context: >
      Moving them to ansible/ would break any caller importing from policies/.
      The policies/__init__.py re-exports them — a rename-in-place with new aliases
      in __init__ is safer. But moving clarifies ownership.
    type: decision_blocker
    affects: [FIND-01]

  - question: >
      Is scanner_config/section.py:DEFAULT_DOC_MARKER_PREFIX intentionally independent
      (scanner_config layer should not import from scanner_plugins)?
    context: >
      If the scanner_config layer has an explicit no-import-from-plugins rule, the
      duplicate is intentional. In that case FIND-02 should document the cross-layer
      constraint rather than propose consolidation.
    type: decision_blocker
    affects: [FIND-02]

  - question: >
      Does ansible/extract_policies.py:28 (frozenset(task_line_parsing_module.TASK_INCLUDE_KEYS))
      actually trigger require_prepared_policy at class-body evaluation time?
    context: >
      If the prepared_policy_bundle is not set at module import time (which it likely
      is not), the frozenset() call on the proxy would raise ValueError. This may be
      a latent bug or it may succeed if the class body is only evaluated after bundle
      is populated.
    type: decision_blocker
    affects: [FIND-06]

  - question: >
      Is _ScanStateBridge._container: None intermediate state ever observable?
    context: >
      In _assemble_execution_request the bridge is constructed immediately before
      DIContainer and set_container is called within the same function. If the
      function is never interrupted between lines 248 and 357, the invalid state
      is never externally visible. The risk is only if _ScanStateBridge is reused
      or the call sequence is refactored.
    type: nice_to_know
    affects: [FIND-10]

gaps:
  - area: "Extract policy Plugin Protocols in interfaces.py"
    description: >
      No Protocols for TaskLineParsingPolicyPlugin, TaskAnnotationPolicyPlugin, or
      TaskTraversalPolicyPlugin exist in interfaces.py. The registry stores them
      as type[Any]. This means mypy cannot validate structural conformance at
      registration time.
    impact: nice_to_know
    affects: [FIND-07]

  - area: "ansible/extract_policies.py proxy-at-class-body test coverage"
    description: >
      It is unclear whether test_comment_doc_plugin_resolution.py covers the
      frozenset(task_line_parsing_module.TASK_INCLUDE_KEYS) at class-body eval
      time. A specific test for import-time proxy materialization would clarify
      whether FIND-06 contains a latent bug.
    impact: research_blocker
    affects: [FIND-06]
