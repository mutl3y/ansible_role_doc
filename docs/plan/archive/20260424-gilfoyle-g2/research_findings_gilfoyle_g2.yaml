plan_id: 20260424-gilfoyle-g2
objective: >
  Gather concrete file contents and line numbers for 10 specific findings from a
  Gilfoyle architectural review of src/prism/. Produce precise, actionable task
  definitions for a remediation plan.
focus_area: gilfoyle-g2-ten-findings
created_at: "2026-04-24"
created_by: researcher-agent
status: completed

tldr: |
  - FIND-01: DefaultTask*/DefaultVariable* classes in policies/extract_defaults.py
    carry the word "Default" but import from prism.scanner_plugins.ansible.task_traversal_bare
    at line 36 — they are Ansible-specific, not platform-neutral.
  - FIND-02/03: DEFAULT_DOC_MARKER_PREFIX = "prism" is defined in TWO independent
    source files (marker_utils.py:11 and scanner_config/section.py:5). The plugin
    annotation-class wrappers normalize_marker_prefix() in both extract_defaults.py
    and ansible/extract_policies.py simply delegate to the same canonical function —
    no logic divergence, but there are two source-of-truth strings.
  - FIND-04: Three distinct _require_prepared_policy implementations exist with
    different signatures and different resolution strategies (DI-path, scan_options
    dict, full-bundle validator).
  - FIND-05: Eight _get_*_policy one-liner wrappers across 5 files. All except
    loader.py and variable_extractor.py are thin one-liners over require_prepared_policy.
  - FIND-06: _PolicyBackedCollectionProxy/_PolicyBackedRegexProxy classes in
    task_line_parsing.py are untyped (no Collection[str] / Pattern[str] annotation).
    The proxy module-level names are re-exported through scanner_extract/__init__.py
    and consumed by ansible/extract_policies.py.
  - FIND-07: Registry slots for extract/yaml/jinja policy plugins use dict[str, type[Any]]
    rather than typed Protocol slots. YAMLParsingPolicyPlugin and JinjaAnalysisPolicyPlugin
    Protocols exist in interfaces.py but are not used in the registry dict typing.
  - FIND-08: scanner_compat/render_compat.py imports 11 private symbols (all _-prefixed)
    from scanner_readme.render/guide. Only consumer is test_render_compat.py — no
    production callsite. One of the aliased symbols (render_guide_section_body) is
    already public in guide.py.
  - FIND-09: api.py has a dead _repo_scan_facade: Any = None at line 65 and a
    stub _resolve_repo_scan_facade() at line 68 that always delegates to
    api_layer/non_collection._resolve_repo_scan_facade(). The api.py variable is
    never populated.
  - FIND-10: _ScanStateBridge in execution_request_builder.py uses two-phase
    construction — __init__ accepts all collaborators except container, then
    set_container() is called later (line 357). Object is in an inconsistent
    intermediate state between the two calls.
  - FIND-15: Six module-level singleton instances in defaults.py (lines 44-49) are
    created at import time from Default* classes that have no PLUGIN_IS_STATELESS
    marker — they bypass require_stateless_plugin enforcement (which only applies
    to registry-registered classes).

