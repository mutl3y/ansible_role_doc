    rationale: "Already live in ansible/default_policies.py. extract_defaults.py is a 100% pass-through facade with a docstring that admits its Ansible nature."
    action: "Delete extract_defaults.py entirely."

  - source_symbol: "split_task_annotation_label, split_task_target_payload, task_anchor, annotation_payload_looks_yaml, extract_task_annotations_for_file, get_marker_line_re, _normalize_marker_prefix, _get_marker_line_re"
    current_path: "scanner_plugins/policies/annotation_parsing.py"
    axis: FEATURE
    canonical_path: "scanner_plugins/parsers/comment_doc/annotation_parsing.py (new)"
    rationale: "Defines the comment-doc annotation kind taxonomy (runbook/warning/deprecated/note/additional). Pure feature logic."
    coupling_resolution: "See section 4 — TaskBoundaryDetector protocol decouples the Ansible-regex import."

  - source_symbol: "render_runbook, build_runbook_rows, render_runbook_csv"
    current_path: "scanner_reporting/runbook.py"
    axis: FEATURE
