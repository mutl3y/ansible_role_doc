    rationale: "Renders comment-doc annotation kind 'runbook'; the kind itself is defined in annotation_parsing.py:42-48."
    template_relocation:
      from: "src/prism/templates/RUNBOOK.md.j2"
      to:   "src/prism/scanner_plugins/parsers/comment_doc/templates/RUNBOOK.md.j2"
      rationale: "RUNBOOK.md.j2 shape is feature-determined, not platform-determined (per design_principle_2)."

  - source_symbol: "DefaultScanPipelinePlugin"
    current_path: "scanner_plugins/policies/default_scan_pipeline.py"
    axis: NEUTRAL
    canonical_path_option_a: "scanner_plugins/defaults/scan_pipeline.py (rename policies → defaults)"
    canonical_path_option_b: "scanner_plugins/policies/default_scan_pipeline.py (stay; add __doc__ clarifying neutral-only scope)"
    recommendation: "Option (a). See PARTNER_OPINIONS."

#####################################################################
# 4. NEW PROTOCOL — TaskBoundaryDetector
#####################################################################

new_protocol_task_boundary_detector:
  motivation: >
    annotation_parsing.py needs to know "given a YAML file and a line where
    a comment-driven annotation appeared, where does the next task/item the
    annotation is attached to start?" That answer is platform-specific:
      - Ansible: "next line matching ^\\s*-\\s+name:"
      - Terraform: "next 'resource' / 'module' / 'data' block opener"
      - Kubernetes: "next top-level mapping key in a multi-doc YAML"

  protocol_shape:
    location: "src/prism/scanner_plugins/interfaces.py"
    name: "TaskBoundaryDetector"
    methods:
      - signature: "find_next_task_anchor(self, source_lines: Sequence[str], starting_at_line: int) -> int | None"
        contract: "Return the 0-indexed line number of the next platform-specific 'task-like item' header at or after starting_at_line. Return None if no further anchor exists."
      - signature: "is_task_anchor_line(self, line: str) -> bool"
        contract: "Return True iff the given line is a platform-specific task-like item header."
    plugin_contract:
      stateless: true   # added to _STATELESS_REQUIRED_SLOTS
      api_version: "(1, 0)"
    registry_slot: "task_boundary_detector"

  ansible_implementation:
    location: "src/prism/scanner_plugins/ansible/task_boundary.py (new)"
    body: >
      Wraps the existing TASK_ENTRY_RE / COMMENTED_TASK_ENTRY_RE matching
      logic that currently lives inline in annotation_parsing.py. Pure
      mechanical lift — no behaviour change.

  consumption_in_annotation_parsing:
    pattern: >
      annotation_parsing.extract_task_annotations_for_file(...) gains a
      task_boundary_detector parameter (or accepts it via DI). The function
      stops importing TASK_ENTRY_RE directly. comment_doc plugin no longer
      knows the word "Ansible."

  resolution_via_di:
    location: "src/prism/scanner_core/di.py"
    helper: "factory_task_boundary_detector(di) — resolves via PluginRegistry using the same platform_key chain as factory_variable_discovery_plugin (gf2-full-remediation-20260419)"

  fail_closed_invariant: >
    If no plugin is registered for slot=task_boundary_detector under the
    resolved platform_key, raise PluginNotFoundError. No silent fallback to
    Ansible behaviour.

#####################################################################
# 5. WAVES — implementation order (when this plan is executed)
#####################################################################

waves:

  W0_consumer_inventory:
    description: "Quick informational sweep of in-repo consumers (src/prism + demos + docs + scripts). prism-learn is checked best-effort only — not a gate."
    actions:
      - "Grep src/prism/ for: scanner_plugins.policies, scanner_reporting.runbook, scanner_plugins.policies.{constants,extract_defaults,annotation_parsing}"
      - "Grep prism's docs/, demos/, scripts/ for the same paths"
      - "Best-effort grep prism-learn (informational only — do not block on it)"
    not_blocking: "All discovery. The wave plan does not branch on results. If prism-learn breaks post-release, we forward-fix it there per user directive 2026-04-25."

  W1_create_canonical_homes:
    description: "Create new canonical files; old paths still work."
    files_added:
      - "src/prism/scanner_plugins/ansible/task_vocabulary.py"
      - "src/prism/scanner_plugins/ansible/task_regex.py"
      - "src/prism/scanner_plugins/parsers/yaml/line_shape.py"
      - "src/prism/scanner_plugins/parsers/comment_doc/annotation_parsing.py"
      - "src/prism/scanner_plugins/parsers/comment_doc/runbook_renderer.py"
      - "src/prism/scanner_plugins/parsers/comment_doc/templates/RUNBOOK.md.j2"
    invariant: "No deletions yet; pytest still green."

  W2_define_task_boundary_detector_protocol:
    description: "Add the protocol + Ansible implementation + DI factory + registry slot."
    files_added:
      - "src/prism/scanner_plugins/ansible/task_boundary.py"
    files_modified:
      - "src/prism/scanner_plugins/interfaces.py — add TaskBoundaryDetector Protocol"
      - "src/prism/scanner_plugins/registry.py — register slot, add to _STATELESS_REQUIRED_SLOTS"
      - "src/prism/scanner_plugins/ansible/__init__.py — register AnsibleTaskBoundaryDetector"
      - "src/prism/scanner_core/di.py — factory_task_boundary_detector"
      - "src/prism/scanner_plugins/parsers/comment_doc/annotation_parsing.py — accept task_boundary_detector via DI; drop direct TASK_ENTRY_RE import"
    invariant: "All existing behaviour preserved; protocol now exists and is wired."

  W3_redirect_internal_callers:
    description: "Update every importer in src/prism to use canonical paths."
    files_modified:
      - "src/prism/scanner_plugins/ansible/task_annotation_strategy.py — import from ansible/task_vocabulary + ansible/task_regex + parsers/comment_doc/annotation_parsing"
      - "src/prism/scanner_plugins/ansible/default_policies.py — same"
      - "src/prism/scanner_plugins/ansible/task_traversal_bare.py — import from ansible/task_vocabulary + ansible/task_regex"
      - "src/prism/scanner_plugins/policies/__init__.py — direct import from ansible/default_policies for the AnsibleDefault* re-exports OR remove the re-exports entirely (preferred — see W4)"
      - "src/prism/scanner_reporting/__init__.py — re-export from parsers/comment_doc/runbook_renderer (keeps prism.scanner_reporting public surface stable)"
    test_updates:
      - "src/prism/tests/test_extract_defaults_domain_neutrality.py — rewrite to assert: (1) AnsibleDefault* classes are importable from scanner_plugins.ansible.default_policies, (2) they are NOT importable from scanner_plugins.policies (post-W4), (3) scanner_plugins.policies/ contains only platform-neutral defaults"

  W4_delete_misowned_modules:
    description: "Remove the four misowned files. Unconditional — no deprecation shims, per user directive 2026-04-25."
    files_deleted:
      - "src/prism/scanner_plugins/policies/constants.py"
      - "src/prism/scanner_plugins/policies/extract_defaults.py"
      - "src/prism/scanner_plugins/policies/annotation_parsing.py"
      - "src/prism/scanner_reporting/runbook.py"
      - "src/prism/templates/RUNBOOK.md.j2"
    files_modified:
      - "src/prism/scanner_plugins/policies/__init__.py — drop re-exports of deleted symbols; only re-export DefaultScanPipelinePlugin (and any other genuinely-neutral defaults)"
    lockstep_updates: "Any consumer found by W0 inside src/prism/ (or in prism's demos/, docs/, scripts/) is updated in this same wave/commit. prism-learn is forward-fixed in its own repo if needed — not gated here."

  W5_optional_rename_policies_to_defaults:
    description: "Rename scanner_plugins/policies/ → scanner_plugins/defaults/ to stop the directory name from lying."
    status: "OPTIONAL — recommended but separable; can ship as its own slice if W1-W4 closure is the priority"
    files_renamed:
      - "scanner_plugins/policies/__init__.py → scanner_plugins/defaults/__init__.py"
      - "scanner_plugins/policies/default_scan_pipeline.py → scanner_plugins/defaults/scan_pipeline.py"
    files_modified:
      - "Every consumer of DefaultScanPipelinePlugin (registry default factory, tests)"

  W6_closure_gate:
    description: "Validation."
    gate:
      - ".venv/bin/python -m pytest -q -p no:cov -p no:cacheprovider"
      - ".venv/bin/python -m ruff check src/prism"
      - ".venv/bin/python -m black --check src/prism"
      - ".venv/bin/python -m tox -e typecheck"
      - "grep -r 'scanner_plugins.policies.constants' src/prism/ — must return zero matches"
      - "grep -r 'scanner_plugins.policies.extract_defaults' src/prism/ — must return zero matches"
      - "grep -r 'scanner_plugins.policies.annotation_parsing' src/prism/ — must return zero matches"
      - "grep -r 'from prism.scanner_plugins.policies import' src/prism/ — must show only DefaultScanPipelinePlugin (or the renamed equivalent)"
      - "grep -r 'comment_doc' src/prism/scanner_plugins/policies/ — must return zero"
      - "test -e src/prism/templates/RUNBOOK.md.j2 — must FAIL (file is deleted)"

#####################################################################
# 6. PUBLIC API CONTRACT
#####################################################################

public_api_contract:
  unchanged_external_surface:
    - "prism.scanner_reporting (package) re-exports of build_runbook_rows / render_runbook / render_runbook_csv — UNCHANGED, just re-routed internally to parsers/comment_doc/runbook_renderer"
    - "prism.api / prism.cli — no changes"

  internal_movement_acceptable:
    - "scanner_plugins/policies/* — mostly deleted, contents redistributed; no compat shims"
    - "scanner_reporting/runbook.py — deleted; package-level re-exports preserved at scanner_reporting/__init__.py"
    - "src/prism/templates/RUNBOOK.md.j2 — deleted; canonical home is scanner_plugins/parsers/comment_doc/templates/"
  no_silent_fallbacks_invariant: >
    No code path may silently substitute Ansible behaviour for a missing
    platform plugin. PluginNotFoundError is raised with the requested
    platform_key + slot name in the message. (Mirrors the gf2-full-remediation
    fail-closed pattern.)

#####################################################################
# 7. ACCEPTANCE CRITERIA
#####################################################################

acceptance_criteria_for_implementation_followup:
  - "Zero matches for grep 'scanner_plugins.policies.constants|scanner_plugins.policies.extract_defaults|scanner_plugins.policies.annotation_parsing' in src/prism/ (excluding the deletion-acknowledging tests)"
  - "Zero matches for grep 'scanner_reporting.runbook' inside src/prism/scanner_reporting/ (the package facade re-exports from elsewhere)"
  - "scanner_plugins/policies/__init__.py exports ONLY DefaultScanPipelinePlugin (or the entire dir is renamed to defaults/)"
  - "scanner_plugins/parsers/comment_doc/annotation_parsing.py contains zero references to 'TASK_ENTRY_RE', 'COMMENTED_TASK_ENTRY_RE', 'ansible', 'role', 'playbook'"
  - "TaskBoundaryDetector Protocol is defined in interfaces.py; AnsibleTaskBoundaryDetector implements it; di.py.factory_task_boundary_detector resolves via PluginRegistry"
  - "RUNBOOK.md.j2 lives at scanner_plugins/parsers/comment_doc/templates/RUNBOOK.md.j2; src/prism/templates/RUNBOOK.md.j2 is deleted"
  - "test_extract_defaults_domain_neutrality.py is rewritten to assert ANSIBLE ownership"
  - "test_task_boundary_detector_protocol.py covers Ansible impl + the registry slot + the fail-closed PluginNotFoundError path"
  - "Full pytest + ruff + black + mypy gate green"

#####################################################################
# 8. RISKS
#####################################################################

risks:
  - id: R1
    severity: medium
    description: "TaskBoundaryDetector protocol design might not generalise cleanly to Terraform/K8s. We're designing it now based on Ansible-as-only-platform."
    mitigation: "Keep the protocol minimal (find_next_task_anchor + is_task_anchor_line). Both questions are language-agnostic enough that any platform with 'discrete items in a file' can answer them. Defer adding richer methods until a second platform actually needs them."

  - id: R2
    severity: low
    description: "Renaming policies → defaults (W5) is a cross-cutting churn that touches the registry's default factory and possibly demos/docs."
    mitigation: "W5 is explicitly OPTIONAL and separable. If W1-W4 ship cleanly, W5 can be a follow-up slice."

  - id: R3
    severity: medium
    description: "test_extract_defaults_domain_neutrality.py is named in a way that implies the test suite has historically codified the WRONG location as policy. Rewriting it without renaming the test module preserves the misleading name."
    mitigation: "Rename in W3: test_extract_defaults_domain_neutrality.py → test_extract_defaults_ansible_ownership.py."

  - id: R4
    severity: low
    description: "Templates dir at src/prism/templates/ may have other consumers beyond RUNBOOK.md.j2 (e.g. README.md.j2 still lives there pending g7)."
    mitigation: "g7b only touches RUNBOOK.md.j2. README.md.j2 relocation stays in g7's scope. Templates dir is not deleted; it is depopulated incrementally."

  - id: R5
    severity: high
    description: "Ansible-regex usage outside annotation_parsing.py — if other comment_doc helpers (or scanner_core paths) also import TASK_ENTRY_RE through the policies/constants façade, they will break when constants.py is deleted."
    mitigation: "W3 includes an exhaustive grep for every symbol moved out of constants.py. The earlier inventory showed ansible/task_annotation_strategy.py, ansible/default_policies.py, ansible/task_traversal_bare.py as the only non-policies importers — all three move to ansible/task_vocabulary import."

  - id: R6
    severity: low
    description: "prism-learn may import any of these paths. Per user directive 2026-04-25, this is NOT a gate — if prism-learn breaks after release, we forward-fix in that repo."
    mitigation: "Best-effort grep in W0 to give us a heads-up; not blocking. No coordination requirement."

  - id: R7
    severity: low
    description: "The runbook_renderer.py move changes Path(__file__).parent.parent for default template resolution."
    mitigation: "runbook_renderer.py at the new location resolves templates relative to its own __file__. The compat re-export in scanner_reporting.__init__ does not perform path resolution."

#####################################################################
# 9. PARTNER_OPINIONS — what I disagree with from my own v1 draft
#####################################################################

partner_opinions:
  opinion_1_option_c_was_wrong:
    v1_position: "Defer the TaskBoundaryDetector protocol; ship Option C (move annotation_parsing as-is, accept the Ansible-regex coupling for one release)."
    v2_position: "Do the protocol NOW. Option C ships the file move but transplants the architectural sin to a new path. We'd be marketing 'now lives under comment_doc/' while the comment_doc plugin still imports Ansible regexes — a worse lie than the current one because the new location implies decoupling has occurred."
    why_i_changed_my_mind: >
      The user's vision statement is "I envisioned all this would be plug
      and play by now." Shipping a file move that doesn't decouple is
      cosmetic remediation. The protocol is ~60 lines of code; the cost
      of doing it correctly is small relative to the cost of doing it
      wrong twice.

  opinion_2_no_compat_shims_period:
    v1_position: "Add DeprecationWarning re-exports for one release."
    v2_position: "Skip shims entirely. Direct deletion."
    user_directive_2026_04_25: "'no need for a deprecation cycle, deprecate now' — locks the no-shim decision unconditionally."
    rationale: "The fsrc-to-src promotion (2026-04-22) deleted entire compat lanes wholesale; the established codebase pattern is rip-the-band-aid. W0 still runs because we want to know who needs lockstep updating, but its result no longer branches the wave plan."

  opinion_3_rename_policies_to_defaults:
    v1_position: "Keep policies/ name; add a clarifying __doc__."
    v2_position: "Rename to defaults/. The current name will keep attracting misplacement (Ansible-shaped 'policies' or comment-doc-shaped 'policies') because the word 'policy' is overloaded in this codebase (PreparedPolicyBundle, extract_policy slot, yaml_parsing_policy slot, etc.). A name that lies attracts more lies. Marked OPTIONAL because it's separable, but my recommendation is do it."
    counter_argument_acknowledged: >
      Cross-cutting rename touches registry default factory + tests + any
      documentation reference. Worth doing as its own narrow slice if W1-W4
      closure is time-pressured.

  opinion_4_runbook_template_belongs_with_feature_not_platform:
    v1_position: "Move RUNBOOK.md.j2 under comment_doc/templates/ (mirroring g7)."
    v2_position: "Same destination, but the rationale is fundamentally different from g7's README move and that distinction matters. README.md.j2 is platform-shaped (Ansible role README). RUNBOOK.md.j2 is feature-shaped (iterates kind=='runbook' annotations regardless of platform). Together they establish design_principle_2 — templates live with whoever determines their SHAPE. That convention is the load-bearing artefact, not the file moves."

  opinion_5_w0_audit_is_load_bearing:
    v1_position: "Importer audit was a single line in a wave description."
    v2_position: "W0 is a discovery wave so we know what to update inside src/prism in lockstep with deletion. It is NOT a hard gate after user directive 2026-04-25 ('we can always update prism-learn if we need to'). External-workspace breakage is acceptable and gets a forward-fix in the consumer repo. Promoting W0 keeps the in-repo discovery explicit without slowing us down on prism-learn coordination."

  opinion_6_what_i_still_dont_know:
    item_1: >
      Whether scanner_reporting/report.py has any subtle dependency on
      runbook.py beyond the package-level re-export. A grep showed no
      direct imports, but report.py's Jinja env factory might compose
      with runbook templates. Worth a 5-minute confirm in W0.
    item_2: >
      Whether prism-learn renders runbooks via the prism API or imports
      runbook.py directly. The former is fine (we keep the package facade
      stable); the latter requires lockstep update.
    item_3: >
      Whether there's a future "annotation kinds renderer registry" worth
      designing now (kind=='runbook', kind=='changelog', kind=='warning'
      → renderer functions registered at plugin load time). I think we
      defer that until we have a second renderable kind. YAGNI for now.

