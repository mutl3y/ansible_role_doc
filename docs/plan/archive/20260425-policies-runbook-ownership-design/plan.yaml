#####################################################################
# 1. PROBLEM STATEMENT — be precise about what is actually broken
#####################################################################

problem_statement:
  surface_observation: >
    Four modules sit under the wrong package path:
      A. scanner_plugins/policies/constants.py        — Ansible YAML vocabulary
      B. scanner_plugins/policies/extract_defaults.py — Ansible default-policy facade
      C. scanner_plugins/policies/annotation_parsing.py — comment-driven-doc parser
      D. scanner_reporting/runbook.py                 — comment-driven-doc renderer for kind=='runbook'

  underlying_architectural_rot:
    rot_1_policies_directory_is_a_lie:
      claim: >
        scanner_plugins/policies/ implies platform-neutral default-policy seam.
        Reality: it hosts Ansible task vocabulary + a comment-doc feature parser,
        with a single genuinely-neutral file (default_scan_pipeline.py) acting
        as cover. The directory name has been hiding ownership debt for as
        long as it has existed.
      consequence: >
        Anyone landing in policies/ assumes they're looking at neutral defaults
        and cargo-cults that pattern when adding new platform support. Future
        Terraform/K8s plugin authors would see "oh, policies/ is where defaults
        live, I'll put my Terraform task vocabulary there too." The rot
        compounds.

    rot_2_runbook_is_misclassified:
      claim: >
        scanner_reporting/ is the home for generic scan reporting (SCANNER_REPORT.md
        composition). runbook.py masquerades as a sibling of report.py but is
        in fact rendering a SPECIFIC annotation kind (kind=='runbook') defined
        by the comment-driven-documentation feature.
      consequence: >
        scanner_reporting/ acquires a feature-specific tenant. Any future
        comment-doc annotation kind (e.g. kind=='changelog', kind=='runbook-rollback')
        would face the same misclassification pressure.

    rot_3_mixed_concerns_in_annotation_parsing:
      claim: >
        annotation_parsing.py is comment-doc feature logic but imports Ansible
        regexes (TASK_ENTRY_RE, COMMENTED_TASK_ENTRY_RE, YAML_LIKE_*_RE) to
        anchor annotations to "the line above the - name: task header."
        The comment-doc plugin therefore knows about Ansible task syntax.
      consequence: >
        Terraform/K8s comment-doc support is BLOCKED on this coupling. The
        comment-doc plugin needs to ask "where does the next item-this-annotation-
        is-attached-to begin?" and that answer is platform-specific.

#####################################################################
# 2. ULTRATHINK — DESIGN PRINCIPLES BEFORE FILE-MOVES
#####################################################################

design_principles:
  principle_1_ownership_axes:
    statement: >
      A module belongs to ONE owner along ONE axis. There are exactly two
      ownership axes in the plugin layer:
        (a) PLATFORM axis      — knowledge of a specific IaC tool's syntax/semantics
                                 (Ansible, Terraform, Kubernetes, AAP, …)
        (b) FEATURE axis       — knowledge of a cross-platform documentation/scanning
                                 feature (comment-driven docs, README render, runbook
                                 render, scanner report, variable lineage, …)
    application:
      ansible_yaml_vocabulary:           "(a) PLATFORM axis → ansible plugin"
      ansible_default_policy_facade:     "(a) PLATFORM axis → ansible plugin"
      annotation_parser_for_runbook_etc: "(b) FEATURE  axis → comment_doc plugin"
      runbook_renderer:                  "(b) FEATURE  axis → comment_doc plugin"
      readme_renderer:                   "(a) PLATFORM axis (README shape differs by platform) → ansible plugin (per g7)"
      yaml_line_shape_regexes:           "PURE NEUTRAL (yaml-syntax-only, no platform) → parsers/yaml plugin"
      DefaultScanPipelinePlugin:         "PURE NEUTRAL (registry default) → stays where it is"

    crisp_test: >
      For every symbol, if you can answer "this only matters when scanning
      Ansible" → PLATFORM axis. If you can answer "this matters whenever a
      user writes comment-driven docs, regardless of what they're writing
      docs FOR" → FEATURE axis. If neither → NEUTRAL (rare).

  principle_2_two_kinds_of_template_ownership:
    statement: >
      Templates live with whoever decides their SHAPE.
        - README.md.j2     → its shape is platform-specific (Ansible role README
                             looks nothing like a Terraform module README) →
                             lives under ansible/templates/ (per g7)
        - RUNBOOK.md.j2    → its shape is feature-specific (it iterates
                             annotations of kind=='runbook' regardless of which
                             platform produced them) →
                             lives under parsers/comment_doc/templates/
    consequence: >
      g7 and g7b together establish: "templates are owned by the plugin that
      determines their shape, not by a global templates/ pile."

  principle_3_no_compat_shims_period:
    statement: >
      User directives (2026-04-25):
        (a) no deprecation cycle — delete now
        (b) prism-learn is not a gate — we can update it later if anything breaks
      The fsrc-to-src promotion (2026-04-22) deleted entire compat lanes
      wholesale; the established pattern is rip-the-band-aid.
    application: >
      Direct relocation. No DeprecationWarning shims. No one-release
      window. Old paths cease to exist at the end of W4. prism-learn is
      checked best-effort in W0 (informational), not gating; if its build
      breaks after a release, we patch prism-learn in a follow-up.
    blast_radius_owned_by_us: >
      Only src/prism/ correctness blocks the wave. External-workspace
      breakage is acceptable and gets a forward-fix in the consumer repo.

  principle_4_protocol_first_for_mixed_concerns:
    statement: >
      The annotation-parsing → Ansible-regex coupling is a protocol gap.
      Defining TaskBoundaryDetector as a plugin protocol IS the work; the
      file-moves are mechanical. Doing the moves without the protocol just
      transplants the rot to a new location.
    consequence: >
      The protocol design is part of THIS slice, not a deferred follow-up.
      W5 in v1 of this plan is now W3 in v2.

  principle_5_directory_names_must_not_lie:
    statement: >
      scanner_plugins/policies/ as a name claims to host policies. After
      W2 it will host exactly ONE file (default_scan_pipeline.py) that is
      genuinely a default plugin implementation. Either:
        (a) rename to scanner_plugins/defaults/ (or fold the file into
            scanner_plugins/__init__.py)
        (b) keep policies/ name + add a __doc__ note explaining its
            scope is "platform-neutral default plugin implementations only"
    recommendation: "Option (a) — rename to scanner_plugins/defaults/. See PARTNER_OPINIONS below."

#####################################################################
# 3. CONCRETE OWNERSHIP MATRIX (post-relocation)
#####################################################################

