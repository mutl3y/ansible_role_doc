    current_path: "scanner_plugins/policies/constants.py"
    axis: REDUNDANT
    canonical_path: "scanner_plugins/parsers/comment_doc/marker_utils.py (already canonical since g6)"
    rationale: "These re-exports were a g6 dedupe artefact; they exist only because constants.py needed to satisfy old callers. Once constants.py is deleted, the re-exports vanish too."

  - source_symbol: "AnsibleDefaultTaskAnnotationPolicyPlugin, AnsibleDefaultTaskLineParsingPolicyPlugin, AnsibleDefaultTaskTraversalPolicyPlugin, AnsibleDefaultVariableExtractorPolicyPlugin"
    current_path: "scanner_plugins/policies/extract_defaults.py (re-exports from ansible/default_policies.py)"
    axis: PLATFORM
