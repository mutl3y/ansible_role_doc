  current_test_state:
    parity_test: src/prism/tests/test_plugin_kernel_extension_parity.py
    parity_test_line: 613
    behavior: >
      The bad-imports filter is:
        "prism.scanner_readme" in line AND "prism.scanner_readme.rendering_seams" not in line
