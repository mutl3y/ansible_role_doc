      the violation rather than enforcing it. This whitelist must be removed as part of the fix.
    reporting_test: src/prism/tests/test_scanner_reporting.py
    reporting_test_line: 204
    behavior: "Same whitelist carve-out: only flags scanner_readme.* that is NOT rendering_seams."

  proposed_fix:
    approach: "Extract build_render_jinja_environment into scanner_plugins layer (plugin-owned),
      remove the cross-layer import, tighten the parity tests."
    new_file: src/prism/scanner_plugins/parsers/comment_doc/jinja_utils.py
    new_file_contents: |
      """Jinja environment builder for comment-driven doc rendering."""

      from __future__ import annotations

      from pathlib import Path
      from typing import Any, Mapping

      import jinja2


      def build_render_jinja_environment(
          *,
          template_dir: Path,
          metadata: Mapping[str, Any] | None = None,
      ) -> jinja2.Environment:
          metadata = metadata or {}
          custom_factory = metadata.get("jinja_environment_factory")
          if callable(custom_factory):
              custom_env = custom_factory(template_dir, metadata=metadata)
              if isinstance(custom_env, jinja2.Environment):
                  return custom_env
          undefined_policy = str(metadata.get("jinja_undefined_policy") or "").strip()
          undefined_cls = (
              jinja2.StrictUndefined
              if undefined_policy.lower() == "strict"
              else jinja2.Undefined
          )
          return jinja2.Environment(
              loader=jinja2.FileSystemLoader(str(template_dir)),
              trim_blocks=True,
              lstrip_blocks=True,
              undefined=undefined_cls,
          )
    files_to_update:
      - file: src/prism/scanner_plugins/parsers/comment_doc/runbook_renderer.py
        change: "Line 16: replace
          'from prism.scanner_readme.rendering_seams import build_render_jinja_environment'
          with
          'from prism.scanner_plugins.parsers.comment_doc.jinja_utils import build_render_jinja_environment'"
      - file: src/prism/tests/test_plugin_kernel_extension_parity.py
        change: "Remove the rendering_seams whitelist carve-out from the bad-imports filter.
          New condition: bad = [line for line in imports if 'prism.scanner_readme' in line or
          'prism.scanner_reporting' in line]. The test then catches this violation if re-introduced."
      - file: src/prism/tests/test_scanner_reporting.py
        change: "Same — remove the rendering_seams whitelist from forbidden-imports filter (line 204)."

    files_unchanged:
      - "src/prism/scanner_readme/rendering_seams.py — keep as-is; render.py still imports from it.
        rendering_seams.py becomes scanner_readme-internal only."
      - "src/prism/scanner_readme/render.py — no change."
      - "src/prism/tests/test_t4_05_jinja_sandbox_audit.py — imports rendering_seams directly
        as a test; this is a test-layer import with no layer constraint."

    risk: low
    concern: "build_render_jinja_environment is duplicated across two files until rendering_seams.py
      is eventually retired or delegated. This is acceptable: the duplication is 25 lines of
      pure Jinja2 setup, and scanner_readme/rendering_seams.py has no external consumers beyond
      render.py (which is scanner_readme-internal). Future cleanup: rendering_seams.py can
      delegate to jinja_utils.py, but that is out of scope for g13."

# ==============================================================================
# OPEN QUESTIONS
# ==============================================================================

open_questions:
  - question: "For TaskAnnotation TypedDict (Target B) — use str for 'kind' or Literal?"
    context: "Using Literal[...] couples the TypedDict to the specific label set defined in
      annotation_parsing._ANNOTATION_LABELS. If labels are ever extended (new platform adds
      labels), the Literal must be updated. str is more permissive but defeats narrowing.
      The Literal values are stable Ansible-plugin vocabulary, not platform-generic."
    type: decision_blocker
    affects: [contracts_request.py, annotation_parsing.py]

  - question: "For Target C — should rendering_seams.py eventually delegate to jinja_utils.py
    or remain a parallel copy?"
    context: "After the fix, two copies exist. render.py (scanner_readme-internal) calls
      rendering_seams.build_render_jinja_environment. If rendering_seams.py is later made to
      import from jinja_utils.py, the layer direction would invert (scanner_readme importing
      from scanner_plugins). Alternatively, jinja_utils.py could become a lower-level shared
      module outside both layers."
    type: nice_to_know
    affects: [scanner_readme/rendering_seams.py]

  - question: "For Target A — should task_keywords.py export an __all__ that mirrors the
    two constants exactly, and should it be added to scanner_plugins/ansible/__init__.py?"
    context: "task_vocabulary.py has __all__ that includes TASK_BLOCK_KEYS and TASK_META_KEYS.
      task_keywords.py needs its own __all__. No existing __init__.py for the ansible package
      needs to change since no consumer imports directly from the package root."
    type: nice_to_know
    affects: [task_keywords.py]

gaps:
  - area: "TaskAnnotation TypedDict — annotation_parsing.py import direction"
    description: "annotation_parsing.py currently has NO imports from prism.scanner_data.
      Adding an import of TaskAnnotation from contracts_request.py introduces a new dep edge:
      scanner_plugins.parsers.comment_doc.annotation_parsing → scanner_data.contracts_request.
      This is a cross-layer import (plugins importing data contracts). Need to verify this
      is acceptable per the project's layer policy."
    impact: research_blocker
    affects: [annotation_parsing.py, contracts_request.py]
    mitigation: "Alternative: define TaskAnnotation in annotation_parsing.py itself and re-export
      from contracts_request.py (import it). This keeps the TypedDict co-located with the
      construction code. Contracts_request.py imports from annotation_parsing for the TypedDict
      only. This inverts the direction: scanner_data.contracts_request imports from
      scanner_plugins.parsers — which also crosses a layer boundary.
      Cleanest: define TaskAnnotation in a neutral scanner_data sub-module with no plugin deps."
