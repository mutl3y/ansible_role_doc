target_b:
  finding_id: FIND-G8-03
  title: "PreparedTaskAnnotationPolicy + TaskAnnotation TypedDict narrowing"

  protocol_current_state:
    file: src/prism/scanner_data/contracts_request.py
    lines: "133-150"
    full_protocol: |
      class PreparedTaskAnnotationPolicy(Protocol):
          """Minimum task-annotation capability surface required after ingress."""

          def split_task_annotation_label(self, text: str) -> tuple[str, str]: ...
          def normalize_marker_prefix(self, marker_prefix: str | None) -> str: ...
          def get_marker_line_re(self, marker_prefix: str = ...) -> Any: ...
          def extract_task_annotations_for_file(
              self,
              lines: list[str],
              marker_prefix: str = ...,
              include_task_index: bool = ...,
          ) -> tuple[list[dict[str, object]], dict[str, list[dict[str, object]]]]: ...
          def task_anchor(self, file_path: str, task_name: str, index: int) -> str: ...
    weak_shape_location: "extract_task_annotations_for_file return type line 144"
    weak_type: "tuple[list[dict[str, object]], dict[str, list[dict[str, object]]]]"

  annotation_dict_shape:
    source_file: src/prism/scanner_plugins/parsers/comment_doc/annotation_parsing.py
    construction_line: "item: dict[str, object] = {'kind': kind, 'text': body}"
    required_keys:
      - key: kind
        type: str
        values: "one of: runbook, warning, deprecated, note, additional"
        always_present: true
      - key: text
        type: str
        note: "body from split_task_annotation_label; non-empty (items with empty body are
          filtered out before dict construction)"
        always_present: true
    optional_keys:
      - key: disabled
        type: bool
        set_when: "any continuation line matches TASK_ENTRY_RE (task is disabled mid-annotation)"
        value: "always True when present"
      - key: format_warning
        type: str
        set_when: "annotation_payload_looks_yaml(body) is True"
        value: '"yaml-like-payload-use-key-equals-value"'
      - key: task_index
        type: int
        set_when: "include_task_index=True and implicit annotation has matching task line"
        note: "stripped out before attaching to task entries (task_catalog_assembly.py:104)"

  proposed_typeddict: |
    class TaskAnnotation(TypedDict, total=False):
        kind: Required[str]
        text: Required[str]
        disabled: bool
        format_warning: str
        task_index: int

  alternative_typeddict_stronger: |
    # Using Literal for kind values — stronger but requires import of Literal
    from typing import Literal
    TaskAnnotationKind = Literal["runbook", "warning", "deprecated", "note", "additional"]

    class TaskAnnotation(TypedDict, total=False):
        kind: Required[TaskAnnotationKind]
        text: Required[str]
        disabled: bool
        format_warning: Literal["yaml-like-payload-use-key-equals-value"]
        task_index: int

  atomic_change_boundary:
    total_files: 5
    files:
      - file: src/prism/scanner_data/contracts_request.py
        change: "Add TaskAnnotation TypedDict definition (before PreparedTaskAnnotationPolicy).
          Update PreparedTaskAnnotationPolicy.extract_task_annotations_for_file return type from
          tuple[list[dict[str, object]], dict[str, list[dict[str, object]]]]
          to tuple[list[TaskAnnotation], dict[str, list[TaskAnnotation]]]."
        note: "Already imports Required, TypedDict — no new imports needed for basic version."

      - file: src/prism/scanner_plugins/parsers/comment_doc/annotation_parsing.py
        change: "Import TaskAnnotation from contracts_request. Update
          extract_task_annotations_for_file return type annotation (line 74-76) and
