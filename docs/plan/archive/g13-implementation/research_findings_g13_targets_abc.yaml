        risk: "Must add import from prism.scanner_data.contracts_request — this is annotation_parsing.py
          which currently has no scanner_data imports. Acceptable: annotation_parsing already
          depends on marker_utils and line_shape; contracts_request is a data contract layer."

      - file: src/prism/scanner_extract/task_annotation_parsing.py
        change: "Update _extract_task_annotations_for_file and extract_task_annotations_for_file
          return type annotations (lines 38-50, 70-78) from dict[str, object] to TaskAnnotation."

      - file: src/prism/scanner_core/task_extract_adapters.py
        change: "Update extract_task_annotations_for_file return type (line 59) from
          tuple[list[dict[str, object]], dict[str, list[dict[str, object]]]]
