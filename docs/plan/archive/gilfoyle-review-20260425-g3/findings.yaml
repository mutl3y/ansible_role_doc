        line: 204     # factory_blocker_fact_builder
        is_lazy: true
      - file: src/prism/scanner_core/standalone_di.py
        line: 20      # bundle_resolver
        is_lazy: true
    decision: DO_NOT_RE_FLAG
    rationale: >
      Both imports are intentional DI seams: the inner function body is the
      late-binding hook the container exists to provide. Hoisting them to
      module scope would re-introduce LESSON-08 load-time cycles and defeat
      the purpose of the DI seam. The proper coupling fix is structural
      (registry-routed bundle_resolver / blocker_fact_builder), which is
      tracked separately as FIND-G3-04.
    closure: |
      No code change. Re-flag only with a registry-routed alternative on the table.

