  # ─── DEFERRED PLUGIN LOAD — LOCKLESS FIRST PEEK ──────────────────────────
  - category: concurrency
    file: prism/scanner_plugins/registry.py
    line: 258
    severity_hint: medium
    evidence_snippet: "result = self._variable_discovery_plugins.get(name)  # no lock"
    proposed_fix_class: add_lock
    note: >
      get_variable_discovery_plugin (258) and get_feature_detection_plugin (281)
      both perform an initial lockless dict.get() as a fast-path hit check before
      entering the double-checked lock block. In CPython, dict.get on a value type
      is GIL-atomic, but the pattern is architecturally inconsistent with how all
      register_* paths are guarded, and it is not safe on non-CPython interpreters.

  # ─── TELEMETRY / PROGRESS LISTENER PHASE_STARTS DICT ────────────────────
  - category: concurrency
    file: prism/scanner_core/telemetry.py
    line: 66
    severity_hint: high
    evidence_snippet: "self._phase_starts[event.phase_name] = time.monotonic()"
    proposed_fix_class: add_lock
    note: >
      TelemetryCollector._phase_starts is a plain dict mutated in __call__.
      EventBus.emit() takes a snapshot of listeners under the lock, then calls
      each listener WITHOUT holding the lock. If the same TelemetryCollector
      instance is in two concurrent EventBus listeners (e.g., registered as a
      default listener before multiple parallel DIContainer constructions), two
      threads call __call__ simultaneously and race on _phase_starts assignments
      and .pop() at line 70. The dict could be resized mid-read.

  - category: concurrency
