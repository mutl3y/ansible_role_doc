  # ─── FEATURE FLAG DOUBLE OS.ENVIRON READ ─────────────────────────────────
  - category: concurrency
    file: prism/scanner_plugins/ansible/feature_flags.py
    line: 15
    severity_hint: medium
    evidence_snippet: "kernel_enabled = os.environ.get(KERNEL_ENABLED_ENV_VAR, \"\").lower()"
    proposed_fix_class: snapshot_env
    note: >
      is_ansible_plugin_enabled() makes two separate os.environ.get() calls (lines
      15 and 16). A concurrent os.environ mutation between the two reads can produce
      a split observation: kernel_enabled=True but ansible_enabled reflects a post-
      mutation value (or vice versa), creating an inconsistent routing decision.
      Fix: snapshot both keys atomically via env = {k: os.environ.get(k, '') for k
      in (KERNEL_ENABLED_ENV_VAR, ANSIBLE_PLUGIN_ENABLED_ENV_VAR)} at function entry.

  - category: concurrency
    file: prism/scanner_kernel/repo_context.py
    line: 61
    severity_hint: low
    evidence_snippet: "return os.environ.get(KERNEL_ENABLED_ENV_VAR, \"\").lower() in _TRUTHY_VALUES"
    proposed_fix_class: snapshot_env
    note: >
      is_kernel_enabled() reads os.environ live on every call. This is a routing
