findings:

  # ─── REGISTRY READER METHODS WITHOUT LOCK ───────────────────────────────
  # All register_* methods correctly acquire self._lock. The matching
  # get_* / list_* methods for most slots do NOT. A concurrent bootstrap
  # extension or test injection writing while a scan reads produces a data
  # race on the underlying CPython dict.

  - category: concurrency
    file: prism/scanner_plugins/registry.py
    line: 302
    severity_hint: high
    evidence_snippet: "def get_scan_pipeline_plugin(self, name: str): return self._scan_pipeline_plugins.get(name)"
    proposed_fix_class: add_lock
    note: >
      Lockless dict read while register_scan_pipeline_plugin writes under self._lock.
      Representative of the same pattern on get_output_orchestration_plugin (296),
      get_comment_driven_doc_plugin (305), get_extract_policy_plugin (311),
      get_yaml_parsing_policy_plugin (314), get_jinja_analysis_policy_plugin (319),
      get_readme_renderer_plugin (324) — all 7 have the same lockless read gap.

  - category: concurrency
