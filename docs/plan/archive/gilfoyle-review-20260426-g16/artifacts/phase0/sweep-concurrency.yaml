  # ─── NON-ATOMIC FILE WRITE IN render_readme ──────────────────────────────
  - category: concurrency
    file: prism/scanner_readme/render.py
    line: 351
    severity_hint: medium
    evidence_snippet: "Path(output).write_text(rendered, encoding=\"utf-8\")"
    proposed_fix_class: atomic_write
    note: >
      render_readme() writes directly to the output path via Path.write_text (lines
      351 and 379). If two concurrent scan calls target the same output file (e.g.,
      parallel collection scans writing to a shared README), the file is partially
      overwritten mid-write. Fix: write to a .tmp sibling then os.replace() into
      the final path. Same issue at line 379 (template branch).

