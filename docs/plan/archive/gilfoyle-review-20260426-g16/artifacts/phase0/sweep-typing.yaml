- category: typing
  id: G16-T-25
  file: prism/scanner_extract/task_catalog_assembly.py
  line: 109
  severity_hint: low
  evidence_snippet: "cast(\n    TaskAnnotation,\n    {key: value ... if key != 'task_index'}"
  proposed_fix_class: tighten_cast
  note: >
    cast(TaskAnnotation, {...}) applied to a dict-comprehension. The comprehension
    filters task_index from items in implicit_by_task_index, but TaskAnnotation is
    a TypedDict with Required fields kind and text. The cast is structural — if
    the source dict is missing kind or text this is a silent type lie.
    Constructing a TaskAnnotation literal or validating Required fields before
    the cast would make the contract explicit.
