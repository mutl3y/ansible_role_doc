  # ── SILENT FALLBACKS — SCAN HOT PATH ────────────────────────────────────

  - category: silent_fallback
    file: prism/scanner_config/patterns.py
    line: 49
    severity_hint: high
    evidence_snippet: "except (OSError, UnicodeDecodeError, yaml.YAMLError, V..."
    proposed_fix_class: add_log
    note: >
      _load_yaml() returns {} with no log on any IO or parse error. A bad or
      missing pattern_policy.yml silently yields an empty policy dict, and the
      caller (_load_policy_from_file) cannot distinguish "file not found" from
      "file was corrupt". Add logger.debug/warning before return {}.

