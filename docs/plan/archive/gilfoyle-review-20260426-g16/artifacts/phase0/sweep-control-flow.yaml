      render_final_output() if/elif chain over output_format has no final
      raise for unrecognised values. An unknown format string silently falls
      through to return html_doc (the last assigned value), producing HTML
      output with no error. Add: else: raise ValueError(f"unknown format
      {output_format!r}") after the pdf branch.

