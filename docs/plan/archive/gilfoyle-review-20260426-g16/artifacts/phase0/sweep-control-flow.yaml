    proposed_fix_class: add_log
    note: >
      load_yaml_file() canonical fallback path returns None on any IO/parse
      error with no log. Silent None from a task/var/meta file propagates up
      to callers that branch on truthiness; a corrupt YAML file is
      indistinguishable from an absent one.

