  - id: G62-M01
    severity: medium
    category: error_channel
    title: "Scan-cache fallback paths mask unreadable inputs and trust cached payload shape too early"
    files:
      - src/prism/scanner_core/scan_cache.py
      - src/prism/tests/test_t3_03_scan_cache.py
    summary: >-
      The actionable cache-hash defect is now fixed: unreadable single-file
      paths no longer collapse to a shared sentinel-only digest. The second
      half of the scout bundle did not hold up on local read, because cached
      hits still pass through _normalize_non_collection_result_shape(), which
      validates payload structure before returning it.
    closed_evidence:
      - "Wave 5 focused validation: pytest -q src/prism/tests/test_t3_03_scan_cache.py -k 'unreadable or content_hash' -> 3 passed, 14 deselected"
      - "Wave 5 importer validation: .venv/bin/python -m mypy src/prism/scanner_core/scan_cache.py src/prism/tests/test_t3_03_scan_cache.py -> success"
      - "Builder artifact: docs/plan/mutl3y-review-20260503-g62/mutl3y-artifacts/phase5/Builder-ControlFlow-summary.md"
      - "Adjacent code read: api_layer/non_collection.py still normalizes cached hits through validate_run_scan_output_payload before returning them"
    closure_note: "The scout finding over-grouped a real single-file unreadable-hash collision with a cached-payload concern that is already guarded by the existing non_collection result normalizer."

  - id: G62-M02
    severity: medium
    category: facade_leakage
    title: "Public API and plugin facade still re-export private helpers and internal registry accessors"
    files:
      - src/prism/api.py
      - src/prism/tests/test_api_cli_entrypoints.py
    summary: >-
      The actionable public-surface leak is now retired: api.py no longer
      re-exports the private _NormalizedNonCollectionResult alias. The
      remaining plugin_facade.ensure_prepared_policy_bundle reference is a
      single internal api_layer seam used by non_collection rather than a
      separate public contract leak.
    closed_evidence:
      - "Wave 6 focused validation: pytest -q src/prism/tests/test_api_cli_entrypoints.py -k 'delegates_to_non_collection_api_layer or normalizes_payload_shape_from_non_collection_seam' -> 4 passed, 29 deselected"
      - "Wave 6 importer validation: .venv/bin/python -m mypy src/prism/api.py src/prism/tests/test_api_cli_entrypoints.py -> success"
      - "Builder artifact: docs/plan/mutl3y-review-20260503-g62/mutl3y-artifacts/phase5/Builder-Ownership-wave-6-summary.md"
      - "Usage check: ensure_prepared_policy_bundle has only one remaining internal api_layer consumer in api_layer/non_collection.py"
    closure_note: "The scout finding over-grouped one real public alias leak with one internal api_layer seam. Retiring the alias removed the public contract leakage without forcing an unnecessary bundle_resolver ownership change in the same cycle."

  - id: G62-H03
    severity: high
    category: registry_authority
    title: "Public API downgrades reserved unsupported platform routing failures"
    files:
      - src/prism/api.py
      - src/prism/api_layer/plugin_facade.py
      - src/prism/scanner_kernel/orchestrator.py
      - src/prism/tests/test_api_cli_entrypoints.py
      - src/prism/tests/test_platform_routing_fail_closed.py
    summary: >-
      Gilfoyle Code Review God Mode found that prism.api.run_scan passes the
      isolated scan-pipeline registry wrapper into non-collection runtime
      orchestration. That wrapper does not expose
      is_reserved_unsupported_platform(), so scanner_kernel routing skips the
      reserved-platform branch and reports reserved platforms such as terraform
      or kubernetes as platform_not_registered instead of platform_not_supported
      on the public API path.
    closed_evidence:
      - "Wave 7 focused API seam validation: pytest -q src/prism/tests/test_api_cli_entrypoints.py -k 'reserved or scan_pipeline_registry_seam' -> 2 passed, 32 deselected"
      - "Wave 7 lower-level routing validation: pytest -q src/prism/tests/test_platform_routing_fail_closed.py -> 12 passed"
      - "Wave 7 importer validation: .venv/bin/python -m mypy src/prism/api_layer/plugin_facade.py src/prism/tests/test_api_cli_entrypoints.py src/prism/tests/test_platform_routing_fail_closed.py -> success"
      - "Wave 7 lint/format validation: ruff check and black --check on touched files -> success"
      - "Builder artifact: docs/plan/mutl3y-review-20260503-g62/mutl3y-artifacts/phase5/Builder-Ownership-wave-7-summary.md"
    closure_note: "The isolated scan-pipeline registry now forwards reserved unsupported platform classification, preserving platform_not_supported on the public API path without weakening scan_context isolation."

