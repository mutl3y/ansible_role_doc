      - src/prism/tests/test_di_registry_resolution.py
      - src/prism/tests/test_scanner_guardrails.py
    summary: >-
      The actionable registry-authority leak in the public package surface is
      now retired: prism.scanner_plugins no longer exposes
      DEFAULT_PLUGIN_REGISTRY, owned tests moved to the explicit bootstrap
      getter, and the remaining bootstrap and DI seams are guarded as the
      canonical authority path rather than a duplicate public singleton export.
    closed_evidence:
      - "Wave 1 focused validation: pytest -q src/prism/tests/test_plugin_kernel_extension_parity.py -k 'default_plugin_registry or bootstrap' src/prism/tests/test_di_registry_resolution.py -k 'through_registry or default_platform_key' -> 5 passed, 56 deselected"
