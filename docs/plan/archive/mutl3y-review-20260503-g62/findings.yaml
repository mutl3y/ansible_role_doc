      The high-severity fail-open boundary is now closed: scanner_context no
      longer accepts arbitrary dict/object placeholders as prepared policy
      bundles, and non_collection cache-key logic no longer fingerprints
      malformed dict placeholders as if they were canonical prepared bundles.
    closed_evidence:
      - "Wave 3 focused validation: pytest -q src/prism/tests/test_scanner_context.py -k 'requires_prepared_policy_bundle_without_mutating_ingress_options or prepared_policy_bundle_rejects_invalid_bundle' -> 3 passed, 16 deselected"
