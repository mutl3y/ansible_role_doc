summary: >-
  The unconstrained Gilfoyle pass found two actionable Highs and one Medium.
  The queue is waveable: cache identity is mostly isolated to the API/cache
  seam, while default-listener leakage belongs to one serialized execution and
  observability slice. The Medium facade leakage item is retained as backlog
  behind the two Highs.
authoritative_independent_verdict: unconstrained_only
promoted_findings:
  - id: GI-H1
    severity: high
    category: cache-correctness
    rationale: >-
      Cache identity currently ignores runtime wiring overrides that can change
      the returned payload, so a shared cache can replay semantically wrong
      results across otherwise identical scan-option calls.
    carry_forward_id: G64-H02
    fix_group_key: non_collection.cache_wiring_identity
    suggested_narrow_gate: pytest -q src/prism/tests/test_g03_scan_cache_integration.py src/prism/tests/test_t3_03_scan_cache.py -k 'cache'
  - id: GI-H2
    severity: high
    category: concurrency
    rationale: >-
      Runtime assembly unconditionally inherits process-global default
      listeners, so overlapping request-local telemetry and progress observers
      leak across scan boundaries.
    carry_forward_id: G64-H03
    fix_group_key: execution_request.default_listener_isolation
    suggested_narrow_gate: pytest -q src/prism/tests/test_execution_request_builder.py src/prism/tests/test_t3_05_scan_telemetry.py src/prism/tests/test_t4_03_cli_progress.py -k 'listener or telemetry or progress or inherit'
medium_backlog:
  - id: GI-M1
    rationale: >-
      The facade leakage is real but does not outrank the two High runtime
      correctness defects for the next remediation wave.
next_action: Carry GI-H1 and GI-H2 into g64 and open g64 wave 2.
