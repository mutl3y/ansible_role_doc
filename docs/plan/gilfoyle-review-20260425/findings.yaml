plan_id: gilfoyle-review-20260425
target: src/prism/
reviewer: Gilfoyle
date: 2026-04-25
cycle: g1
focus_axis: typing
grade: C
summary: >
  Architectural invariants hold (scanner_core: zero platform-specific imports; policies/constants:
  zero ansible.builtin tokens). The discipline that kept the refactor honest hasn't carried into
  day-to-day code. Two High issues stand out: a six-name namespace collision between
  scanner_plugins/policies/constants.py and scanner_plugins/ansible/task_traversal_bare.py
  (same names, different values), and a private cross-module import in scanner_core/scanner_context.py.
  Then ten broad `except Exception` blocks in the kernel runtime, plugin discovery, and core context
  paths — every one of which converts a hard failure into a soft return value. Typing slipped
  hardest: 13+ multi-parameter anonymous Callable aliases, three bare 4-element tuple returns,
  and three module-level mutable sets pretending to be constants.

findings:

