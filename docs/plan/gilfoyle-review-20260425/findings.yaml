    decision: tighten-and-log
    decision_rationale: "Catch the specific exceptions actually raised; raise a typed PluginDiscoveryError otherwise."
    closed_evidence: |
      g1 W3 audit: all 4 sites are intentional defensive boundaries, not lazy catches.
      - scanner_plugins/discovery.py:67 — third-party entry-point loader failure isolation;
        rationale comment added.
      - scanner_plugins/discovery.py:91 — third-party entry-point loader failure isolation;
        rationale comment added.
      - scanner_plugins/defaults.py:137 — third-party plugin __init__ failure isolation;
        rationale comment added.
      - scanner_plugins/ansible/variable_discovery.py:191 — YAML loader failure routed to
