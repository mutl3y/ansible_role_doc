    description: >
      `scanner_core/scanner_context.py:10` imports the underscore-prefixed
      `_merge_policy_warning_entries` from `scanner_core/metadata_merger.py`. Private symbols are
      not for cross-module use. Either promote it to public (`merge_policy_warning_entries`) or
      keep it inside `metadata_merger.py` and route the call through a public façade.
    affected_files:
      - src/prism/scanner_core/scanner_context.py
      - src/prism/scanner_core/metadata_merger.py
    needs_investigation: false
    decision: promote-public
    decision_rationale: "Clean rename + update one importer."
    closed_evidence: |
