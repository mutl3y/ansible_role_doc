  - id: FIND-05
    category: typing
    severity: medium
    status: closed
    title: Module-level mutable `set` constants (and dict constants) where `frozenset` / `MappingProxyType` belongs
    description: >
      `scanner_readme/render.py` defines `EXTRA_SECTION_IDS`, `ALL_SECTION_IDS`, and
      `SCANNER_STATS_SECTION_IDS` as bare `set[str]`. They are read from many call sites and
      mutated by none — so `frozenset` would communicate intent and prevent test-time mutation.
      Likewise `PLUGIN_CONTRACT_VERSION = {...}` at module level in
      `scanner_plugins/{ansible,kubernetes,terraform}/__init__.py` and
      `scanner_plugins/ansible/kernel.py` is a mutable dict that should be a `MappingProxyType`
      or a tiny frozen dataclass.
    affected_files:
      - src/prism/scanner_readme/render.py
      - src/prism/scanner_plugins/ansible/__init__.py
      - src/prism/scanner_plugins/kubernetes/__init__.py
      - src/prism/scanner_plugins/terraform/__init__.py
      - src/prism/scanner_plugins/ansible/kernel.py
    needs_investigation: false
    decision: freeze-constants
    decision_rationale: "Catches LESSON-01 anti-pattern (mutable module-level frozen-intent constant)."
    closed_evidence: |
      g1 W1: `EXTRA_SECTION_IDS`, `ALL_SECTION_IDS`, `SCANNER_STATS_SECTION_IDS` in
      scanner_readme/render.py wrapped in `frozenset(...)` with `frozenset[str]` annotation.
      `PLUGIN_CONTRACT_VERSION` in scanner_plugins/{ansible/kernel.py, kubernetes/__init__.py,
      terraform/__init__.py} converted to `types.MappingProxyType({"major": 1, "minor": 0})` with
      `types.MappingProxyType[str, int]` annotation. All consumers use defensive `dict(...)` copy
      so safe. ansible/__init__.py untouched (no PLUGIN_CONTRACT_VERSION re-export there).
      Gate: 754 passed, ruff clean, black clean (2026-04-25).

  - id: FIND-06
    category: silent_fallback
