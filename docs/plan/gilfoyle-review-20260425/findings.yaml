      Gate: 754 passed, ruff clean, black clean (2026-04-25).

  - id: FIND-02
    category: duplication
    severity: high
    status: needs_replan
    title: Six constants defined in two modules under the same names with different values
    description: >
      `scanner_plugins/policies/constants.py` and `scanner_plugins/ansible/task_traversal_bare.py`
      both define `TASK_INCLUDE_KEYS`, `ROLE_INCLUDE_KEYS`, `INCLUDE_VARS_KEYS`, `SET_FACT_KEYS`,
      `TASK_BLOCK_KEYS`, `TASK_META_KEYS`. The `policies/` versions are generic (no FQCN); the
      `ansible/` versions add `ansible.builtin.*` aliases. Importing the wrong one silently
      changes behaviour. Either rename the Ansible variants (`ANSIBLE_TASK_INCLUDE_KEYS`, etc.)
      or have `policies/constants.py` define the abstract interface and have plugins extend rather
      than shadow.
    affected_files:
      - src/prism/scanner_plugins/policies/constants.py
      - src/prism/scanner_plugins/ansible/task_traversal_bare.py
    needs_investigation: true
    investigation_question: >
      Are both modules currently imported anywhere in scanner_core / scanner_extract such that the
      shadowing actually produces divergent behaviour? Or is one a legacy artifact from the
      platform-agnostic-remediation-20260419 plan that should be retired?
    investigation_outcome: |
      g1 W4 audit (2026-04-25): the two definitions are NOT duplicates — they encode an
      intentional generic/specialization split. `policies/constants.py` defines the generic
      baseline; `ansible/task_traversal_bare.py` defines the Ansible superset (generic + FQCN).
      `extract_defaults.py` imports the generic baseline because it hosts
      `AnsibleDefaultTaskLineParsingPolicyPlugin` which is contractually domain-neutral, enforced
      by `tests/test_extract_defaults_domain_neutrality.py::test_no_ansible_builtin_in_module_constants`
      (asserts `ansible_hits == set()`) and `test_ansible_plugin_superset_of_defaults` (asserts
      `default.TASK_INCLUDE_KEYS <= ansible.TASK_INCLUDE_KEYS`). The real architectural smell is
      not duplication but a class named `AnsibleDefault*` living in a `policies/` namespace and
      asserted to be Ansible-neutral. That is a g2 (focus_axis=architecture) discussion: should
      the generic/Ansible split move into `ansible/` (one platform owns both shapes), or stay as
      generic-baseline-in-`policies/` with the domain-neutrality test as the contract?
    deferred_to: gilfoyle-g2
    deferred_rationale: >
      Mechanical repointing of imports breaks the domain-neutrality contract. Resolution requires
      a focus_axis=architecture decision, not a typing-cycle edit.

  - id: FIND-03
    category: typing
    severity: high
    status: deferred
    title: 13+ multi-parameter anonymous `Callable[..., R]` aliases (should be `Protocol`)
    description: >
      Repeated pattern of `Callable[[T1, T2, T3, T4, ...], R]` parameters with 4+ positional
      slots and no parameter names. Worst offender: `scanner_core/execution_request_builder.py`
      lines 196-204 — a single function takes nine separately-typed Callable parameters with
      zero parameter names. Callers indexing into the positional contract have no way to know
      what each slot represents. Promote each Callable contract to a `typing.Protocol`.
    affected_files:
      - src/prism/scanner_core/execution_request_builder.py
      - src/prism/scanner_core/scan_facade_helpers.py
      - src/prism/scanner_io/output_orchestrator.py
      - src/prism/scanner_io/emit_output.py
      - src/prism/scanner_io/loader.py
      - src/prism/scanner_extract/dataload.py
      - src/prism/scanner_extract/filter_scanner.py
      - src/prism/scanner_kernel/orchestrator.py
      - src/prism/scanner_kernel/kernel_plugin_runner.py
      - src/prism/repo_services.py
    needs_investigation: false
    decision: extract-protocols
    decision_rationale: "Pure typing improvement, no runtime behaviour change."
    deferred_to: gilfoyle-g2
    deferred_rationale: >
      Promoting 13+ Callable aliases to Protocols touches the same orchestrator/builder surface
      that g2 (architecture) and g3 (coupling) will rewire. Sequencing it after the architecture
      decisions reduces churn.

