    severity: medium
    category: protocol_concrete_name_collision
    file: src/prism/scanner_plugins/parsers/yaml/parsing_policy.py:13
    statement: "Concrete YAMLParsingPolicyPlugin shares its name with the Protocol scanner_plugins.interfaces.YAMLParsingPolicyPlugin. Registry imports the concrete and types its slot dict against it, so 3rd-party plugin authors cannot register an alternative YAML-parsing policy without subclassing the concrete default."
    fix: "Rename concrete YAMLParsingPolicyPlugin -> DefaultYAMLParsingPolicyPlugin (matches DefaultScanPipelinePlugin convention). Switch registry.py to import the Protocol from scanner_plugins.interfaces. Update parsers/yaml/__init__.py, scanner_plugins/__init__.py registration tuple, scanner_plugins/ansible/__init__.py + defaults.py instantiation sites, and 2 test files that exercise the static methods."
    status: closed

