status: closed
closed_date: 2026-04-25
closed_evidence: |
  Both findings closed in commit 0e8be4f. Renamed concrete
  YAMLParsingPolicyPlugin -> DefaultYAMLParsingPolicyPlugin and
  JinjaAnalysisPolicyPlugin -> DefaultJinjaAnalysisPolicyPlugin. Switched
  registry.py to import the Protocols from scanner_plugins.interfaces. Updated
  10 files (parsers/{yaml,jinja}, scanner_plugins/__init__.py, ansible/__init__.py,
  defaults.py, registry.py, 2 test files). Gate: 751 passed / 7 skipped, ruff PASS,
  black PASS, mypy delta=0.

context: >
  Two plugin slots have a Protocol and a concrete default impl sharing the
  exact same class name:
    - YAMLParsingPolicyPlugin  : Protocol in scanner_plugins/interfaces.py:110,
                                  concrete in parsers/yaml/parsing_policy.py:13
    - JinjaAnalysisPolicyPlugin: Protocol in scanner_plugins/interfaces.py:122,
                                  concrete in parsers/jinja/analysis_policy.py:19
  Registry imports the **concrete** class and uses it for type annotations
  (`type[YAMLParsingPolicyPlugin]` etc.), so 3rd-party plugin authors must
  subclass the concrete default to register their own implementation. This
  defeats the Protocol contract and the user's plug-and-play vision.

  The DefaultScanPipelinePlugin precedent (concrete) + ScanPipelinePlugin
  (Protocol) shows the correct naming: prefix concrete defaults with
  "Default" so the Protocol owns the slot name.

