    fix: "Rename concrete JinjaAnalysisPolicyPlugin -> DefaultJinjaAnalysisPolicyPlugin. Switch registry.py to import the Protocol from scanner_plugins.interfaces. Update parsers/jinja/__init__.py, scanner_plugins/__init__.py registration tuple, scanner_plugins/ansible/__init__.py + defaults.py instantiation sites."
    status: closed

