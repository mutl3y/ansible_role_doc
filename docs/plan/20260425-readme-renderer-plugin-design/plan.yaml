artefact_1_protocol_design:
  file: "src/prism/scanner_plugins/interfaces.py (proposed addition)"
  protocol_name: "ReadmeRendererPlugin"
  shape_template_source: "Mirror YAMLParsingPolicyPlugin / FeatureDetectionPlugin shape (interfaces.py:39-49 and 109-118)"
  required_class_attributes:
    - name: "PRISM_PLUGIN_API_VERSION"
      type: "tuple[int, int]"
      required_value: "(1, 0)"
    - name: "PLUGIN_IS_STATELESS"
      type: "bool"
      required_value: "True"
      rationale: "Renderer state must live in metadata dict, not on the plugin instance"

  required_methods:
    - name: "default_section_specs"
      signature: "() -> tuple[tuple[str, str], ...]"
      contract: "Return ordered (section_id, section_title) tuples for this platform's README. Replaces DEFAULT_SECTION_SPECS hardcoding in render.py."

    - name: "extra_section_ids"
      signature: "() -> frozenset[str]"
      contract: "Return platform-specific extra section ids. Replaces EXTRA_SECTION_IDS hardcoding."

    - name: "scanner_stats_section_ids"
      signature: "() -> frozenset[str]"
      contract: "Return section ids that consume scanner stats output for this platform. Replaces SCANNER_STATS_SECTION_IDS hardcoding."

    - name: "merge_eligible_section_ids"
      signature: "() -> frozenset[str]"
      contract: "Return section ids whose default content mode is 'merge' when guide_body is present. Replaces hardcoded literal set in _resolve_section_content_mode."

    - name: "legacy_merge_marker_prefixes"
      signature: "() -> tuple[str, ...]"
      contract: "Return legacy HTML-comment marker prefixes for backwards-compat marker stripping (e.g. ansible-role-doc, terraform-module-doc). Always includes the neutral 'prism' prefix. Replaces hardcoded ansible-role-doc leg in _generated_merge_markers."

    - name: "render_section_body"
      signature: "(section_id: str, role_name: str, description: str, variables: dict[str, Any], requirements: list[Any], default_filters: list[dict[str, Any]], metadata: dict[str, Any]) -> str | None"
      contract: "Render a single section body for this platform. Returns None when this plugin does not own the section (caller falls back to empty string). Replaces render_guide_section_body."

    - name: "render_identity_section"
      signature: "(section_id: str, role_name: str, description: str, requirements: list[Any], identity_metadata: dict[str, Any], metadata: dict[str, Any]) -> str | None"
      contract: "Render identity/metadata sections (galaxy_info / module_info / chart_info / installation / license / author). identity_metadata replaces the Ansible-specific 'galaxy' dict — each platform plugin reads its own keys. Returns None when section_id is not owned by this plugin."

    - name: "default_template_path"
      signature: "() -> pathlib.Path | None"
      contract: "Return the Jinja fallback template path for this platform. Returns None when this plugin only supports style-guide rendering (no Jinja fallback)."

    - name: "scanner_report_blurb"
      signature: "(scanner_report_relpath: str) -> str"
      contract: "Return the platform-specific 'see scanner report' paragraph. Replaces the hardcoded Ansible-flavoured blurb in append_scanner_report_section_if_enabled."

  protocol_neutrality_invariants:
    - "Protocol MUST NOT reference 'role', 'galaxy', 'ansible', 'task', 'handler', 'playbook' in any signature."
    - "All platform-specific dict keys (galaxy/module_info/chart_info) flow through generic 'identity_metadata' parameter."
    - "Variables dict shape stays platform-neutral: {name: {default: ..., ...}}; per-platform extra fields read from detail dict by the plugin."
    - "Section ids are strings; this protocol does not enumerate platform-specific id literals."

artefact_2_ownership_matrix:
  legend:
    P: "Owned by per-platform plugin"
    N: "Neutral helper (stays in scanner_readme/ or moves to scanner_plugins/_renderer_core/)"
    H: "Hybrid — control flow neutral, content per-platform"

  rows:
    - decision: "Section id taxonomy (default + extra + stats)"
      ansible: "P — ReadmeRendererPlugin.default_section_specs / extra_section_ids / scanner_stats_section_ids"
      terraform: "P (module_info, inputs, outputs, providers, resources)"
      kubernetes: "P (chart_info, values, templates, crds, manifests)"
      aap: "P (inventory_info, job_templates, surveys, credentials, projects)"

    - decision: "Section ordering"
      ansible: "P — default_section_specs returns ordered tuple"
      terraform: "P"
      kubernetes: "P"
      aap: "P"

    - decision: "Identity block schema (galaxy / module_info / chart_info / collection_info)"
      ansible: "P — render_identity_section reads Galaxy keys"
      terraform: "P — reads required_providers / required_version / module.json"
      kubernetes: "P — reads Chart.yaml maintainers / appVersion / kubeVersion"
      aap: "P — reads galaxy.yml authors / dependencies / namespace"

    - decision: "Installation snippet (code-fenced block)"
      ansible: "P — ansible-galaxy install + requirements.yml"
      terraform: "P — module {} HCL block"
      kubernetes: "P — helm install / kubectl apply"
      aap: "P — ansible-galaxy collection install + AWX curl"

    - decision: "Variable categorization buckets"
      ansible: "P — flat 'role_variables' bucket"
      terraform: "P — split inputs / outputs / locals"
      kubernetes: "P — top-level Chart values keys"
      aap: "P — survey_spec / extra_vars / credential_inputs"

    - decision: "Section title literal strings"
      ansible: "P — 'Role Variables', 'Role notes', 'Galaxy Info', 'Min Ansible Version'"
      terraform: "P — 'Input Variables', 'Required Providers', 'Min Terraform Version'"
      kubernetes: "P — 'Values', 'Min Kube Version'"
      aap: "P — 'Survey Variables', 'Min AAP Version'"

    - decision: "Empty-state fallback strings"
      ansible: "P — 'No role variables detected.', 'No default() filter usage detected.'"
      terraform: "P — 'No input variables detected.', 'No coalesce() usage detected.'"
      kubernetes: "P — 'No values detected.', 'No template helpers detected.'"
      aap: "P — 'No survey variables detected.'"

    - decision: "Scanner-report paragraph wording"
      ansible: "P — render_identity_section / scanner_report_blurb returns role-flavoured prose"
      terraform: "P"
      kubernetes: "P"
      aap: "P"

    - decision: "Legacy HTML-comment marker prefixes"
      ansible: "P — legacy_merge_marker_prefixes returns ('prism', 'ansible-role-doc')"
      terraform: "P — returns ('prism', 'terraform-module-doc')"
      kubernetes: "P — returns ('prism', 'helm-chart-doc')"
      aap: "P — returns ('prism', 'aap-doc')"

    - decision: "Default Jinja fallback template path"
      ansible: "P — default_template_path returns templates/README.md.j2 (relocated to ansible plugin)"
      terraform: "P — own j2 in scanner_plugins/terraform/templates/"
      kubernetes: "P — own j2 in scanner_plugins/kubernetes/templates/"
      aap: "P — own j2 in scanner_plugins/aap/templates/"

    - decision: "Section content mode resolution (generate / merge / replace)"
      ansible: "H — control flow neutral; merge-eligible id set is P (merge_eligible_section_ids)"
      terraform: "H"
      kubernetes: "H"
      aap: "H"

    - decision: "Style alias taxonomy (heading text → section id)"
      ansible: "P — STYLE_SECTION_ALIASES becomes per-plugin"
      terraform: "P"
      kubernetes: "P"
      aap: "P"

    - decision: "Heading style (setext vs atx) defaults"
      ansible: "P — Galaxy convention setext"
      terraform: "P — TF convention atx"
      kubernetes: "P — Helm convention atx"
      aap: "P — collection docs atx"

    - decision: "Heading formatter (format_heading)"
      ansible: "N — pure markdown, stays in style_formatter.py"
      terraform: "N — same helper"
      kubernetes: "N"
      aap: "N"

    - decision: "Jinja environment factory"
      ansible: "N — build_render_jinja_environment is generic; only template_dir param is per-platform"
      terraform: "N"
      kubernetes: "N"
      aap: "N"

    - decision: "Generated-content marker generation (prism: prefix)"
      ansible: "N — neutral leg of _generated_merge_markers stays shared"
      terraform: "N"
      kubernetes: "N"
      aap: "N"

    - decision: "Section content composition (replace / merge / generate dispatch)"
      ansible: "N — _compose_section_body control flow stays in renderer core"
      terraform: "N"
      kubernetes: "N"
      aap: "N"

    - decision: "Style-guide section ordering / filtering / unknown handling"
      ansible: "N — _resolve_ordered_style_sections control flow stays neutral"
      terraform: "N"
      kubernetes: "N"
      aap: "N"

    - decision: "Doc insights builder (purpose summary / capabilities)"
      ansible: "P — doc_insights.py moves into ansible plugin OR exposes ReadmeDocInsightsPlugin sub-protocol"
      terraform: "P — own input shape"
      kubernetes: "P"
      aap: "P"

artefact_3_di_and_registry_wiring:
  parity_pattern_source:
    - "src/prism/scanner_plugins/registry.py:117-138 (slot dict in PluginRegistry.__init__)"
    - "src/prism/scanner_plugins/registry.py:217-225 (register_yaml_parsing_policy_plugin)"
    - "src/prism/scanner_plugins/registry.py:294-297 (get_yaml_parsing_policy_plugin)"
    - "src/prism/scanner_plugins/registry.py:330-332 (list_yaml_parsing_policy_plugins)"
    - "src/prism/scanner_plugins/registry.py:32-39 (_STATELESS_REQUIRED_SLOTS)"

  registry_changes:
    slot_name: "readme_renderer"
    add_to_stateless_required_slots: true
    new_slot_dict:
      attribute: "_readme_renderer_plugins"
      type: "dict[str, type[ReadmeRendererPlugin]]"
      key: "platform_key (e.g. 'ansible', 'terraform', 'kubernetes', 'aap')"
    new_methods:
      - "register_readme_renderer_plugin(platform_key, plugin_class)"
      - "get_readme_renderer_plugin(platform_key) -> type[ReadmeRendererPlugin] | None"
      - "list_readme_renderer_plugins() -> Mapping[str, type[ReadmeRendererPlugin]]"
    deferred_registration:
      decision: "Not required for v1"
      rationale: "Renderer protocols are simple stateless shapes; eager registration in plugin __init__ is fine. Revisit if import-cycle pressure emerges."

  defaults_changes:
    file: "src/prism/scanner_plugins/defaults.py (proposed)"
    add_function: "register_default_readme_renderers(registry: PluginRegistry) -> None"
    behaviour: "Register the ansible AnsibleReadmeRendererPlugin under platform_key='ansible'. Other platforms register themselves via their own kernel.py."

  resolver_changes:
    location_options:
      preferred: "src/prism/scanner_plugins/bundle_resolver.py — add resolve_readme_renderer(di, platform_key) helper"
      alternative: "Direct plugin_registry.get_readme_renderer_plugin(platform_key) at call site"
    fail_closed_contract: "Resolver raises ValueError when no plugin is registered for the requested platform_key. No silent fallback to a hardcoded Ansible default."

  platform_key_resolution:
    source: "Reuse existing platform-key plumbing established by gf2-full-remediation-20260419"
    citation: "AGENTS.md notable findings: 'DI platform selection fully decoupled: di.py resolves platform key from scan_options → policy_context → registry default'"
    invariant: "ReadmeRendererPlugin lookup MUST consume the same platform_key as VariableDiscoveryPlugin / FeatureDetectionPlugin to keep the per-platform vertical slice coherent."

  call_site_refactor:
    file: "src/prism/scanner_readme/render.py"
    changes:
      - "render_readme: accept di or platform_key; resolve ReadmeRendererPlugin; delegate section-spec lookup, identity-block rendering, marker prefixes, default template path, scanner-report blurb."
      - "DEFAULT_SECTION_SPECS / EXTRA_SECTION_IDS / SCANNER_STATS_SECTION_IDS module-level constants: deprecated. Keep as backwards-compat re-exports that read from the ansible plugin during migration; remove in a follow-up wave."
    file_2: "src/prism/scanner_readme/guide.py"
    changes_2:
      - "render_guide_section_body: thin delegation to plugin.render_section_body / render_identity_section. _render_identity_* helpers move into the ansible plugin (or stay as private library functions used by the ansible plugin only)."

artefact_4_ansible_reference_impl:
  target_path: "src/prism/scanner_plugins/ansible/readme_renderer.py (proposed)"
  parity_source: "src/prism/scanner_plugins/ansible/variable_discovery.py / feature_detection.py shapes"
  migration_steps:
    - step: 1
      action: "Define AnsibleReadmeRendererPlugin class implementing ReadmeRendererPlugin protocol with PRISM_PLUGIN_API_VERSION = (1, 0) and PLUGIN_IS_STATELESS = True"
    - step: 2
      action: "Move DEFAULT_SECTION_SPECS / EXTRA_SECTION_IDS / SCANNER_STATS_SECTION_IDS from render.py into AnsibleReadmeRendererPlugin classmethods/constants"
    - step: 3
      action: "Move all _render_identity_* functions from guide.py into AnsibleReadmeRendererPlugin.render_identity_section dispatch"
    - step: 4
      action: "Move render_guide_section_body Ansible-specific branches (role_variables / default_filters / role_notes / requirements) into AnsibleReadmeRendererPlugin.render_section_body"
    - step: 5
      action: "Move templates/README.md.j2 from src/prism/templates/ to src/prism/scanner_plugins/ansible/templates/ — return its absolute path from default_template_path()"
    - step: 6
      action: "Implement legacy_merge_marker_prefixes returning ('prism', 'ansible-role-doc') for backwards compatibility"
    - step: 7
      action: "Implement scanner_report_blurb returning the current Ansible-flavoured paragraph"
    - step: 8
      action: "Register AnsibleReadmeRendererPlugin in src/prism/scanner_plugins/ansible/__init__.py via plugin_registry.register_readme_renderer_plugin('ansible', AnsibleReadmeRendererPlugin)"
    - step: 9
      action: "Move STYLE_SECTION_ALIASES (style.py / style_config.py) heading-vocab data into the ansible plugin OR expose a per-plugin style_aliases() classmethod"

  doc_insights_decision:
    options:
      A:
        name: "Sub-protocol"
        description: "Define ReadmeDocInsightsPlugin protocol; doc_insights.build_doc_insights becomes per-platform"
        cost: "extra protocol surface; cleaner separation"
      B:
        name: "Inline into ReadmeRendererPlugin"
        description: "Add build_doc_insights method to ReadmeRendererPlugin"
        cost: "fatter protocol; one fewer slot"
    recommendation: "Option A — sub-protocol — to keep ReadmeRendererPlugin focused on rendering and let doc-insight harvesting evolve independently per platform"

artefact_5_parity_test_strategy:
  primary_invariant: "For ANY scanned ansible role, README output via the new ReadmeRendererPlugin path MUST be byte-identical to current render_readme output."

  test_modules:
    - path: "src/prism/tests/test_readme_renderer_plugin_parity.py (new)"
      purpose: "Byte-for-byte parity: invoke render_readme on a fixed fixture role through both old and new code paths; assert outputs are identical."
      fixtures: "Reuse existing role fixtures from src/prism/tests/data/ that already exercise the README rendering path."

    - path: "src/prism/tests/test_readme_renderer_plugin_protocol.py (new)"
      purpose: "Protocol shape compliance: verify AnsibleReadmeRendererPlugin satisfies ReadmeRendererPlugin runtime_checkable protocol; PRISM_PLUGIN_API_VERSION matches; PLUGIN_IS_STATELESS = True."

    - path: "src/prism/tests/test_readme_renderer_registry_wiring.py (new)"
      purpose: "Registry/DI wiring: verify register_readme_renderer_plugin + get_readme_renderer_plugin round-trip; verify resolver raises ValueError when no plugin registered for platform_key (fail-closed)."

    - path: "src/prism/tests/test_readme_renderer_plugin_isolation.py (new)"
      purpose: "Platform isolation: register a stub TerraformReadmeRendererPlugin returning module/inputs/outputs sections; assert that resolving with platform_key='terraform' returns the stub's section_specs and not Ansible's role_variables; verify the ansible plugin is never invoked when terraform key is selected."

  existing_test_protection:
    - "src/prism/tests/test_render_compat.py — must keep passing without modification (back-compat re-export contract)"
    - "src/prism/tests/test_t1_02_coverage_lift.py — must keep passing"
    - "src/prism/tests/test_t4_05_jinja_sandbox_audit.py — must keep passing (build_render_jinja_environment seam stays)"
    - "All existing fsrc/scanner end-to-end tests producing README output — must keep passing (parity is the gate)"

  api_compatibility_contract:
    public_signature_freeze:
      - "src/prism/api.py render_readme — signature MUST remain unchanged"
      - "src/prism/cli_app/shared.py parse_style_readme — signature MUST remain unchanged"
      - "src/prism/scanner_reporting/runbook.py build_render_jinja_environment — symbol MUST remain importable from prism.scanner_readme.rendering_seams"
    deprecation_plan:
      - "scanner_readme.render module-level constants (DEFAULT_SECTION_SPECS / EXTRA_SECTION_IDS / SCANNER_STATS_SECTION_IDS) — keep as compat re-exports for 1 release; emit DeprecationWarning when accessed; remove in a follow-up wave."

implementation_blocklist:
