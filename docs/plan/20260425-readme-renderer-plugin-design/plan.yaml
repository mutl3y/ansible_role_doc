plan_id: "20260425-readme-renderer-plugin-design"
status: "design_only"
type: "planning_slice"
parent_finding: "FIND-G6-06"
parent_cycle: "gilfoyle-review-g6"
date: "2026-04-25"
slice_kind: "pre_code_design_artefacts"

objective: >
  Design a ReadmeRendererPlugin protocol and migration plan that makes
  scanner_readme/* platform-agnostic so Terraform, Kubernetes, and AAP
  plugins can each own their own README rendering (sections, style,
  markers, identity blocks, examples) without scanner_readme/ knowing
  any platform-specific facts.

  This is a DESIGN-ONLY slice. No source-tree code changes are produced
  by this slice. Implementation is a follow-up plan that consumes these
  artefacts.

product_vision_constraint: >
  User-stated mandate (2026-04-25): "core components need to be clean
  of platform related code that should belong in the plugins, the plugin
  should tailor both the input and logic to the scanner but also control
  the output." Each platform plugin must own its full vertical slice:
  input parsing → scanning logic → output rendering.

