acceptance_criteria_for_implementation_followup:
  - "ReadmeRendererPlugin protocol defined in interfaces.py with all 8 required methods plus class attributes"
  - "PluginRegistry has readme_renderer slot in _STATELESS_REQUIRED_SLOTS and full register/get/list methods"
  - "AnsibleReadmeRendererPlugin implements protocol; registered in scanner_plugins/ansible/__init__.py"
  - "scanner_readme/render.py and guide.py delegate to resolved plugin; zero hardcoded Ansible literals remain in scanner_readme/*"
  - "All four new test modules added; all existing render-path tests continue to pass"
  - "Public API surface (api.render_readme, cli_app/shared.parse_style_readme, scanner_reporting/runbook build_render_jinja_environment) unchanged"
  - "tox -e typecheck green; ruff + black clean; full pytest green"

risks:
  - id: R1
    severity: high
    description: "STYLE_SECTION_ALIASES is currently a module-level frozen mapping consumed by parse_style_readme via cli_app/shared.py. Per-platform aliases require either platform-key threading through parse_style_readme or a registry lookup at parse time."
    mitigation: "Spike: read parse_style_readme call sites and decide whether the parser needs platform_key now or whether aliases stay neutral and per-platform titles are resolved later in render."

  - id: R2
    severity: medium
    description: "templates/README.md.j2 is referenced by Path(__file__).resolve().parent.parent / 'templates' / 'README.md.j2' in render.py. Relocating it to scanner_plugins/ansible/templates/ requires the plugin to expose the path; may break external users who pass template=... explicitly with the old path."
    mitigation: "Keep src/prism/templates/README.md.j2 as a thin re-export (symlink or stub that includes the plugin path) for one deprecation cycle."

  - id: R3
    severity: medium
    description: "doc_insights.py is consumed by guide._render_identity_purpose_section. Splitting it out as a sub-protocol (Option A) adds a second new protocol to design and may slow down the implementation slice."
    mitigation: "If implementation slice is time-boxed tight, defer doc_insights to a follow-up — keep it Ansible-coupled in v1 and gate Terraform/K8s/AAP rollout on the sub-protocol."

  - id: R4
    severity: low
    description: "Public render_readme signature does not currently take di or platform_key. Threading platform_key through requires either a kwarg addition (back-compat OK with default) or reading from metadata dict."
    mitigation: "Read platform_key from metadata dict (already present in DI context) — no signature change required."

  - id: R5
    severity: low
    description: "build_render_jinja_environment is imported by scanner_reporting/runbook.py — relocating rendering_seams.py would break that import."
    mitigation: "Keep rendering_seams.py in place; it is already platform-neutral."

next_actions:
  - id: A1
    action: "User reviews this design slice and either approves, rejects, or requests revisions"
    blocking_for: "Implementation slice"

  - id: A2
    action: "On approval, generate implementation plan with waves: (W1) protocol + registry, (W2) ansible reference impl + relocate templates, (W3) call-site delegation in render.py/guide.py, (W4) parity tests + deprecation warnings, (W5) closure gate (full pytest + ruff + black + mypy + parity byte-for-byte)"
    blocking_for: "Code changes"

  - id: A3
    action: "Spike on R1 (parse_style_readme platform-key threading) before W1 of implementation slice begins"
    blocking_for: "W1 of implementation slice"
