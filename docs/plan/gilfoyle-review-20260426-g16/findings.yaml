summary: >
  No critical findings. Registry read paths are architecturally inconsistent with the
  write-side lock model, creating real races on non-CPython runtimes and during
  test-injection patterns. Dead Ansible code persists in generic scanner_readme modules
  (six unreachable functions, four duplicate module-level constants). A cluster of Any
  types at the DI boundary layer (di: Any, _plugin: Any, require_prepared_policy -> Any)
  continues to bleed type unsafety into core callers.

findings:

  # ── CONCURRENCY ──────────────────────────────────────────────────────────

  - id: FIND-G16-01
    category: concurrency
    severity: high
    status: closed
    title: "PluginRegistry: 15 reader methods bypass self._lock"
    description: >
      All register_* methods acquire self._lock (threading.RLock). The matching
      reader methods do not: get_scan_pipeline_plugin, get_output_orchestration_plugin,
      get_comment_driven_doc_plugin, get_extract_policy_plugin,
      get_yaml_parsing_policy_plugin, get_jinja_analysis_policy_plugin,
      get_readme_renderer_plugin (7 lockless gets), plus list_output_orchestration_plugins,
      list_scan_pipeline_plugins, list_comment_driven_doc_plugins,
      list_extract_policy_plugins, list_yaml_parsing_policy_plugins,
      list_jinja_analysis_policy_plugins, list_readme_renderer_plugins (7 lockless lists),
      plus is_reserved_unsupported_platform (1 lockless set membership test).
      Additionally list_variable_discovery_plugins and list_feature_detection_plugins
      perform two separate lockless dict.keys() reads without holding the lock, producing
      a non-linearizable snapshot across the two reads.
    affected_files:
      - src/prism/scanner_plugins/registry.py
    needs_investigation: false
    decision: >
      Wrap all lockless reader method bodies in `with self._lock:`. The RLock is already
      present; this is a mechanical addition. get_variable_discovery_plugin /
      get_feature_detection_plugin already use double-checked locking on the slow path;
      their initial lockless fast-path peek is architecturally inconsistent and should
      also be moved inside the lock.
    decision_rationale: >
      The internal lock model guarantees mutation safety but not read safety. On non-CPython
      runtimes (e.g., PyPy, GraalPy) dict resize during concurrent read is undefined
      behaviour. Even on CPython, the two-dict non-atomic snapshot in list_variable_discovery
      is a real race for test injection patterns that write deferred registrations concurrently.
    closed_evidence: "All 15 reader methods wrapped in with self._lock:; 43 tests green; ruff+black clean; commit feab271"
    category: concurrency
    severity: high
    status: closed
    title: "TelemetryCollector + ProgressReporter: _phase_starts dict unguarded in EventBus callbacks"
    description: >
      TelemetryCollector.__call__ (telemetry.py:66) and ProgressReporter.__call__
      (progress.py:31) both mutate self._phase_starts (plain dict assignments and .pop())
      without any lock. EventBus.emit() takes a snapshot of listeners under _listeners_lock,
      then calls each listener WITHOUT holding the lock. If the same collector/reporter
      instance is registered across multiple concurrent DIContainer builds (possible with
      the global progress_reporter_enabled() registration pattern), two threads call __call__
      simultaneously and race on _phase_starts dict mutations including resize.
    affected_files:
      - src/prism/scanner_core/telemetry.py
      - src/prism/progress.py
    needs_investigation: false
    decision: >
      Add `self._lock = threading.Lock()` to __init__ of both classes, then wrap
      the _phase_starts mutation block (assignment + downstream .pop()) in
      `with self._lock:`. Small and targeted.
    decision_rationale: >
      The global registration pattern in progress_reporter_enabled() means a single instance
      can be shared across thread boundaries without callers knowing. The fix is two lines
      per class.
    closed_evidence: "threading.Lock added to TelemetryCollector + ProgressReporter; _phase_starts mutations guarded; 959 passed / 7 skipped; commit feab271"

