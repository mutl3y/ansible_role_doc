  # ── TYPING ───────────────────────────────────────────────────────────────

  - id: FIND-G16-05
    category: typing
    severity: high
    status: closed
    title: "FeatureDetector + VariableDiscovery wrapper classes: _plugin typed Any"
    description: >
      scanner_core/feature_detector.py:35 — self._plugin: Any | None and
      _resolve_plugin() -> Any | None, when FeatureDetectionPlugin Protocol
      is already defined in scanner_plugins/interfaces.py.
      scanner_core/variable_discovery.py:32 — symmetric: self._plugin: Any | None
      and _resolve_plugin() -> Any | None, when VariableDiscoveryPlugin Protocol exists.
      Both wrapper classes leak Any into their detect() and discover() public methods,
      hiding all interface-level type checks from mypy callers.
    affected_files:
      - src/prism/scanner_core/feature_detector.py
      - src/prism/scanner_core/variable_discovery.py
    needs_investigation: false
    decision: >
      Annotate _plugin and _resolve_plugin return type with the corresponding Protocol
      type from scanner_plugins/interfaces.py. No runtime change.
    decision_rationale: "Protocols exist. The Any annotation makes the wrapper class's contract invisible to mypy."
    closed_evidence: "_plugin + _resolve_plugin typed as FeatureDetectionPlugin|None / VariableDiscoveryPlugin|None; mypy delta=0; commit feab271"

  - id: FIND-G16-06
    category: typing
    severity: high
    status: closed
    title: "ScannerContext: di: Any parameter and PreparedPolicyBundle cast-down"
    description: >
      scanner_core/scanner_context.py: ScannerContext.__init__ takes di: Any — DIContainer
      is already imported in the same file and is the only concrete type ever passed.
      Additionally, a cast(dict[str, Any], prepared_policy_bundle) in the same file
      (line ~73) downcasts a fully-typed PreparedPolicyBundle TypedDict to a looser
      dict[str, Any], hiding all TypedDict keys from callers. Both patterns are in the
      most central orchestration class in scanner_core.
    affected_files:
      - src/prism/scanner_core/scanner_context.py
    needs_investigation: false
    decision: >
      Change di: Any -> di: DIContainer. Replace cast(dict[str, Any], prepared_policy_bundle)
      with a typed return of PreparedPolicyBundle directly (or return the value uncast if
      the return type annotation is already PreparedPolicyBundle). Verify mypy delta after change.
    decision_rationale: "DIContainer is the only valid di type. Downcasting a TypedDict to dict[str, Any] is a type lie."
    closed_evidence: "di: Any -> di: DIContainer; _require_prepared_policy_bundle returns PreparedPolicyBundle; cast narrowed; mypy delta=0; commit feab271"

  - id: FIND-G16-07
    category: typing
    severity: high
    status: deferred
    title: "di_helpers.require_prepared_policy() returns Any, poisoning all scanner_extract callers"
    description: >
      scanner_core/di_helpers.py:31 — require_prepared_policy() -> Any is the primary
      policy-fetch entrypoint used across scanner_extract (task_line_parsing,
      task_annotation_parsing, etc.). The Any return means every caller loses type safety
      on the returned policy bundle. PreparedPolicyBundle TypedDict exists in contracts_request.py.
    affected_files:
      - src/prism/scanner_core/di_helpers.py
    needs_investigation: false
    decision: >
      Change return type annotation from Any to PreparedPolicyBundle. Import PreparedPolicyBundle
