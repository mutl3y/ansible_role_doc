    decision: >
      Change FeatureDetectionPlugin.detect_features return annotation from dict[str, Any] to
      FeaturesContext in scanner_plugins/interfaces.py. Add FeaturesContext import. The Ansible
      implementation is already correct — no changes needed there.
    decision_rationale: "Annotation-only covariant narrowing. FeaturesContext is already the runtime type."
    closed_evidence: "detect_features Protocol return -> FeaturesContext; FeaturesContext imported in interfaces.py; mypy delta=0; commit feab271"

  # ── GUARD ─────────────────────────────────────────────────────────────────

  - id: FIND-G16-09
    category: guard
    severity: high
    status: closed
    title: "scanner_io/output.py: non-exhaustive format dispatch returns HTML for unknown formats"
    description: >
      render_final_output() (output.py:71) branches on output_format with if/elif for
      'md', 'json', and others, but has no final else: raise ValueError(...). An
      unrecognised format string silently returns the HTML document (last assigned value),
      producing wrong output format with no error raised. Callers cannot detect the
      misconfiguration.
    affected_files:
      - src/prism/scanner_io/output.py
    needs_investigation: false
    decision: >
      Add `else: raise ValueError(f"unknown output_format {output_format!r}")` at the
      end of the dispatch chain. One line change.
    decision_rationale: "Fail-closed contracts. An unrecognised format should be a hard error, not silent HTML."
    closed_evidence: "raise ValueError added; test updated to expect ValueError; error-boundary baseline refreshed; 959 passed; commit feab271"

  # ── SILENT FALLBACK ──────────────────────────────────────────────────────

  - id: FIND-G16-10
    category: silent_fallback
    severity: medium
    status: closed
    title: "Four silent-swallow except blocks return empty results without logging"
    description: >
      Four except blocks return empty results silently with no log:
      1. scanner_config/patterns.py:49 — _load_yaml() returns {} on any IO/parse error
      2. scanner_io/loader.py:186 — load_yaml_file() returns None on any IO/parse error
      3. scanner_extract/filter_scanner.py:135 — scan_for_default_filters() returns []
      4. scanner_extract/filter_scanner.py:187 — scan_file_for_all_filters() returns []
      A corrupt or unreadable YAML/config file is indistinguishable from an absent one.
      PermissionErrors in production are real signals that are currently invisible.
    affected_files:
      - src/prism/scanner_config/patterns.py
      - src/prism/scanner_io/loader.py
      - src/prism/scanner_extract/filter_scanner.py
    needs_investigation: false
    decision: >
      Add logger.debug (or logger.warning for PermissionError) calls inside each except
      block before the return statement. Include filename and exc repr in the message.
      Do not change the return values — callers depend on the empty-result contract.
    decision_rationale: "Logging does not change behaviour but makes production failures observable."
    closed_evidence: "logger.debug added to patterns.py, loader.py, filter_scanner.py (x2); import logging + logger = getLogger added to each file; 959 passed; commit feab271"

