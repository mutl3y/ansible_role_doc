    decision_rationale: "Single-line annotation change closes Any propagation into all scanner_extract callers."
    deferral_note: >-
      Deferred: the function returns 8+ different policy types depending on policy_name argument.
      Changing -> Any to -> PreparedPolicyBundle is semantically wrong (it returns individual
      policy objects, not the bundle). Correct fix requires Literal-typed overloads across
      all 20+ call sites. Out of scope for a single fix wave; carries real mypy-delta risk.
    closed_evidence: null

  - id: FIND-G16-08
    category: typing
    severity: high
    status: closed
    title: "FeatureDetectionPlugin.detect_features() returns dict[str, Any] when FeaturesContext TypedDict exists"
    description: >
      scanner_plugins/interfaces.py:44 — FeatureDetectionPlugin.detect_features(self,
      role_path, options) -> dict[str, Any]. FeaturesContext TypedDict is defined in
      scanner_data/contracts_request.py and covers the exact keys produced by this method.
      analyze_task_catalog() on the same Protocol also returns dict[str, Any] when a
      TypedDict would be feasible.
    affected_files:
      - src/prism/scanner_plugins/interfaces.py
      - src/prism/scanner_plugins/ansible/feature_detection.py
    needs_investigation: true
    investigation_conclusion: >
      FeaturesContext TypedDict has exactly 15 Required fields matching what detect_features
      produces. AnsibleFeatureDetectionPlugin.detect_features already annotates -> FeaturesContext
