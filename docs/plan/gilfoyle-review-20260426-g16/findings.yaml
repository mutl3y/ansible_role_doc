  - id: FIND-G16-04
    category: duplication
    severity: high
    status: closed
    title: "scanner_readme/render.py: Ansible section taxonomy constants duplicated from plugin"
    description: >
      render.py defines DEFAULT_SECTION_SPECS (L14), EXTRA_SECTION_IDS (L29),
      ALL_SECTION_IDS (L48), SCANNER_STATS_SECTION_IDS (L53) — all Ansible-specific
      section taxonomies (galaxy_info, role_contents, handlers, installation).
      scanner_plugins/ansible/readme_renderer.py defines byte-identical private constants.
      The render runtime path (L178) already delegates to plugin.default_section_specs()
      so these module-level constants are internally unused. They are re-exported via
      scanner_readme/__init__.__all__ as public API surface.
    affected_files:
      - src/prism/scanner_readme/render.py
      - src/prism/scanner_readme/__init__.py
    needs_investigation: true
    investigation_conclusion: >
      No production code outside scanner_readme itself imports these four names.
      Two test files (test_package_export_parity.py, test_scanner_readme_init.py) assert
      these names are present in scanner_readme.__all__ — both would fail without test updates.
      The render runtime path already uses plugin.default_section_specs() so these constants
