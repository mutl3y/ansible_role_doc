promoted:
  - id: G62-H01
    severity: high
    category: registry_authority
    title: "Plugin registry authority remains split across singleton, bootstrap, DI ingress, and facade re-export seams"
    files:
      - src/prism/scanner_plugins/registry.py
      - src/prism/scanner_plugins/bootstrap.py
      - src/prism/scanner_core/di.py
      - src/prism/api_layer/plugin_facade.py
      - src/prism/scanner_plugins/__init__.py
    summary: >-
      The architecture still exposes multiple registry authorities: a
      module-level registry singleton, bootstrap-owned lazy default registry,
      DIContainer fail-closed registry resolution, a public plugin_facade
      re-export of the default registry, and a dynamic DEFAULT_PLUGIN_REGISTRY
      export path. The split makes composition authority non-local and keeps
      registry ownership harder to reason about and test.
    suggested_narrow_gate: >-
      pytest -q src/prism/tests/test_di_registry_resolution.py::test_di_variable_discovery_plugin_fails_closed_on_empty_registry
    source_artifacts:
