  - id: G62-M01
    severity: medium
    category: error_channel
    title: "Scan-cache fallback paths mask unreadable inputs and trust cached payload shape too early"
    files:
      - src/prism/scanner_core/scan_cache.py
      - src/prism/api_layer/non_collection.py
      - src/prism/tests/test_t3_03_scan_cache.py
    summary: >-
      The cache layer currently folds unreadable-path OSError into the content
      hash sentinel and the non-collection API path feeds cached values back
      into normalization without an earlier shape guard. That couples I/O
      failure masking with unchecked cache reuse on the hot path.
    suggested_narrow_gate: pytest -q src/prism/tests/test_t3_03_scan_cache.py
