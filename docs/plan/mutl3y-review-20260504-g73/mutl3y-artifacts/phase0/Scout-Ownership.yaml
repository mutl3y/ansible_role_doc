    severity: High
    category: global_state
    summary: "Process-level default EventBus listener registry (_DEFAULT_LISTENERS) is mutable and global. register_default_listener/unregister_default_listener mutate process-global state which is inherited (snapshot) by DIContainer EventBus when requested. This can cause cross-contamination of listeners across independent DI containers and threads."
    uncertainty: low
  - id: 2
    files:
      - src/prism/scanner_core/di.py#L180-L260
      - src/prism/scanner_core/di.py#L300-L380
    severity: Medium
    category: cache_identity
    summary: "DIContainer keeps a per-container _cache protected by an RLock and selectively invalidates cache entries when scan options are replaced. Only keys in _SCAN_OPTION_DEPENDENT_CACHE_KEYS are invalidated on replace_scan_options; other cache entries may implicitly depend on scan options and remain stale."
    uncertainty: low
  - id: 3
    files:
      - src/prism/scanner_core/scan_cache.py#L1-L220
    severity: Low
    category: cache_identity
    summary: "InMemoryLRUScanCache uses locks and clones container structures for stored values; cloning is structural for builtins but leaves 'opaque' custom objects by identity. If callers store mutable, non-serializable objects, cached values may retain shared mutable state."
    uncertainty: medium
