observations:
  - id: O1
    files:
      - src/prism/api_layer/common.py:1-200
    severity: High
    category: contract_mismatch / typing
    description: |
      Public API helpers accept and return generic callables and payloads typed as
      `Any`/untyped. `build_failure_record` parameters `collection_role_failure_details_fn` and
      `to_failure_detail_fn` are untyped, and the function returns `dict[str, Any]`, hiding
      runtime shape errors that could surface under concurrent error-reporting paths.
    uncertainty: Low
  - id: O2
    files:
      - src/prism/scanner_data/contracts_request.py:1-360
    severity: High
    category: typing holes / runtime-shape
    description: |
      Prepared policy Protocols and `PreparedPolicyBundle` expose many methods/fields
      typed as `object` or `list[object]` (e.g. YAML/task traversal APIs). Weak signatures
      hide required runtime invariants (thread-safety, immutable vs mutable payloads)
      and make it easy to pass incompatible implementations without static checks.
    uncertainty: Low
  - id: O3
    files:
      - src/prism/api_layer/non_collection.py:1-220
      - src/prism/api_layer/non_collection.py:480-500
    severity: High
    category: concurrency / global-state
    description: |
      Module-level lazy singletons (`_repo_scan_facade`) guarded by a `threading.Lock` are
      present. Global mutable caches combined with module-level lazy init create potential
      lifecycle and reinitialization hazards across threads or long-lived processes.
    uncertainty: Medium
  - id: O4
    files:
      - src/prism/api_layer/plugin_facade.py:1-260
    severity: Medium
    category: concurrency / implicit-copy
    description: |
      `isolate_scan_pipeline_registry` wraps plugin factories and deep-copies `scan_context`
      per call. Hidden `copy.deepcopy` semantics plus casting to plugin types and runtime
      wrapping can mask shared-state bugs and impose unpredictable runtime costs under
      concurrent plugin invocation.
    uncertainty: Medium
  - id: O5
    files:
      - src/prism/scanner_data/scan_options_schema.py:1-320
    severity: Medium
    category: schema / validation
    description: |
      `SCAN_OPTIONS_SCHEMA` uses coarse `types=(list,)` / `(dict,)` style checks and
      `validate_scan_options` only does shallow `isinstance` checks. Inner-element
      validation is missing and `prepared_policy_bundle` is allowed as plain `dict` in schema
      despite being a TypedDict/structured contract elsewhere—possible shape drift.
    uncertainty: Low
  - id: O6
    files:
      - src/prism/api_layer/payload_helpers.py:1-80
    severity: Medium
    category: typing / metadata-shape
    description: |
      `normalize_scan_role_payload_shape` treats `metadata` as `dict[str, Any]` at runtime
      and appends `warnings`. Several codepaths accept `object`/`Any` for metadata which
      can conceal missing keys or unexpected nested shapes in concurrent flows.
    uncertainty: Low
  - id: O7
    files:
      - src/prism/scanner_data/contracts_output.py:1-160
      - src/prism/scanner_data/contracts_variables.py:1-80
    severity: Medium
    category: weak-typed-outputs
    description: |
      Many TypedDicts (output and variable contracts) use `Any`/`object` for nested fields
      (e.g. `requirements_display`, `variable_insights`). This reduces the benefit of
      TypedDicts for preserving runtime invariants and complicates reasoning about shared
      data in async or threaded contexts.
    uncertainty: Low
  - id: O8
    files:
      - src/prism/scanner_data/__init__.py:1-260
    severity: Low
    category: builder-internals
    description: |
      Builders and compatibility helpers use internal `dict[str, Any]` payloads and ``{}``
      initializations for `ScanMetadata`. These are common but increase the chance of
      accidental mutation when passed between components.
    uncertainty: Low
  - id: O9
    files:
      - src/prism/scanner_reporting/report.py:1-220
    severity: Medium
    category: type-guards / runtime-assertions
    description: |
      Several `TypeGuard` helpers simply test `isinstance(value, dict)` / `list` without
      validating inner element types (e.g. `ScannerCounters` expects ints). Under heavy
      concurrent updates, shallow guards can produce false positives and let malformed
      structures through.
    uncertainty: Medium
  - id: O10
    files:
      - src/prism/scanner_kernel/repo_context.py:1-120
    severity: Low
    category: env-driven feature flags / lifecycle
    description: |
      Kernel enablement is controlled via `os.environ` lookups (`PRISM_KERNEL_ENABLED`) on
      each call. This is deliberate but means the runtime behavior can flip mid-process if
      environment is mutated externally—consider documenting or caching the intent.
    uncertainty: Low
