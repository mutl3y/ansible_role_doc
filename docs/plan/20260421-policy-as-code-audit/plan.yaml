objective: >
  Design and stub the Policy as Code audit plugin architecture for fsrc.
  Replaces the old feedback.py approach (MG-03/MG-09 — deliberately excluded
  from parity work). Wave 0 produces five importable stub artefacts that pass
  ruff + black with no live logic. Wave 1 contains full-implementation tasks,
  all deferred until scanner_config MG-02/08 (20260421-mg-fsrc-parity wave 3)
  is complete.
