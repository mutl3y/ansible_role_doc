  - id: pac-w0-t04
    title: Add factory_audit_plugin() slot and inject_mock_audit_plugin() to DIContainer
    description: |
      Modify src/prism/scanner_core/di.py:

      1. In TYPE_CHECKING block, add:
           from prism.scanner_plugins.audit import AuditPlugin

      2. Add factory method after factory_jinja_analysis_policy_plugin():
           def factory_audit_plugin(self) -> "AuditPlugin | None":
               """Return optional audit plugin; None by default (audit is opt-in).

               Returns None unless an override or mock is injected.
               Callers should treat None as 'audit disabled for this scan'.
               """
               if "audit_plugin" in self._mocks:
                   return self._mocks["audit_plugin"]
               override = self._factory_overrides.get("audit_plugin_factory")
               if override is not None:
                   return override(self, self._role_path, self._scan_options)
               return None

