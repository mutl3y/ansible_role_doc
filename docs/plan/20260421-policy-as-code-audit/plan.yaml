tldr: |
  Five stub artefacts land in wave 0, establishing the full type and protocol
  surface for the audit plugin layer without any runtime logic:

    1. src/prism/scanner_config/audit_rules.py  — AuditRule / AuditViolation /
       AuditReport TypedDicts + load_audit_rules_from_policy() returning []
    2. src/prism/scanner_plugins/audit/__init__.py  — AuditPlugin Protocol
    3. src/prism/scanner_plugins/audit/builtin_rules.py  — three NotImplementedError
       stub rule classes
    4. src/prism/scanner_core/di.py (MODIFY)  — factory_audit_plugin() slot +
       inject_mock_audit_plugin() helper
    5. src/prism/cli.py (MODIFY)  — --audit-rules / --fail-on-audit-violations flags
       parsed but not yet acted upon

  Wave 1 (deferred) contains full rule implementations, ScannerContext wiring, and
  complete CLI pipeline execution. All wave-1 tasks block on scanner_config
  MG-02/08 completion. src/ is frozen throughout.

open_questions:
  - question: >
      Should AuditReport use 'passed' (Python-safe identifier) or 'pass'
      (reserved keyword, only writable via functional TypedDict form)?
    context: >
      The spec uses 'pass: bool'. In Python the class-form TypedDict
      'class AuditReport(TypedDict): pass: bool' is a SyntaxError.
      The functional form TypedDict('AuditReport', {'pass': bool, ...})
      works but is less idiomatic and breaks mypy in some versions.
      Resolution: use 'passed: bool' — preserves intent, avoids SyntaxError.
    type: decision_blocker
    affects: [pac-w0-t01, pac-w1-t04, pac-w1-t06]

  - question: >
      Does creating src/prism/scanner_config/ in wave 0 with a minimal
      stub package conflict with MG-02/08 wave 3 (20260421-mg-fsrc-parity)?
    context: >
      The MG plan wave 3 creates scanner_config from scratch. If this plan
      pre-creates the package with __init__.py + audit_rules.py, the MG
      implementer must extend the package instead of creating it. Both plans
      can coexist safely as long as the MG implementer does NOT overwrite
      audit_rules.py. Explicit coordination note added to assumptions.
    type: decision_blocker
    affects: [pac-w0-t01, pac-w1-t05]

  - question: >
      What exit code should --fail-on-audit-violations use?
    context: >
      The spec says exit code 2. _EXIT_CODE_GENERIC_ERROR is already 2 in cli.py.
      Resolution: add _EXIT_CODE_AUDIT_VIOLATIONS = 2 as a named constant that
      documents intent; the numeric value is the same. If a distinct code is
      needed later it can be changed to 8 without breaking the current gate.
    type: nice_to_know
    affects: [pac-w0-t05, pac-w1-t06]

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: >
        MG-02/08 wave 3 implementer recreates src/prism/scanner_config/__init__.py
        from scratch and overwrites audit_rules.py, destroying the stub artefact.
      likelihood: medium
      impact: high
      mitigation: >
        The MG plan must be updated with an explicit note that audit_rules.py
        pre-exists and must be preserved. The AGENTS.md notable-findings entry
        for 20260421-policy-as-code-audit-wave0 closure should reference this.
        The wave-1 task PAC-W1-T05 blocks on MG completion, providing a
        natural forced-merge checkpoint.

    - scenario: >
        builtin_rules.py imports AuditRule from scanner_config.audit_rules at
        module level, causing ImportError when scanner_plugins.audit is imported
        before scanner_config package is on sys.path.
      likelihood: low
      impact: medium
      mitigation: >
        Keep all cross-package imports gated behind TYPE_CHECKING blocks
        in stub files. At runtime, builtin_rules.py should not need the
        TypedDicts for the NotImplementedError stubs — only the method
        signatures need them. Use string-literal annotations (PEP 563
        from __future__ import annotations) to defer resolution.

    - scenario: >
        AuditPlugin Protocol in audit/__init__.py triggers circular import
        because audit_rules.py lives in scanner_config which will eventually
        import scanner_plugins indirectly.
      likelihood: low
      impact: medium
      mitigation: >
        Guard the import of AuditRule/AuditViolation from scanner_config.audit_rules
        in audit/__init__.py under TYPE_CHECKING. The Protocol is structural
        (duck-typed) so runtime import is not needed. Test with
        PYTHONPATH=src python -c "import prism.scanner_plugins.audit" after
        wave 0 lands.

    - scenario: >
        The factory_audit_plugin() return-type annotation (AuditPlugin | None)
        fails mypy because AuditPlugin is a Protocol not imported at runtime
        in di.py.
      likelihood: medium
      impact: low
      mitigation: >
        Import AuditPlugin only under TYPE_CHECKING block in di.py. Use
        string literal 'AuditPlugin | None' in the method signature or rely
        on from __future__ import annotations to defer evaluation.
        Gate check: tox -e typecheck must pass after T04 lands.

  assumptions:
    - src/ is frozen throughout all waves; all changes target src/prism/ only.
    - scanner_config/ does not yet exist in fsrc at the time wave 0 executes.
    - audit/__init__.py currently contains only a single docstring — safe to overwrite.
    - The MG-02/08 wave (20260421-mg-fsrc-parity wave 3) has not yet started;
      scanner_config/ pre-creation here is safe.
    - 'pass' as AuditReport field name is replaced by 'passed' per open_questions resolution.
    - All wave-0 stubs are importable under PYTHONPATH=src without side effects.
    - No new pip dependencies are introduced in any wave-0 task.
    - Existing fsrc tests must remain green after each wave-0 task (isolated changes).

