# This is a basic workflow to help you get started with Actions

name: CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .[dev]

      - name: Lint: ruff
        run: |
          pip install ruff
          ruff check .

      - name: Format check: black
        run: |
          pip install black
          black --check .

      - name: Setup reviewdog (for PR annotations)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1
        with:
          version: latest

      - name: Run ruff and post annotations via reviewdog
        if: github.event_name == 'pull_request'
        run: |
          ruff check --format=json . > ruff.json || true
          cat ruff.json | reviewdog -f=ruff-json -name="ruff" -reporter=github-pr-review -level=error

      - name: Run tests
        run: pytest -q
