# Section heading thesaurus
#
# Maps normalised heading text -> canonical section id.
# All keys are lower-cased, stripped, and have runs of whitespace collapsed
# before lookup.  Add your own aliases here to extend without forking.
#
# Entries are sorted by canonical id, then by alias key within each group.
# This file ships with the package as the built-in baseline.
#
# To override in your repo, create .prism_patterns.yml containing
# only the keys you want to change (lists replace wholesale, dicts merge).
# For community-curated updates see: https://github.com/mutl3y/prism_patterns

