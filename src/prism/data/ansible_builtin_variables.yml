# Canonical Ansible built-in/special variables and gathered facts.
#
# Keep this list curated and sorted. At runtime, prism also attempts to load
# additional reserved/magic variable names from ansible-core when available.
#
# Sections (all sorted together):
#   ansible_* magic/connection/play variables  — set by Ansible itself
#   ansible_* gathered facts                   — populated by gather_facts / setup module
#   ansible_* network interface facts          — host-specific; names below are examples
#     (br0, eno1, lo, podman0, veth*); real deployments will have different
#     interface names — add site-specific names to ignored_identifiers.yml as needed
#   non-ansible_* meta-facts                   — discovered_interpreter_python,
#     gather_subset, module_setup

